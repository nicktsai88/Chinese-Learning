            addQ("在傳統音韻學中，哪一個聲調的字讀起來最為「急促」，且常被歸類為「仄聲」？", ["陰平聲", "陽平聲", "上聲", "入聲"], 3, ["陰平(國語一聲)屬於「平聲」，聲音悠長。", "陽平(國語二聲)屬於「平聲」，聲音悠長。", "上聲雖是仄聲，但非最急促。", "「入聲」字發音短促、一發即收，是判斷平仄時最常考的「仄聲字」陷阱。"]);
            addQ("下列四個國字中，何者在國語注音中讀作平聲（一、二聲），但在古代卻是發音急促的「入聲字」（仄聲）？", ["山", "花", "白", "流"], 2, ["山 (ㄕㄢ)，平聲。", "花 (ㄏㄨㄚ)，平聲。", "白 (ㄅㄞˊ)，國語讀二聲(平)，但用台語/客語念會發現音短促且收尾(ㄅㄟㆷ)，是經典的「入聲字(仄聲)」。", "流 (ㄌㄧㄡˊ)，平聲。"]);
            addQ("判斷近體詩平仄時，常會遇到「國語讀平聲，古音為仄聲」的入聲字陷阱。下列哪一組字「全部」都是入聲字？", ["天、地、玄、黃", "石、竹、菊、福", "春、夏、秋、冬", "江、河、湖、海"], 1, ["天(平)、地(仄)、玄(平)、黃(平)。", "石(ㄕˊ)、竹(ㄓㄨˊ)、菊(ㄐㄩˊ)、福(ㄈㄨˊ)。這四個字在國語都是二聲，但全都是發音急促的「入聲字(仄聲)」，為會考高頻陷阱字！", "皆為平聲。", "江、河、湖皆平聲，海(仄)。"]);
            addQ("國語的「第一聲」與「第二聲」，在古代四聲分類中通常對應到哪一種聲調？", ["上聲", "去聲", "平聲", "入聲"], 2, ["上聲對應國語第三聲。", "去聲對應國語第四聲。", "國語的第一聲(陰平)與第二聲(陽平)，在古代都統稱為「平聲」。", "入聲在國語中已消失，散入一二三四聲中。"]);
            addQ("小美想寫一首七言律詩，請問她挑選韻腳字時，應該挑選下列哪一種聲調的字最適當？", ["平聲字", "上聲字", "去聲字", "入聲字"], 0, ["近體詩(絕句、律詩)的格律規定，幾乎都要求押「平聲韻」。因此挑選平聲字(如：東、冬、江、陽)最正確。", "上聲為仄聲，近體詩極少押仄韻。", "去聲為仄聲，近體詩極少押仄韻。", "入聲為仄聲，近體詩極少押仄韻。"]);
            addQ("下列哪一個字「不是」入聲字？", ["十", "得", "屋", "飛"], 3, ["十 (ㄕˊ)，入聲。", "得 (ㄉㄜˊ)，入聲。", "屋 (ㄨ)，入聲。", "飛 (ㄈㄟ)，國語一聲，台語念起來也長長的不會急促，是標準的「平聲字」。"]);
            addQ("「國語四聲」與「平仄」的對應，何者敘述正確？", ["國語一、二聲絕對是平聲，沒有例外", "國語三、四聲必定是仄聲", "入聲字在國語中統一念作第四聲", "「平仄」的「仄」只包含第三聲和第四聲"], 1, ["錯誤。國語一二聲「大部分」是平聲，但有很多「入聲字(仄聲)」在國語裡念一二聲(如：白、竹、十)。", "正確。國語的三(上聲)、四(去聲)聲，在古代也是仄聲，這點沒有例外。", "入聲字在國語散入各聲調，並非全念第四聲。", "「仄」包含上聲、去聲、以及「入聲」。"]);
            addQ("「一三五不論，二四六分明」是指近體詩中哪些位置的字必須嚴格遵守平仄相對？", ["每首詩的第二、四、六句", "每句的第二、四、六個字", "整首詩只有第二、四、六個字", "押韻的字"], 1, ["指的是字，不是句。", "這是近體詩平仄的基本口訣。指的是「同一句」裡面的第1, 3, 5個字平仄可以通融；但「每句的第2, 4, 6個字」的平仄必須嚴格遵守規定。", "是每一句的第2,4,6個字。", "押韻字通常在句末(第5字或第7字)。"]);
            addQ("請利用方言（如台語、客語）或發音長短，判斷下列哪一個選項的字皆為「入聲字」？", ["出、歇、宅、昔", "山、川、明、月", "風、雲、雨、露", "春、夏、秋、冬"], 0, ["出(ㄔㄨ)、歇(ㄒㄧㄝ)、宅(ㄓㄞˊ)、昔(ㄒㄧˊ)，這四個字用台語念都會有急促收尾的感覺，皆為入聲字。", "包含了平聲字(山、川、明)。", "包含了平聲字(風、雲)。", "包含了平聲字(春、秋、冬)。"]);
            addQ("下列對「平仄」的理解，何者有誤？", ["平聲包含陰平與陽平", "仄聲包含上聲、去聲與入聲", "入聲字的特色是發音短促", "古代的平仄完全等同於現代國語的四聲"], 3, ["敘述完全正確。", "敘述完全正確。", "敘述完全正確。", "錯誤。古代有「入聲」，但現代國語中入聲已經消失，這才導致我們看古詩平仄時常遇到「國語讀一二聲，實為仄聲」的陷阱。"]);
            addQ("國文老師在黑板上寫了「長短句」、「詩餘」、「倚聲」，請問這堂課的主題最可能是什麼？", ["樂府詩", "近體詩", "宋詞", "元曲"], 2, ["樂府詩別稱為歌、行等。", "近體詩別稱為今體詩。", "「詩餘(詩降格為詞)」、「長短句(配合樂譜句式不一)」、「倚聲(依附樂譜填詞)」皆為【宋詞】最經典的別稱。", "元曲別稱為詞餘。"]);
            addQ("關於「詞牌」與「曲牌」的敘述，下列何者正確？", ["決定了作品的思想與內容", "都是音樂的曲調名稱（樂譜）", "詞牌可以換韻，曲牌也可以換韻", "詞牌允許加襯字，曲牌不允許"], 1, ["牌名與內容絕對無關。", "兩者本質上都是當時的流行「樂譜」，規定了填詞時的字數、句數與平仄格律。", "詞可換韻，但【曲絕對不可換韻】(一韻到底)。", "寫反了，是【曲允許加襯字】，詞不允許。"]);
            addQ("小強在背誦詩詞曲的格律，他發現有一個體裁的押韻規定最為嚴格，被稱為「一韻到底，不可換韻」。這最有可能是指下列何者？", ["古體詩", "宋詞", "元曲（散曲）", "樂府詩"], 2, ["古體詩可換韻。", "宋詞可換韻(依詞牌規定)。", "會考大重點：元曲(無論小令或散套)必須「一韻到底，不可換韻」。", "樂府詩可換韻。"]);
            addQ("「詞」與「曲」在形式上非常相似，都是長短句，也都要配合音樂。但要如何快速分辨兩者？", ["看有沒有對仗", "看句子的長度是否超過十個字", "看句子中是否出現了『襯字』", "看作者是男生還是女生"], 2, ["兩者皆不強制對仗。", "兩者的句子長度皆不固定。", "元曲為了讓民間演唱更通俗流暢，允許在正文之外添加「不限平仄與字數」的【襯字】。這是曲獨有而詞沒有的最大特色！", "與作者性別無關。"]);
            addQ("宋詞分為「婉約派」與「豪放派」。請問被譽為詞之正宗（正格），風格細膩柔美的是哪一派？", ["豪放派", "田園派", "寫實派", "婉約派"], 3, ["豪放派(蘇軾)不拘音律，被視為詞的「變調」。", "田園派為唐詩流派。", "寫實派為唐詩流派。", "詞發源於青樓酒館，本來就是給歌妓演唱的，因此描寫離愁別緒的「婉約派」(李清照、柳永)才是詞的正宗(正格)。"]);
            addQ("下列哪一位不是「宋詞」的代表作家？", ["李清照", "蘇軾", "馬致遠", "辛棄疾"], 2, ["李清照為宋詞婉約派宗師。", "蘇軾為宋詞豪放派大師。", "馬致遠是【元曲】前期三大家之一(代表作：天淨沙·秋思)。", "辛棄疾為宋詞豪放派大師。"]);
            addQ("元曲分為「小令」與「散套」，兩者的區分標準為何？", ["字數是否超過58字", "是否可以加入襯字", "是由單一曲牌還是多個曲牌組成", "是否可以換韻"], 2, ["字數分界(58字)是「宋詞(小令/中調/長調)」的標準。", "兩者皆可加襯字。", "【小令】是獨立的一支曲子(單一曲牌)；【散套】是由同一宮調的數支曲子串聯起來的長篇組曲。", "兩者皆不可換韻。"]);
            addQ("詞的字數長短分類中，超過多少字被稱為「長調」？", ["50字以上", "59字以上", "91字以上", "沒有字數限制"], 2, ["此為小令範圍。", "此為中調範圍。", "詞的字數分類：小令(58字以下)、中調(59~90字)、長調(91字含以上)。", "字數受詞牌限制。"]);
            addQ("「枯藤老樹昏鴉，小橋流水人家...夕陽西下，斷腸人在天涯。」這首作品的體裁為何？", ["五言絕句", "宋詞（小令）", "元曲（散曲小令）", "樂府詩"], 2, ["句子長短不一，非絕句。", "這首是一韻到底且帶有強烈民間俗語色彩，為馬致遠的名作，非宋詞。", "這是馬致遠的〈天淨沙·秋思〉，天淨沙是曲牌，全首為單一曲牌，故為【元曲(散曲)的小令】。", "時代風格皆非樂府。"]);
            addQ("下列對「元曲」的敘述，何者有誤？", ["別稱詞餘", "可以加襯字", "曲牌與內容無關", "散套可以中途變換韻腳"], 3, ["敘述正確。由詞演變而來。", "敘述正確。可加襯字使語氣活潑。", "敘述正確。曲牌只是樂譜。", "錯誤。元曲的死穴規定就是【絕對不可換韻】！散套即使由多個曲牌組成，首尾也必須一韻到底。"]);
            addQ("「樂府詩」原本是指漢代管理音樂的官署所採集的詩歌，因此它最大特色是什麼？", ["句式必須全部為五言", "平仄規定極度嚴格", "可以配合音樂歌唱", "必須一韻到底，不可換韻"], 2, ["樂府詩多為長短句。", "古體詩與樂府詩皆不限平仄。", "「樂府」本是音樂機構，因此樂府詩的最大特徵就是「入樂」，可以配合樂器歌唱。", "樂府詩可以換韻。"]);
            addQ("〈古詩十九首〉是哪一種文學體裁的代表作？", ["樂府詩", "五言古詩", "近體詩", "宋詞"], 1, ["非樂府，主要不入樂。", "〈古詩十九首〉(如：涉江采芙蓉、迢迢牽牛星)是東漢末年文人創作的【五言古詩】代表作，標誌著五言詩的成熟。", "時代不符。", "時代不符。"]);
            addQ("小華讀到一首詩，發現全詩有十句，每句都是五個字，且中途換了兩次韻腳。請問這首詩最可能屬於下列何者？", ["五言律詩", "五言絕句", "五言古詩", "五言詞"], 2, ["律詩固定 8 句，且不可換韻。", "絕句固定 4 句。", "十句(超過8句的限制) + 換韻 = 毫無疑問是不受格律拘束的【古體詩】。", "詞多為長短句，無此稱呼。"]);
            addQ("下列哪一個文學體裁的名稱中，常帶有「歌、行、吟、弄」等字眼？", ["近體詩", "樂府詩", "宋詞", "元曲"], 1, ["近體詩不帶此類字眼。", "樂府詩因為是配合音樂演唱的歌曲，所以標題常帶有音樂性質的字眼，如〈長恨歌〉、〈琵琶行〉、〈游子吟〉、〈梅花弄〉等。", "宋詞帶詞牌名。", "元曲帶曲牌名。"]);
            addQ("古詩與樂府詩的比較，何者正確？", ["兩者皆可換韻", "古詩可入樂，樂府不可", "古詩句式多長短句，樂府多五七言", "兩者皆有嚴格平仄限制"], 0, ["正確，兩者皆為唐代以前的古體詩體系，押韻自由，皆可換韻。", "寫反了。樂府可入樂，古詩多為徒誦(不入樂)。", "寫反了。古詩句式較整齊(多五七言)，樂府多長短句。", "兩者皆「不限平仄」。"]);
            addQ("〈上邪〉：「上邪！我欲與君相知，長命無絕衰...」此篇作品不限字數句數，且換了韻腳。它最可能是哪種體裁？", ["絕句", "律詩", "樂府詩", "宋詞"], 2, ["不符合絕句格律。", "不符合律詩格律。", "〈上邪〉是著名的漢代民間情歌，屬於【樂府詩】，特色是長短句不一、不限字數句數、可換韻。", "時代與格式不符。"]);
            addQ("關於古體詩的對仗規定，何者正確？", ["完全不需要對仗", "必須全篇對仗", "只有頷聯與頸聯需要對仗", "首句與末句必須對仗"], 0, ["古體詩(含樂府、古詩)完全沒有對仗的規定，非常自由。(有時看似對仗，只是作者行文的巧合)。", "無此規定。", "這是「律詩」的規定。", "無此規定。"]);
            addQ("樂府詩與古詩在漢魏晉時期最主要的差異點在於什麼？", ["平仄是否嚴格", "是否能配合音樂歌唱", "是否可以換韻", "是否有字數限制"], 1, ["兩者皆不限平仄。", "兩者在格律上都很自由。最大的差異在於音樂性：【樂府詩】可以配樂歌唱，【古詩】則主要用於朗誦(徒誦)。", "兩者皆可換韻。", "兩者皆無嚴格字數限制。"]);
            addQ("下列哪一首詩的標題一看就知道「不是」樂府詩？", ["白雪歌", "燕歌行", "登鸛雀樓", "關山月"], 2, ["有「歌」字，為樂府詩題。", "有「行」字，為樂府詩題。", "〈登鸛雀樓〉(白日依山盡)是王之渙的五言絕句(近體詩)。", "「月、引、弄」等也是樂府常見曲調名。"]);
            addQ("「古風」通常是用來代稱哪一種文學體裁？", ["樂府詩", "古詩", "近體詩", "現代詩"], 1, ["樂府詩稱為歌行。", "古詩又被別稱為「古風」。例如李白有〈古風五十九首〉，藉由古老的詩歌形式抒發情懷。", "近體詩稱為今體詩。", "現代詩稱為新詩。"]);
            addQ("律詩的八個句子，每兩句組成一聯。請問要求「必須對仗」的是哪兩聯？", ["首聯、尾聯", "首聯、頷聯", "頷聯、頸聯", "頸聯、尾聯"], 2, ["首尾聯不強制對仗。", "首聯不強制對仗。", "律詩八句共四聯：首聯(1,2)、頷聯(3,4)、頸聯(5,6)、尾聯(7,8)。會考大考點：中間的【頷聯】與【頸聯】必須嚴格對仗！", "尾聯不強制對仗。"]);
            addQ("判斷近體詩是否押韻，主要是看哪裡的字？", ["每句的第一個字", "奇數句的最後一個字", "偶數句的最後一個字", "整首詩的中間字"], 2, ["押韻在句末。", "奇數句末通常不押韻(除首句外)。", "無論絕句或律詩，押韻的位置都在【偶數句的最後一個字】(第2,4,6,8句尾)。第一句的最後一個字則是「可押可不押」。", "押韻在句末。"]);
            addQ("下列關於近體詩「押韻」的敘述，何者正確？", ["可以隨意更換韻腳", "只能押仄聲韻", "第一句絕對不可押韻", "一韻到底，通常押平聲韻"], 3, ["絕對不可換韻。", "近體詩極少押仄韻，幾乎都是平聲韻。", "第一句「可押可不押」。", "正確。近體詩最嚴格的特徵就是一韻到底，且通篇通常押平聲韻。"]);
            addQ("杜甫的〈春望〉：「國破山河在，城春草木深。感時花濺淚，恨別鳥驚心。烽火連三月，家書抵萬金。白頭搔更短，渾欲不勝簪。」請問此詩的韻腳為何？", ["在、淚、月、短", "深、心、金、簪", "在、深、淚、心", "國、城、感、恨"], 1, ["這些字多為仄聲，不押韻。", "押韻字在偶數句尾：第2句(深)、第4句(心)、第6句(金)、第8句(簪)。皆押 ㄣ 韻。(第一句「在」不押韻)。", "不符合偶數句押韻規則。", "不符合句末押韻規則。"]);
            addQ("承上題〈春望〉，詩中的哪兩句構成了「頸聯」，並且符合對仗的要求？", ["國破山河在，城春草木深", "感時花濺淚，恨別鳥驚心", "烽火連三月，家書抵萬金", "白頭搔更短，渾欲不勝簪"], 2, ["第1,2句為「首聯」。", "第3,4句為「頷聯」(有對仗)。", "第5,6句為「頸聯」。烽火對家書(名詞)，連對抵(動詞)，三月對萬金(數詞+名詞)，對仗極為工整。", "第7,8句為「尾聯」。"]);
            addQ("如果一首詩是「七言絕句」，它總共會有多少個字？", ["20字", "28字", "40字", "56字"], 1, ["這是五言絕句。", "絕句固定4句，七言代表每句7字。 4 × 7 = 28字。", "這是五言律詩。", "這是七言律詩。"]);
            addQ("如果一首詩是「五言律詩」，它總共會有多少個字？", ["20字", "28字", "40字", "56字"], 2, ["這是五言絕句。", "這是七言絕句。", "律詩固定8句，五言代表每句5字。 8 × 5 = 40字。", "這是七言律詩。"]);
            addQ("王維〈送別〉：「山中相送罷，日暮掩柴扉。春草明年綠，王孫歸不歸。」這首詩第一句的句尾「罷」字沒有和「扉、歸」押韻。這在近體詩中是否符合格律？", ["不符合，近體詩每一句都要押韻", "不符合，第一句一定要押韻", "符合，近體詩第一句本來就「可押可不押」", "符合，因為這是一首古體詩"], 2, ["偶數句才必押。", "第一句可押可不押。", "絕句或律詩的押韻規則是：偶數句必押，第一句【可押可不押】。因此「罷」(仄聲)不押韻，完全符合近體詩格律。", "這是絕句(近體詩)。"]);
            addQ("近體詩的平仄規定中，要求「偶數字平仄相對」。若第一句的平仄為「平平仄仄平」，則第二句的平仄最可能為何？", ["平平仄仄平", "仄仄平平仄", "仄仄仄平平", "平平平仄仄"], 1, ["沒有平仄相對。", "依據「一聯之內，平仄相對」原則，第一句與第二句的第2, 4, 6字平仄必須相反。第一句第2字「平」，第二句第2字須為「仄」。第一句第4字「仄」，第二句須為「平」。(B)符合。", "不完全相對。", "不完全相對。"]);
            addQ("下列哪一項並非判斷一首詩為「近體詩」的必要條件？", ["句數固定（4句或8句）", "字數整齊（五言或七言）", "全詩不可換韻", "全詩每句皆須對仗"], 3, ["這是近體詩的嚴格鐵律。", "這是近體詩的嚴格鐵律。", "這是近體詩的嚴格鐵律。", "錯誤。絕句完全不要求對仗；律詩也只要求中間兩聯(頷、頸聯)對仗，不要求「每句皆須對仗」。"]);
            addQ("中國古典小說的發展脈絡中，唐代流行的小說體裁稱為什麼？", ["筆記小說", "傳奇", "話本", "章回小說"], 1, ["魏晉南北朝(漢魏六朝)。", "唐代小說已發展出完整結構與人物，稱為「傳奇」(傳述奇異之事)。", "宋代。", "元明清。"]);
            addQ("宋代城市經濟繁榮，出現了說書行業。說書人所使用的「故事底本」稱為什麼，它也是白話小說的雛形？", ["筆記", "傳奇", "話本", "套數"], 2, ["魏晉時代的小說。", "唐代小說。", "說書人講述故事的腳本稱為「話本」，為了讓大眾聽懂，多使用白話文，促成了後世明清白話章回小說的發展。", "元曲的分類。"]);
            addQ("下列哪一本古典名著屬於魏晉南北朝的「筆記小說」，且是用文言文寫成的？", ["《水滸傳》", "《聊齋志異》", "《紅樓夢》", "《世說新語》"], 3, ["明末的白話章回小說。", "清代的文言短篇神怪小說。", "清代的白話章回言情小說。", "《世說新語》由南朝宋劉義慶編撰，是魏晉志人筆記小說的代表，以文言文撰寫。"]);
            addQ("《三國演義》是中國最著名的歷史小說，其成書的年代背景為何？", ["漢代", "唐代", "元末明初", "清代"], 2, ["時代不符。", "時代不符。", "《三國演義》(羅貫中 著)與《水滸傳》(施耐庵 著) 皆成書於【元末明初】，為長篇白話章回小說的先驅。", "時代不符。"]);
            addQ("中國古典小說的分類中，《西遊記》被歸類為哪一種小說？", ["俠義小說", "神怪小說", "言情小說", "諷刺小說"], 1, ["俠義代表：《水滸傳》。", "神怪代表：《西遊記》(吳承恩 著)，充滿妖魔神仙鬥法。", "言情代表：《紅樓夢》。", "諷刺代表：《儒林外史》。"]);
            addQ("《老殘遊記》的作者劉鶚，在書中獨排眾議，強烈譴責了哪一種人的「罪尤（罪惡）」，認為他們剛愎自用造成的傷害比貪官還大？", ["土匪強盜", "清官", "落第書生", "外國侵略者"], 1, ["並非此書譴責的重點。", "會考大考點！《老殘遊記》最特別的就是「揭發清官之罪尤為獨到」。劉鶚認為自以為清廉的官員，往往固執己見、不通人情，製造了無數冤案。", "《儒林外史》探討科舉與書生。", "並非此書譴責的重點。"]);
            addQ("被譽為中國古典「言情小說」的巔峰之作，以賈寶玉、林黛玉為主角的是哪一本書？", ["《紅樓夢》", "《聊齋志異》", "《世說新語》", "《儒林外史》"], 0, ["清代曹雪芹的《紅樓夢》以賈家等四大家族的興衰為背景，深刻描寫賈寶玉與金陵十二釵的悲劇，是言情小說最高傑作。", "寫花妖狐魅。", "寫魏晉名士。", "諷刺科舉。"]);
            addQ("下列古典小說與其作者的配對，何者「錯誤」？", ["《三國演義》—羅貫中", "《水滸傳》—施耐庵", "《西遊記》—蒲松齡", "《儒林外史》—吳敬梓"], 2, ["配對正確。", "配對正確。", "錯誤。《西遊記》作者為明代【吳承恩】；蒲松齡是清代《聊齋志異》的作者。", "配對正確。"]);
            addQ("小華想要了解魏晉南北朝時期，文人雅士的機智對答與生活軼事（如「七步成詩」）。他應該閱讀哪一本書？", ["《水滸傳》", "《聊齋志異》", "《老殘遊記》", "《世說新語》"], 3, ["寫草莽英雄。", "寫神鬼怪異。", "寫清末社會。", "《世說新語》是專門記錄東漢至東晉間名士言行軼事、清言玄語的「志人」小說。"]);
            addQ("《聊齋志異》是一本充滿仙狐鬼魅故事的奇書，關於此書的敘述何者正確？", ["是一部長篇白話章回小說", "作者為清代的蒲松齡", "內容主要揭露科舉制度的弊端", "全書以宋代話本為基礎改編"], 1, ["它是「短篇、文言文」小說。", "正確，清代蒲松齡所著。", "揭露科舉弊端的是《儒林外史》。《聊齋》主要寫花妖狐魅情意深摯。", "作者自行蒐集民間傳說創作，非宋話本。"]);
            addQ("在民國八年，大力提倡「我手寫我口」，推動白話文運動，引發五四文學革命的關鍵人物是誰？", ["徐志摩", "賴和", "胡適", "余光中"], 2, ["現代浪漫派詩人。", "台灣新文學之父。", "胡適是近代中國提倡白話文、推翻文言文束縛的先驅，著有《白話文學史》。", "台灣現代詩人。"]);
            addQ("現代詩人徐志摩的詩風最為突出的特色為何？", ["充滿強烈的反日與抗爭意識", "詞采華美，具有強烈的浪漫思想", "具有濃厚的中國歷史文化鄉愁", "以樸素的語言描寫台灣農村生活"], 1, ["此為賴和的特色。", "徐志摩是「新月詩社」的代表，作品(如〈再別康橋〉)熱情洋溢，充滿浪漫派色彩。", "此為余光中的特色。", "此為吳晟的特色。"]);
            addQ("哪一位現代作家同時身兼醫師身分，常免費為窮人治病，被尊稱為「彰化媽祖」，並且是「臺灣新文學之父」？", ["胡適", "余光中", "吳晟", "賴和"], 3, ["文學革命推手。", "以詩文雙絕著稱。", "台灣田園詩人。", "賴和在日治時期以文學作為對抗殖民的武器(反日、反迷信)，同時醫德高尚，故有「臺灣新文學之父」與「彰化媽祖(仁醫)」的美譽。"]);
            addQ("「以左手寫散文、右手寫詩」是哪一位文學大師對自己雙重文學成就的自喻？", ["徐志摩", "賴和", "余光中", "吳晟"], 2, ["雖有散文名篇，但不以此自喻。", "以小說與新詩反日抗爭。", "余光中在現代詩(如〈鄉愁〉、〈白玉苦瓜〉)與散文(如〈聽聽那冷雨〉)上皆有極高成就，故以此自喻。", "以描寫農村見長。"]);
            addQ("若想閱讀深刻反映台灣農村社會面對工業化衝擊、充滿鄉土情感的新詩，最適合挑選哪一位作家的作品？", ["徐志摩", "胡適", "余光中", "吳晟"], 3, ["作品多為浪漫風。", "作品為早期白話詩實驗。", "作品多含中國意識。", "吳晟身兼農夫與教師，詩風樸素、語言鄉土，是台灣田園詩、鄉土詩的最具代表性作家(如《吾鄉印象》)。"]);
            addQ("〈再別康橋〉與〈我所知道的康橋〉，分別是哪一位作家的名詩與散文？", ["胡適", "徐志摩", "余光中", "賴和"], 1, ["非胡適作品。", "康橋即英國劍橋大學，徐志摩曾在此遊學，深受其浪漫氣息影響，留下這些傳世名作。", "非余光中作品。", "非賴和作品。"]);
            addQ("下列作家與其「文學主張或特色」的配對，何者錯誤？", ["胡適：開創新文學，提倡白話文", "賴和：反日、反迷信", "余光中：詩風質樸，專寫台灣農民", "徐志摩：創新月詩社，熱情浪漫"], 2, ["配對正確。", "配對正確。", "錯誤。余光中的特色是「中國意識濃厚、陽剛之美」；專寫台灣農民、詩風質樸的是「吳晟」。", "配對正確。"]);
            addQ("〈聽聽那冷雨〉是現代文學中極具聲韻之美的散文名篇，其作者是誰？", ["徐志摩", "賴和", "余光中", "吳晟"], 2, ["徐志摩散文名作為〈我所知道的康橋〉。", "賴和多寫反日小說。", "余光中。這篇散文展現了他「以詩為文」的功力，文字充滿節奏與感性。", "吳晟多寫農村題材。"]);
            addQ("「現代詩」又稱為新詩或白話詩，它與古典「近體詩」最大的不同點在於？", ["現代詩完全不能押韻", "現代詩不再有字數、句數與平仄的嚴格限制", "現代詩只能描寫現代科技生活", "現代詩必須配合西方樂器演唱"], 1, ["現代詩「可押可不押」，並非不能押韻。", "民國以來的現代詩打破了傳統近體詩的格律束縛，不限字數句數、不要求平仄對仗，形式極度自由。", "題材完全不限。", "無此限制。"]);
            addQ("若要研究日治時期台灣底層人民的苦難與思想啟蒙，哪一本書是必讀的經典？", ["《白話文學史》", "《翡冷翠山居閒話》", "《賴和先生全集》", "《白玉苦瓜》"], 2, ["胡適，文學理論。", "徐志摩，歐洲遊記。", "賴和(台灣新文學之父)，作品強烈反抗日本殖民與舊迷信，最符合題意。", "余光中，現代詩。"]);
            addQ("【綜合判斷】小明讀到一首詩，格式為四句，每句七個字。他發現這首詩第一句押了平聲韻，第二句與第四句也押了同一個平聲韻，且符合「一三五不論，二四六分明」的規律。這首詩最可能是？", ["七言古詩", "七言絕句", "七言律詩", "宋詞小令"], 1, ["古詩不講究平仄規律。", "四句(絕句) + 七字(七言) + 押平聲韻 + 符合平仄(近體詩特徵) = 七言絕句。", "律詩必須有八句。", "詞多為長短句。"]);
            addQ("【綜合判斷】某部中國古典文學作品，內容以文言文撰寫，篇幅短小，描寫狐妖與書生的愛情故事，藉此諷刺當時社會的黑暗。這部作品是？", ["《世說新語》", "《紅樓夢》", "《老殘遊記》", "《聊齋志異》"], 3, ["記魏晉名士，無狐妖。", "為白話章回長篇小說。", "為白話章回長篇小說。", "關鍵字：文言文、短篇、狐妖愛情(神怪)、諷刺。這正是清代蒲松齡《聊齋志異》的特色。"]);
            addQ("【綜合判斷】李白〈將進酒〉：「君不見黃河之水天上來，奔流到海不復回...」此詩句法長短不一，豪放不羈，且中途換韻。請問這屬於何種體裁？", ["近體詩", "宋詞", "樂府詩", "散套"], 2, ["近體詩句式整齊、不可換韻。", "李白為唐代人，宋詞尚未完全成形。", "這是唐代詩人沿用漢代【樂府詩】舊題(將進酒)所作的古體詩系作品。特徵：長短句、可換韻、不拘格律。", "散套為元曲，不可換韻。"]);
            addQ("【平仄實戰】下列哪一個國語讀音為「第二聲（陽平）」的字，在古代其實是「入聲字」（仄聲），寫律詩時絕對不能放在要求平聲的位置？", ["時", "菊", "明", "寒"], 1, ["時(ㄕˊ)，平聲。", "菊(ㄐㄩˊ)，國語二聲，但用台語念極為短促，是標準的「入聲字(仄聲)」。這是平仄判斷的大魔王陷阱！", "明(ㄇㄧㄥˊ)，平聲。", "寒(ㄏㄢˊ)，平聲。"]);
            addQ("【流派比較】同為描寫戰場與邊疆，唐代「邊塞派」詩人（如王昌齡）與宋代「豪放派」詞人（如辛棄疾）最大的不同可能在於？", ["邊塞派受格律限制較少，豪放派受詞牌嚴格限制", "邊塞派以文言文創作，豪放派以白話文創作", "使用的文學體裁不同（詩 vs 詞）", "邊塞派只能寫五言，豪放派只能寫七言"], 2, ["邊塞派多寫近體詩，格律限制也很嚴格。", "皆為文言(古典文學)。", "最明顯的不同就是體裁：唐代盛行「詩」(句式整齊)；宋代盛行「詞」(長短句配合詞牌)。", "皆無此限制。"]);
            addQ("【小說知識】「章回小說」是明清時代的主流。下列哪一本書「不屬於」白話章回小說？", ["《水滸傳》", "《三國演義》", "《世說新語》", "《儒林外史》"], 2, ["明末的白話章回小說。", "明末的白話章回小說。", "《世說新語》是魏晉時代的作品，屬於短篇的「文言筆記小說」。其餘三本皆為明清的白話章回小說。", "清代的白話章回小說。"]);
            addQ("【古典常識】下列對「詞牌」與「曲牌」的敘述，何者正確？", ["兩者皆可中途變換韻腳", "兩者的標題即代表該篇作品的內容", "曲牌允許作者自由添加「襯字」以補足語氣", "詞牌只能用於小令，曲牌只能用於散套"], 2, ["曲牌絕對【不可換韻】。", "牌名只是樂譜，與內容【無關】。", "正確。元曲(曲牌)最大的特色就是允許加【襯字】(不拘平仄字數)。", "詞曲皆有小令等各種長短形式。"]);

                                            <div>
                                                <div class="font-bold text-slate-800 text-xl md:text-2xl">${h.date}</div>
                                                <div class="text-lg text-slate-500 mt-2 font-medium">共 ${h.total} 題，答對 <span class="font-bold text-slate-700">${h.correct}</span> 題</div>
                                            </div>
                                            <div class="text-5xl font-black ${h.score >= 80 ? 'text-emerald-600' : (h.score < 60 ? 'text-rose-500' : 'text-amber-500')}">${h.score}<span class="text-2xl ml-1 font-bold">分</span></div>
                                        </div>
                                    `).join('') || '<p class="text-xl text-slate-400 text-center py-10 font-bold">目前還沒有測驗紀錄喔</p>'}
                                </div>
                            </div>

                            <!-- 登入紀錄 -->
                            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden h-fit">
                                <div class="bg-slate-50 p-6 border-b border-slate-200">
                                    <h3 class="text-3xl font-bold text-slate-800 flex items-center"><span class="mr-3 text-3xl">👣</span>最近登入足跡</h3>
                                </div>
                                <div class="p-6 md:p-8 space-y-4 max-h-[40vh] overflow-y-auto">
                                    ${(userData.loginHistory || []).slice().reverse().map((time, i) => `
                                        <div class="flex items-center p-4 rounded-xl border border-slate-100 bg-slate-50/50 hover:bg-slate-100 transition-colors">
                                            <span class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 mr-4 text-lg font-bold shadow-inner">${i+1}</span>
                                            <span class="font-bold text-slate-700 text-xl">${new Date(time).toLocaleString()}</span>
                                        </div>
                                    `).join('') || '<p class="text-xl text-slate-400 text-center py-10 font-bold">無登入紀錄</p>'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        initApp();

    </script>
</body>
</html>
