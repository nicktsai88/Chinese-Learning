            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        };

            const themeColors = {

            };

            container.innerHTML = `
                <div class="w-full ${activeTheme} border-b p-5 flex items-center shadow-sm z-10 shrink-0 overflow-hidden transition-colors duration-300">
                    <button onclick="toggleLearnMenu(true)" class="text-orange-800 hover:text-red-600 focus:outline-none flex items-center px-4 py-2 bg-white/80 rounded-xl border border-white shadow-sm mr-4 transition-all hover:shadow">
                        <i class="fas fa-bars text-2xl md:mr-3"></i>
                        <span class="font-bold text-xl hidden md:inline tracking-wide">單元選單</span>
                    </button>
                    <span class="font-extrabold text-2xl md:text-3xl lg:text-4xl truncate drop-shadow-sm" id="current-learn-title">${currentData ? currentData.title : ''}</span>
                </div>
                <div id="learn-overlay" onclick="toggleLearnMenu(false)" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-30 hidden transition-opacity duration-300"></div>
                <div id="learn-drawer" class="fixed inset-y-0 left-0 w-[26rem] max-w-[85vw] bg-white border-r border-orange-100 z-40 transform -translate-x-full transition-transform duration-300 ease-in-out overflow-y-auto shadow-2xl flex flex-col">
                    <div class="p-6 bg-orange-50 flex justify-between items-center border-b border-orange-100 shrink-0">
                        <span class="font-extrabold text-3xl text-orange-900">📑 學習目錄 🗺️</span>
                        <button onclick="toggleLearnMenu(false)" class="text-orange-400 hover:text-red-500 transition-colors bg-white w-12 h-12 rounded-full flex items-center justify-center shadow-sm border border-orange-100"><i class="fas fa-times text-2xl"></i></button>
                        </div>
                    <ul class="py-4 flex-1 px-3 space-y-2">
                        ${learnData.map(d => {
                            const isSelected = learnSubTab === d.id;
                            const themeConfig = {
                                'orange': isSelected ? 'bg-orange-50 text-orange-900 border-orange-500' : 'hover:bg-orange-50/50',
                                'amber': isSelected ? 'bg-amber-50 text-amber-900 border-amber-500' : 'hover:bg-amber-50/50',
                                'rose': isSelected ? 'bg-rose-50 text-rose-900 border-rose-500' : 'hover:bg-rose-50/50',
                                'emerald': isSelected ? 'bg-emerald-50 text-emerald-900 border-emerald-500' : 'hover:bg-emerald-50/50'
                            };
                            const defaultClass = isSelected ? 'bg-orange-50 text-orange-900 border-orange-500 shadow-sm' : 'text-slate-600 border-transparent hover:bg-orange-50 hover:pl-6 hover:text-orange-800';
                            const activeClass = d.theme ? themeConfig[d.theme] : defaultClass;
                            return `
                            <li>
                                <button onclick="selectLearnTab('${d.id}')" id="ltab-${d.id}" class="w-full text-left px-5 py-5 text-xl md:text-2xl font-bold rounded-xl transition-all border-l-8 ${isSelected ? activeClass + ' shadow-sm' : 'text-slate-600 border-transparent hover:bg-orange-50 hover:pl-6 hover:text-orange-800'}">
                                    ${d.title}
                                </button>
                            </li>
                        `}).join('')}
                    </ul>
                </div>
                <div class="flex-1 p-4 md:p-8 lg:p-12 overflow-y-auto overflow-x-hidden w-full relative z-10" id="learn-content-area"></div>
            `;
            renderLearnContent();
        };

        window.selectLearnTab = (id) => {
            learnSubTab = id;
            renderLearnView(el('main-content')); 
            toggleLearnMenu(false);
        };

        window.renderLearnContent = () => {
            const area = el('learn-content-area');
            if(!area) return;
            const data = learnData.find(d => d.id === learnSubTab);
            area.innerHTML = `
                <div class="w-full max-w-[98%] xl:max-w-[96%] mx-auto animate-fade-in pb-16">
                    ${data.content}
                </div>
            `;
        };

        const renderQuizView = (container) => {
            if(!quizState.active) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 overflow-y-auto relative z-10">
                        <div class="glass-card p-10 md:p-16 rounded-3xl shadow-2xl text-center max-w-5xl lg:max-w-6xl w-full border border-white/60 relative overflow-hidden">
                            <div class="absolute top-0 right-0 w-40 h-40 bg-orange-100 rounded-bl-full -z-10 opacity-50"></div>
                            
                            <div class="w-28 h-28 md:w-36 md:h-36 bg-gradient-to-br from-orange-500 to-red-600 rounded-full mx-auto mb-10 flex items-center justify-center shadow-lg">
                                <span class="text-7xl md:text-8xl text-white">🧠</span>
                            </div>
                            
                            <h2 class="text-4xl md:text-6xl font-extrabold mb-8 text-orange-950 tracking-wide">200題 綜合挑戰測驗 🏆</h2>
                            <p class="text-orange-800/80 mb-12 text-2xl md:text-3xl leading-loose">
                                題目涵蓋對聯、題辭全分類，高難度驗收您的精熟度！<br>
                                <span class="bg-orange-100 text-orange-800 font-bold px-6 py-3 rounded-full inline-block mt-8 border border-orange-200 shadow-sm">🌊 瀑布流模式</span><br>
                                <span class="text-xl md:text-2xl text-orange-700/60 mt-4 block font-bold">點擊選項後立即顯示解析，無須換頁，快速複習最有效率！ ✨</span>
                            </p>
                            <button onclick="startQuiz()" class="w-full sm:w-auto bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-700 hover:to-red-700 text-white font-bold py-6 px-20 text-3xl md:text-4xl rounded-2xl shadow-xl transition-all transform hover:-translate-y-1 hover:shadow-2xl">
                                開始挑戰 🚀🔥
                            </button>
                        </div>
                    </div>
                `;
            } else {
                renderQuizWaterfall(container);
            }
        };

        window.startQuiz = () => {
            const qList = [...generate200Questions()].sort(() => 0.5 - Math.random()).map(q => ({
                ...q, selectedAns: null, showExplanation: false, isCorrect: false
            }));
            quizState = { active: true, questions: qList };
            saveQuizState();
            renderQuizView(el('main-content'));
            const navStats = el('nav-quiz-stats');
            if (navStats) { navStats.classList.remove('hidden'); navStats.classList.add('flex'); }
            updateQuizStats();
        };

        window.updateQuizStats = () => {
            if (!quizState.active) return;
            let correct = 0; let incorrect = 0; let answered = 0;
            const total = quizState.questions.length;
            quizState.questions.forEach(q => {
                if (q.showExplanation) {
                    answered++;
                    if (q.isCorrect) correct++; else incorrect++;
                }
            });
            const progressPercent = (answered / total) * 100;
            if (el('nav-stat-correct')) el('nav-stat-correct').innerText = correct;
            if (el('nav-stat-incorrect')) el('nav-stat-incorrect').innerText = incorrect;
            if (el('nav-stat-progress-bar')) el('nav-stat-progress-bar').style.width = progressPercent + '%';

        const renderQuizWaterfall = (container) => {
            let html = `

                        </div>
                        <div id="questions-list" class="space-y-12 w-full">
            `;
            quizState.questions.forEach((_, qIdx) => {
                html += `<div id="q-block-${qIdx}" class="bg-white rounded-3xl shadow-xl overflow-hidden border border-orange-100 transition-all w-full">${generateSingleQuestionHtml(qIdx)}</div>`;
            });
            html += `
                        </div>
                        <button onclick="finishQuizWaterfall()" class="w-full mt-20 bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-extrabold py-8 md:py-10 text-3xl md:text-5xl rounded-3xl shadow-2xl transition-all transform hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(0,0,0,0.2)] flex items-center justify-center break-words border-b-8 border-red-700">
                            🏁 完成測驗並結算成績 📊
                        </button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        };

        const generateSingleQuestionHtml = (qIdx) => {
            const q = quizState.questions[qIdx];
            let optionsHtml = '';
            
            q.opts.forEach((opt, i) => {
                let btnClass = "w-full text-left p-5 md:p-8 text-3xl md:text-4xl rounded-2xl border-2 transition-all duration-200 flex items-center group relative overflow-hidden ";
                let iconHtml = `<span class="w-16 h-16 md:w-20 md:h-20 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center mr-5 md:mr-8 font-extrabold text-3xl md:text-4xl transition-colors shrink-0 shadow-inner group-hover:bg-orange-100 group-hover:text-orange-700">${String.fromCharCode(65+i)}</span>`;
                
                if (!q.showExplanation) {
                    btnClass += "border-orange-100 hover:border-orange-400 hover:bg-orange-50/50 bg-white cursor-pointer hover:shadow-lg";
                } else {
                    if (i === q.ans) {
                        btnClass += "border-emerald-400 bg-emerald-50 text-emerald-900 font-bold shadow-lg z-10 ring-4 ring-emerald-400/20";
                        iconHtml = `<span class="w-16 h-16 md:w-20 md:h-20 rounded-xl bg-emerald-500 text-white flex items-center justify-center mr-5 md:mr-8 font-bold text-4xl md:text-5xl shrink-0 shadow-md">✅</span>`;
                    } else if (i === q.selectedAns) {
                        btnClass += "border-rose-400 bg-rose-50 text-rose-900 font-bold";
                        iconHtml = `<span class="w-16 h-16 md:w-20 md:h-20 rounded-xl bg-rose-500 text-white flex items-center justify-center mr-5 md:mr-8 font-bold text-4xl md:text-5xl shrink-0 shadow-md">❌</span>`;
                    } else {
                        btnClass += "border-slate-100 bg-slate-50 opacity-50 cursor-not-allowed";
                    }
                }

                optionsHtml += `
                    <button ${q.showExplanation ? 'disabled' : `onclick="answerWaterfallQuestion(${qIdx}, ${i})"`} class="${btnClass}">
                        ${iconHtml}
                        <span class="flex-1 leading-relaxed break-words z-10 text-slate-800 group-hover:text-orange-950 font-medium">${opt}</span>
                    </button>
                `;
            });

            let explanationHtml = '';
            if (q.showExplanation) {
                const isCorrect = q.selectedAns === q.ans;
                explanationHtml = `
                    <div class="mt-12 p-8 md:p-10 rounded-3xl border ${isCorrect ? 'bg-emerald-50/50 border-emerald-200' : 'bg-rose-50/50 border-rose-200'} animate-fade-in w-full">
                        <div class="flex items-center mb-8 border-b ${isCorrect ? 'border-emerald-200/50' : 'border-rose-200/50'} pb-6">
                            <div class="w-20 h-20 rounded-full ${isCorrect ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'} flex items-center justify-center mr-6 shrink-0 text-5xl">
                                ${isCorrect ? '🎉' : '😲'}
                            </div>
                            <span class="font-extrabold text-4xl md:text-5xl ${isCorrect ? 'text-emerald-800' : 'text-rose-800'}">${isCorrect ? '太棒了，答對了！' : '哎呀，答錯了！'}</span>
                        </div>
                        <div class="w-full">
                            <p class="font-bold mb-5 text-2xl md:text-3xl text-slate-700 flex items-center"><span class="mr-4">🔍</span>完整題目解析</p>
                            <p class="mt-4 text-2xl md:text-3xl break-words text-slate-700 bg-white p-6 rounded-2xl border border-orange-100 shadow-sm font-medium">正確答案為 <strong class="${isCorrect ? 'text-emerald-600' : 'text-rose-600'} text-3xl md:text-4xl ml-3">(${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</strong></p>
                            <div class="mt-8 p-8 md:p-10 bg-orange-50/50 border border-orange-200/60 rounded-3xl text-orange-950 w-full relative overflow-hidden">
                                <div class="absolute left-0 top-0 bottom-0 w-3 bg-orange-400"></div>
                                <p class="font-bold text-2xl md:text-3xl mb-5 flex items-center"><span class="mr-4 text-3xl">💡</span>深度解析</p>
                                <p class="text-2xl md:text-3xl leading-loose break-words whitespace-pre-wrap pl-3 font-medium">${q.exp}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            const isFav = userData.favorites && userData.favorites.includes(q.q);
            const favIconHtml = isFav 
                ? '<i class="fa-solid fa-heart text-rose-500"></i>' 
                : '<i class="fa-regular fa-heart text-rose-500"></i>';

            return `
                <div class="px-8 md:px-12 py-6 border-b border-orange-100 flex justify-between items-center transition-colors ${q.showExplanation ? (q.selectedAns === q.ans ? 'bg-gradient-to-r from-emerald-50 to-white' : 'bg-gradient-to-r from-rose-50 to-white') : 'bg-orange-50/30'}">
                    <div class="flex items-center">
                        <span class="font-extrabold text-orange-500 text-2xl md:text-3xl bg-white px-5 py-2 rounded-xl border border-orange-100 shadow-sm">🤔 Q ${qIdx + 1}</span>
                        <button onclick="toggleQuizFavorite(${qIdx})" class="ml-6 text-[2rem] md:text-5xl hover:scale-110 transition-transform focus:outline-none drop-shadow-sm" title="加入/取消最愛">
                            ${favIconHtml}
                        </button>
                    </div>
                    ${q.showExplanation 
                        ? (q.selectedAns === q.ans 
                            ? '<span class="text-emerald-600 font-bold text-2xl md:text-3xl flex items-center bg-emerald-100 px-5 py-2 rounded-full shadow-sm"><span class="mr-3">✅</span>答對</span>' 
                            : '<span class="text-rose-600 font-bold text-2xl md:text-3xl flex items-center bg-rose-100 px-5 py-2 rounded-full shadow-sm"><span class="mr-3">❌</span>答錯</span>') 
                        : '<span class="text-orange-400 font-bold text-xl md:text-2xl flex items-center bg-orange-100/50 px-5 py-2 rounded-full border border-orange-200"><span class="mr-3">✍️</span>作答區</span>'}
                </div>
                <div class="p-8 md:p-12 w-full overflow-hidden">
                    <h3 class="text-4xl md:text-5xl font-extrabold text-slate-800 mb-12 leading-loose break-words">${q.q}</h3>
                    <div class="space-y-6 w-full">
                        ${optionsHtml}
                    </div>
                    ${explanationHtml}
                </div>
            `;
        };

        window.toggleQuizFavorite = (qIdx) => {
            const q = quizState.questions[qIdx];
            const qText = q.q;
            if (!userData.favorites) userData.favorites = [];
            const idx = userData.favorites.indexOf(qText);
            if (idx > -1) userData.favorites.splice(idx, 1);
            else userData.favorites.push(qText);
            saveUserDataToCloud();
            const block = document.getElementById(`q-block-${qIdx}`);
            if (block) block.innerHTML = generateSingleQuestionHtml(qIdx);
        };

        window.answerWaterfallQuestion = (qIdx, optIdx) => {
            const q = quizState.questions[qIdx];
            if(q.showExplanation) return; 

            const isCorrect = optIdx === q.ans;
            q.selectedAns = optIdx;
            q.showExplanation = true;
            q.isCorrect = isCorrect;
            
            if (isCorrect) {
                playCorrectSound();
                confetti({ particleCount: 60, spread: 70, origin: { y: 0.7 }, zIndex: 10000, colors: ['#f59e0b', '#fbbf24', '#fcd34d', '#ef4444', '#f97316'] });
            } else {
                playWrongSound();
                const mistakeId = q.q; 
                if(!userData.mistakes) userData.mistakes = [];
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({ id: mistakeId, q: q.q, opts: q.opts, ans: q.ans, time: new Date().toISOString() });
                    saveUserDataToCloud();
                }
            }
            saveQuizState();
            const block = document.getElementById(`q-block-${qIdx}`);
            if (block) block.innerHTML = generateSingleQuestionHtml(qIdx);
            updateQuizStats();
        };

        window.finishQuizWaterfall = async () => {
            let correctCount = 0; let answeredCount = 0;
            quizState.questions.forEach(q => {
                if (q.showExplanation) {
                    answeredCount++;
                    if (q.isCorrect) correctCount++;
                }
            });

            if (answeredCount < quizState.questions.length) {
                if(!confirm(`您還有 ${quizState.questions.length - answeredCount} 題尚未作答，確定要直接交卷結算嗎？`)) return;
            }

            quizState.active = false;
            saveQuizState();
            
            const total = quizState.questions.length;
            const scorePercent = Math.round((correctCount / total) * 100);
            
            if (!userData.quizHistory) userData.quizHistory = [];
            userData.quizHistory.push({ date: new Date().toLocaleString(), score: scorePercent, total: total, correct: correctCount });
            if (userData.quizHistory.length > 50) userData.quizHistory = userData.quizHistory.slice(-50);
            saveUserDataToCloud();

            const navStats = el('nav-quiz-stats');
            if (navStats) { navStats.classList.add('hidden'); navStats.classList.remove('flex'); }

            const container = el('main-content');
            container.innerHTML = `
                <div class="w-full flex-1 flex items-center justify-center p-4 md:p-8 overflow-y-auto pb-32 relative z-10">
                    <div class="glass-card p-12 md:p-20 rounded-3xl shadow-2xl text-center max-w-5xl w-full border border-white/60 relative overflow-hidden">
                        <div class="absolute -top-20 -left-20 w-80 h-80 bg-amber-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70 -z-10"></div>
                        <div class="w-40 h-40 md:w-48 md:h-48 bg-gradient-to-br from-amber-300 to-orange-500 rounded-full mx-auto mb-10 flex items-center justify-center shadow-2xl border-4 border-white text-8xl md:text-9xl">🏆</div>
                        <h2 class="text-5xl md:text-6xl lg:text-7xl font-extrabold mb-8 text-orange-950">🎉 測驗完成！ 🎊</h2>
                        <div class="my-12 relative inline-block">
                            <span class="text-9xl md:text-[10rem] lg:text-[14rem] font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-600 drop-shadow-md leading-none">${scorePercent}</span>
                            <span class="text-4xl md:text-5xl text-orange-600 font-bold absolute bottom-6 -right-16">分</span>
                        </div>
                        <div class="bg-orange-50/80 rounded-3xl p-10 mb-12 border border-orange-100 shadow-inner inline-block">
                            <p class="text-orange-900 text-3xl md:text-4xl font-medium">答對 🎯 <span class="text-rose-600 font-black text-4xl md:text-5xl mx-3">${correctCount}</span> 題 / 共作答 📝 ${answeredCount} 題</p>
                            <p class="text-xl md:text-2xl mt-4 text-orange-700/60 font-bold tracking-widest">(總題數 ${total} 題)</p>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-8 w-full max-w-3xl mx-auto">
                            <button onclick="switchTab('mistakes')" class="flex-1 bg-white border-4 border-orange-200 hover:border-orange-300 hover:bg-orange-50 text-orange-700 font-extrabold py-6 px-8 text-3xl rounded-2xl shadow-sm hover:shadow-md transition-all">
                                🩹 查看錯題
                            </button>
                            <button onclick="startQuiz()" class="flex-1 bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 text-white font-extrabold py-6 px-8 text-3xl rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 border-b-4 border-red-800">
                                🔄 重新挑戰
                            </button>
                        </div>
                    </div>
                </div>
            `;
            confetti({ particleCount: 300, spread: 100, origin: { y: 0.3 }, zIndex: 10000, colors: ['#f59e0b', '#fbbf24', '#fcd34d', '#ef4444', '#f97316'] });
        };

        window.clearQuizHistory = () => {
            if(confirm('警告：確定要清除目前的作答紀錄嗎？\n(此動作將會遺失目前所有測驗進度)')) {
                if(confirm('【第二次確認】真的要清除作答紀錄並放棄目前測驗嗎？\n按下「確定」將會清空並返回測驗首頁。')) {
                    quizState = { active: false, currentQ: 0, score: 0, answers: [], questions: [], showExplanation: false, selectedAns: null };
                    saveQuizState();
                    if (el('nav-quiz-stats')) { el('nav-quiz-stats').classList.add('hidden'); el('nav-quiz-stats').classList.remove('flex'); }
                    renderQuizView(el('main-content'));
                }
            }
        };

        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            if(!userData.mistakes || userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-4 md:p-8 text-orange-400 flex-col text-center relative z-10 animate-fade-in">
                        <div class="w-48 h-48 bg-emerald-50 rounded-full flex items-center justify-center mb-10 shadow-inner border-4 border-emerald-200 text-8xl">🥳</div>
                        <h2 class="text-5xl md:text-6xl font-extrabold text-orange-950 mb-5">太棒了！✨</h2>
                        <p class="text-3xl md:text-4xl font-medium text-orange-800/60">目前沒有任何錯題紀錄 🎉</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-4 md:p-8 lg:p-12 overflow-y-auto overflow-x-hidden pb-32 relative z-10">
                    <div class="w-full max-w-[96%] xl:max-w-[98%] mx-auto">
                        <div class="flex justify-between items-end border-b-4 border-rose-200 pb-6 mb-12">
                            <div>
                                <h2 class="text-5xl md:text-6xl font-extrabold text-rose-800 flex items-center"><span class="bg-rose-100 text-rose-600 w-16 h-16 flex items-center justify-center rounded-2xl mr-6 shadow-sm">🩹</span>錯題本 📚</h2>
                                <p class="text-rose-900/50 mt-4 ml-24 font-bold text-xl md:text-2xl">收錄您在測驗中答錯的題目，溫故知新 🔄💡</p>
                            </div>
                            <button onclick="clearMistakes()" class="text-xl md:text-2xl text-rose-500 hover:text-rose-700 bg-white hover:bg-rose-50 px-6 py-4 rounded-xl border-2 border-rose-200 shadow-sm font-bold transition-all flex items-center shrink-0 mb-2"><span class="mr-3">🗑️</span>清空</button>
                        </div>
                        <div class="space-y-12 md:space-y-16 w-full">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-10 md:p-12 rounded-3xl shadow-xl border border-orange-100 w-full overflow-hidden relative group">
                                    <div class="absolute top-0 left-0 w-3 h-full bg-gradient-to-b from-rose-400 to-orange-400"></div>
                                    <h3 class="font-extrabold text-orange-950 mb-12 text-3xl md:text-4xl break-words leading-loose flex items-start">
                                        <span class="text-rose-500 mr-5 text-4xl font-black bg-rose-50 px-4 py-2 rounded-xl">🤔 Q</span>${m.q}
                                    </h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 md:gap-8 text-3xl md:text-[2rem] w-full font-medium">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-6 md:p-8 rounded-2xl break-words transition-all ${idx === m.ans ? 'bg-emerald-50 text-emerald-900 font-bold border-2 border-emerald-400 shadow-md ring-2 ring-emerald-400/20' : 'bg-orange-50 text-slate-600 border border-orange-100'}">
                                                <span class="inline-block w-12 font-bold ${idx === m.ans ? 'text-emerald-600' : 'text-orange-400'}">${String.fromCharCode(65+idx)}.</span> ${opt}
                                                ${idx === m.ans ? '<span class="float-right text-emerald-500 text-4xl">✅</span>' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = () => {
            if(confirm('警告：確定要清空所有錯題紀錄嗎？\n(此動作無法復原)')) {
                if(confirm('【第二次確認】真的要徹底清空錯題本嗎？\n按下「確定」將會刪除所有錯題資料。')) {
                    userData.mistakes = [];
                    saveUserDataToCloud();
                    renderMistakes();
                }
            }
        };

        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            if(!userData.favorites || userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-4 md:p-8 text-orange-400 flex-col text-center relative z-10 animate-fade-in">
                        <div class="w-48 h-48 bg-rose-50 rounded-full flex items-center justify-center mb-10 shadow-inner border-4 border-rose-100 text-8xl">💔</div>
                        <h2 class="text-5xl md:text-6xl font-extrabold text-orange-950 mb-5">暫無收藏</h2>
                        <p class="text-3xl md:text-4xl font-medium text-orange-800/60 mb-12">在測驗中點擊愛心圖示即可收藏題目！ 📌✨</p>
                        <button onclick="switchTab('quiz')" class="bg-white border-4 border-rose-200 text-rose-600 hover:bg-rose-50 font-bold px-12 py-5 text-2xl rounded-full shadow-md transition-colors">🚀 前往測驗</button>
                    </div>`;
                return;
            }

            const allQList = generate200Questions();
            const favQuestions = userData.favorites.map(favText => {
                return allQList.find(q => q.q === favText) || { q: favText, opts: [], ans: 0, exp: '題目資料已遺失或不存在' };
            });

            container.innerHTML = `
                <div class="w-full flex-1 p-4 md:p-8 lg:p-12 overflow-y-auto overflow-x-hidden pb-32 relative z-10">
                    <div class="w-full max-w-[96%] xl:max-w-[98%] mx-auto">
                        <div class="flex items-end border-b-4 border-rose-200 pb-6 mb-12">
                            <h2 class="text-5xl md:text-6xl font-extrabold text-rose-800 flex items-center"><span class="bg-rose-100 text-rose-600 w-16 h-16 flex items-center justify-center rounded-2xl mr-6 shadow-sm">💖</span>我的最愛 🌟</h2>
                            <p class="text-rose-900/50 mt-4 ml-10 font-bold text-xl md:text-2xl hidden sm:block mb-1">您專屬的重點筆記收藏夾 🎒✨</p>
                        </div>
                        <div class="space-y-12 md:space-y-16 w-full">
                            ${favQuestions.map((qObj, i) => {
                                if (qObj.opts.length === 0) return '';
                                return `
                                <div class="bg-white p-10 md:p-12 rounded-3xl shadow-xl border border-rose-100 w-full overflow-hidden relative group">
                                    <div class="absolute top-0 left-0 w-3 h-full bg-gradient-to-b from-rose-400 to-rose-600"></div>
                                    <div class="flex justify-between items-start mb-12">
                                        <h3 class="font-extrabold text-orange-950 text-3xl md:text-4xl break-words leading-loose flex items-start pr-8 flex-1">
                                            <span class="text-rose-500 mr-5 text-4xl font-black bg-rose-50 px-4 py-2 rounded-xl">📌 Q</span>${qObj.q}
                                        </h3>
                                        <button onclick="toggleFavoritePage('${qObj.q}')" class="text-[2.5rem] md:text-5xl hover:scale-110 transition-transform shrink-0 mt-1 focus:outline-none drop-shadow-sm" title="移除最愛">
                                            <i class="fa-solid fa-heart text-rose-500"></i>
                                        </button>
                                    </div>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 md:gap-8 text-3xl md:text-[2rem] w-full font-medium">
                                        ${qObj.opts.map((opt, idx) => `
                                            <div class="p-6 md:p-8 rounded-2xl break-words transition-all ${idx === qObj.ans ? 'bg-emerald-50 text-emerald-900 font-bold border-2 border-emerald-400 shadow-md ring-2 ring-emerald-400/20' : 'bg-slate-50 text-slate-600 border border-slate-200'}">
                                                <span class="inline-block w-12 font-bold ${idx === qObj.ans ? 'text-emerald-600' : 'text-slate-400'}">${String.fromCharCode(65+idx)}.</span> ${opt}
                                                ${idx === qObj.ans ? '<span class="float-right text-emerald-500 text-4xl">✅</span>' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div class="mt-10 p-8 bg-rose-50/50 border border-rose-200/60 rounded-3xl relative overflow-hidden">
                                        <div class="absolute left-0 top-0 bottom-0 w-3 bg-rose-400"></div>
                                        <p class="font-bold text-rose-800 text-2xl md:text-3xl mb-4 flex items-center"><span class="mr-4 text-3xl">💡</span>深度解析</p>
                                        <p class="text-2xl md:text-3xl text-slate-700 leading-loose break-words whitespace-pre-wrap pl-3 font-medium">${qObj.exp}</p>
                                    </div>
                                </div>
                                `;
                            }).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.toggleFavoritePage = (qText) => {
            if (!userData.favorites) return;
            const idx = userData.favorites.indexOf(qText);
            if (idx > -1) {
                if(confirm('確定要從最愛中移除此題嗎？')) {
                    userData.favorites.splice(idx, 1);
                    saveUserDataToCloud();
                    renderFavorites();
                }
            }
        };

        window.renderHistory = (container) => {
            if(!container) container = el('main-content');
            if((!userData.quizHistory || userData.quizHistory.length === 0) && (!userData.loginHistory || userData.loginHistory.length === 0)) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-4 md:p-8 text-orange-400 flex-col text-center relative z-10 animate-fade-in">
                        <div class="w-48 h-48 bg-slate-50 rounded-full flex items-center justify-center mb-10 shadow-inner border-4 border-slate-200 text-8xl">📜</div>
                        <h2 class="text-5xl md:text-6xl font-extrabold text-orange-950 mb-5">暫無紀錄</h2>
                        <p class="text-3xl md:text-4xl font-medium text-orange-800/60 mb-12">您還沒有完成任何測驗或留下足跡喔！</p>
                        <button onclick="switchTab('quiz')" class="bg-white border-4 border-orange-200 text-orange-600 hover:bg-orange-50 font-bold px-12 py-5 text-2xl rounded-full shadow-md transition-colors">🚀 前往測驗</button>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-4 md:p-8 lg:p-12 overflow-y-auto overflow-x-hidden pb-32 relative z-10">
                    <div class="w-full max-w-[96%] xl:max-w-[98%] mx-auto">
                        <div class="flex justify-between items-end border-b-4 border-amber-300 pb-6 mb-12">
                            <div>
                                <h2 class="text-5xl md:text-6xl font-extrabold text-amber-800 flex items-center"><span class="bg-amber-100 text-amber-600 w-16 h-16 flex items-center justify-center rounded-2xl mr-6 shadow-sm">📜</span>作答與登入紀錄</h2>
                                <p class="text-amber-900/60 mt-4 ml-24 font-bold text-xl md:text-2xl">追蹤您的學習軌跡，跨裝置同步更新 ☁️</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                            <!-- 作答紀錄 -->
                            <div class="bg-white rounded-3xl shadow-xl border border-amber-100 overflow-hidden">
                                <div class="bg-amber-50 p-8 border-b border-amber-200">
                                    <h3 class="text-4xl font-bold text-amber-900 flex items-center"><span class="mr-4 text-4xl">🎯</span>最近作答成績</h3>
                                </div>
                                <div class="p-8 space-y-6 max-h-[60vh] overflow-y-auto">
                                    ${(userData.quizHistory || []).slice().reverse().map((h, i) => `
                                        <div class="flex justify-between items-center p-6 rounded-2xl border-2 border-slate-100 ${h.score >= 80 ? 'bg-emerald-50/50 border-emerald-100' : (h.score < 60 ? 'bg-rose-50/50 border-rose-100' : 'bg-slate-50')} transition-all hover:shadow-md">
                                            <div>
                                                <div class="font-bold text-slate-800 text-2xl md:text-3xl">${h.date}</div>
                                                <div class="text-xl text-slate-500 mt-3 font-medium">共 ${h.total} 題，答對 <span class="font-bold text-slate-700">${h.correct}</span> 題</div>
                                            </div>
                                            <div class="text-6xl font-black ${h.score >= 80 ? 'text-emerald-600' : (h.score < 60 ? 'text-rose-500' : 'text-amber-500')}">${h.score}<span class="text-3xl ml-2 font-bold">分</span></div>
                                        </div>
                                    `).join('') || '<p class="text-2xl text-slate-400 text-center py-12 font-bold">目前還沒有測驗紀錄喔</p>'}
                                </div>
                            </div>

                            <!-- 登入紀錄 -->
                            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden h-fit">
                                <div class="bg-slate-50 p-8 border-b border-slate-200">
                                    <h3 class="text-4xl font-bold text-slate-800 flex items-center"><span class="mr-4 text-4xl">👣</span>最近登入足跡</h3>
                                </div>
                                <div class="p-8 space-y-5 max-h-[40vh] overflow-y-auto">
                                    ${(userData.loginHistory || []).slice().reverse().map((time, i) => `
                                        <div class="flex items-center p-5 rounded-2xl border border-slate-100 bg-slate-50/50 hover:bg-slate-100 transition-colors">
                                            <span class="w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 mr-5 text-xl font-bold shadow-inner">${i+1}</span>
                                            <span class="font-bold text-slate-700 text-2xl">${new Date(time).toLocaleString()}</span>
                                        </div>
                                    `).join('') || '<p class="text-2xl text-slate-400 text-center py-12 font-bold">無登入紀錄</p>'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        initApp();

    </script>
</body>
</html>
