<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雲端記帳助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        main: {
                            50: '#fdf8f9',
                            100: '#f7d7dc', // 您指定的主色調
                            200: '#f1b6c0',
                            300: '#ea8da0',
                            400: '#e15d79',
                            500: '#d53958', // 對應的較深按鈕色
                            600: '#b72642',
                            700: '#991c34',
                            800: '#801a2e',
                            900: '#6c1829', // 對應的深色文字色
                        },
                        accent: {
                            50: '#fff1f2',
                            100: '#ffe4e6',
                            200: '#fecdd3',
                            300: '#fda4af',
                            400: '#fb7185',
                            500: '#f43f5e',
                            600: '#e11d48',
                            700: '#be123c',
                            800: '#9f1239',
                            900: '#881337',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background-color: #fdf8f9; color: #6c1829; font-size: 1.125rem; line-height: 1.8; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-loading { background-color: #fbbf24; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; box-shadow: 0 0 8px #fbbf24; }
        .status-success { background-color: #34d399; box-shadow: 0 0 8px #34d399; }
        .status-error { background-color: #f87171; box-shadow: 0 0 8px #f87171; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-nav { background: rgba(213, 57, 88, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    </style>
</head>
<body class="h-screen w-full flex flex-col overflow-hidden bg-main-50">

    <div id="app" class="w-full h-full flex flex-col overflow-hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        //  Firebase Configuration & Constants
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAxQFt76ZPXE7d0i1XeNZ1yiiD2WYNIfHs", 
            authDomain: "chinese-learning-47f4d.firebaseapp.com",
            projectId: "chinese-learning-47f4d",
            storageBucket: "chinese-learning-47f4d.firebasestorage.app",
            messagingSenderId: "76289812052",
            appId: "1:76289812052:web:898384a916f9f341f62fc1"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'accounting-app-default';
        const COLLECTION_NAME = 'Accounting-App-v1'; 
        const DOC_GLOBAL = 'Global_Users_Accounting';      
        
        let app, auth, db;
        let isFirebaseInitialized = false;
        let currentUser = null;
        let username = '';
        // 記帳 App 專用的資料結構
        let userData = { records: [], loginHistory: [] }; 
        let connectionStatus = 'loading';
        let recentUsers = [];
        let unsubscribeUser = null;
        let unsubscribeGlobal = null;
        let currentTab = 'login';
        
        // ==========================================
        //  Audio System (Lazy Init for iOS/iPad)
        // ==========================================
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContext();
                } catch(e) { console.warn("AudioContext not supported"); }
            }
        };
        const playTone = (freq, type, duration) => {
            initAudio();
            if(!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        };
        const playCoinSound = () => { playTone(1200, 'sine', 0.1); setTimeout(() => playTone(1600, 'sine', 0.2), 100); };
        const playDeleteSound = () => { playTone(300, 'sawtooth', 0.2); };

        // ==========================================
        //  Firebase Initialization
        // ==========================================
        try {
            const actualConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
            if (actualConfig.apiKey && actualConfig.apiKey !== "填入key" && actualConfig.apiKey !== "YOUR_API_KEY") {
                app = initializeApp(actualConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                isFirebaseInitialized = true;
                connectionStatus = 'success';
            } else { connectionStatus = 'error'; }
        } catch (error) { connectionStatus = 'error'; }

        const initAuth = async () => {
            if (!isFirebaseInitialized) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (error) { connectionStatus = 'error'; }
        };

        const el = id => document.getElementById(id);

        // ==========================================
        //  Data Sync & Listeners
        // ==========================================
        const listenToGlobalUsers = () => {
            if (!isFirebaseInitialized || !currentUser) return;
            const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
            if(unsubscribeGlobal) unsubscribeGlobal();
            unsubscribeGlobal = onSnapshot(globalRef, (snap) => {
                if(snap.exists()) recentUsers = snap.data().users || [];
                else recentUsers = [];
                if(currentTab === 'login') renderLogin();
            });
        };

        const listenToUserDocument = (name) => {
            if (!isFirebaseInitialized || !currentUser) {
                loadLocalData(name);
                return;
            }
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, name);
            if(unsubscribeUser) unsubscribeUser();
            unsubscribeUser = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    userData = Object.assign({ records: [], loginHistory: [] }, docSnap.data());
                    saveLocalData(name);
                } else {
                    userData = { records: [], loginHistory: [new Date().toISOString()] };
                    setDoc(userRef, userData, { merge: true });
                }
                
                // Refresh UI if in main view
                if(currentTab !== 'login') switchTab(currentTab);
            }, (error) => console.error("Listen user error", error));
        };

        const saveUserDataToCloud = async () => {
            saveLocalData(username);
            if (!isFirebaseInitialized || !currentUser || !username) return;
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
            try { await setDoc(userRef, userData, { merge: true }); } catch(e) { console.error("Firebase save error:", e); }
        };

        const loadLocalData = (name) => {
            try {
                const localData = localStorage.getItem(`${COLLECTION_NAME}_${name}_data`);
                if (localData) userData = Object.assign({ records: [], loginHistory: [] }, JSON.parse(localData));
            } catch(e) {}
        };

        const saveLocalData = (name) => {
            try { if (name) localStorage.setItem(`${COLLECTION_NAME}_${name}_data`, JSON.stringify(userData)); } catch(e) {}
        };

        // ==========================================
        //  App Initialization & Auth Flow
        // ==========================================
        const initApp = async () => {
            renderApp();
            const lastUser = localStorage.getItem(`${COLLECTION_NAME}_last_user`);
            if (isFirebaseInitialized) {
                await initAuth(); 
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        listenToGlobalUsers();
                        if (lastUser) {
                            username = lastUser;
                            setTimeout(() => listenToUserDocument(username), 200);
                            currentTab = 'dashboard';
                            renderMain();
                        } else renderLogin();
                    } else renderLogin();
                });
            } else {
                if (lastUser) {
                    username = lastUser;
                    loadLocalData(username);
                    currentTab = 'dashboard';
                    renderMain();
                } else renderLogin();
            }
        };

        window.handleLogin = async (name) => {
            if(!name.trim()) {
                const inputEl = document.getElementById('usernameInput');
                inputEl.classList.add('border-red-500', 'bg-red-50');
                inputEl.placeholder = "名稱不能為空！";
                setTimeout(() => {
                    inputEl.classList.remove('border-red-500', 'bg-red-50');
                    inputEl.placeholder = "✍️ 請輸入您的姓名或暱稱";
                }, 2000);
                return;
            }
            username = name;
            localStorage.setItem(`${COLLECTION_NAME}_last_user`, username);
            
            if (isFirebaseInitialized && currentUser) {
                const now = new Date().toISOString();
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
                try {
                    const snap = await getDoc(userRef);
                    if (snap.exists()) {
                        userData = Object.assign({ records: [], loginHistory: [] }, snap.data());
                    } else loadLocalData(username);
                    
                    if (!userData.loginHistory) userData.loginHistory = [];
                    userData.loginHistory.push(now);
                    if (userData.loginHistory.length > 50) userData.loginHistory = userData.loginHistory.slice(-50);
                    
                    await setDoc(userRef, userData, { merge: true });
                    
                    // Update global recent users
                    const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
                    const gSnap = await getDoc(globalRef);
                    let users = gSnap.exists() ? gSnap.data().users || [] : [];
                    users = users.filter(u => u.name !== username);
                    users.push({ name: username, lastLogin: now });
                    if(users.length > 10) users = users.slice(-10);
                    await setDoc(globalRef, { users }, { merge: true });
                } catch(e) { console.error("Login data sync error:", e); }
                listenToUserDocument(username);
            } else {
                loadLocalData(username);
                if (!userData.loginHistory) userData.loginHistory = [];
                userData.loginHistory.push(new Date().toISOString());
                saveLocalData(username);
            }
            currentTab = 'dashboard';
            renderMain();
            initAudio();
        };

        window.logout = () => {
            username = '';
            userData = { records: [], loginHistory: [] };
            localStorage.removeItem(`${COLLECTION_NAME}_last_user`);
            if(unsubscribeUser) unsubscribeUser();
            renderLogin();
        };

        window.deleteUserData = async () => {
            if(!confirm(`確定要從雲端刪除 ${username} 的所有記帳資料？此操作無法復原！`)) return;
            try {
                if (isFirebaseInitialized && currentUser) {
                    const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
                    const snap = await getDoc(globalRef);
                    if(snap.exists()) {
                        let users = snap.data().users || [];
                        users = users.filter(u => u.name !== username);
                        await setDoc(globalRef, { users }, { merge: true });
                    }
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
                    await setDoc(userRef, { records: [], loginHistory: [] }, { merge: true });
                }
                localStorage.removeItem(`${COLLECTION_NAME}_last_user`);
                localStorage.removeItem(`${COLLECTION_NAME}_${username}_data`);
                userData = { records: [], loginHistory: [] };
                if(unsubscribeUser) unsubscribeUser();
                username = '';
                renderLogin();
            } catch(e) { alert("刪除失敗，請稍後再試"); }
        };

        // ==========================================
        //  Views Rendering
        // ==========================================
        const renderApp = () => { el('app').innerHTML = `<div id="view-container" class="w-full h-full flex flex-col bg-main-50"></div>`; };

        window.renderLogin = () => {
            currentTab = 'login';
            el('view-container').innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center relative overflow-hidden p-6 z-0">
                    <div class="absolute inset-0 bg-gradient-to-br from-main-50 via-accent-50 to-pink-50 -z-20"></div>
                    <div class="absolute -top-20 -left-20 w-96 h-96 bg-gradient-to-r from-main-200 to-accent-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse -z-10"></div>
                    <div class="absolute top-40 -right-20 w-80 h-80 bg-gradient-to-r from-accent-200 to-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse -z-10" style="animation-delay: 1s;"></div>
                    
                    <div class="absolute top-6 right-6 z-20">
                        <div class="flex flex-col items-end gap-3 w-full md:w-auto">
                            <div class="glass-card px-4 py-2 rounded-full shadow-sm text-sm font-bold text-main-800 flex items-center border border-white/50">
                                <span class="status-dot ${connectionStatus === 'loading' ? 'status-loading' : connectionStatus === 'success' ? 'status-success' : 'status-error'}"></span>
                                ${connectionStatus === 'loading' ? '雲端讀取中... ⏳' : connectionStatus === 'success' ? '雲端已同步 ☁️✨' : '雲端連線失敗 ❌'}
                            </div>
                        </div>
                    </div>
                    
                    <div class="glass-card p-8 md:p-12 rounded-3xl shadow-2xl z-10 w-[40rem] max-w-[95vw] text-center border border-white/60">
                        <div class="w-24 h-24 bg-gradient-to-br from-main-400 to-accent-500 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg transform rotate-3">
                            <span class="text-6xl text-white">💰</span>
                        </div>
                        <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-main-950 mb-4 tracking-widest leading-tight">雲端記帳助手</h1>
                        <p class="text-main-600 mb-10 text-xl font-bold bg-main-100 inline-block px-5 py-2 rounded-full border border-main-200 shadow-sm">跨平台同步．理財好幫手</p>
                        
                        <div class="space-y-6">
                            <input type="text" id="usernameInput" placeholder="✍️ 請輸入您的姓名或暱稱" class="w-full px-6 py-5 text-xl rounded-2xl border-2 border-main-200 focus:outline-none focus:border-main-500 focus:ring-4 focus:ring-main-500/20 text-center transition-all bg-white/80 backdrop-blur-sm shadow-inner">
                            <button onclick="handleLogin(document.getElementById('usernameInput').value)" class="w-full bg-gradient-to-r from-main-500 to-accent-600 hover:from-main-600 hover:to-accent-700 text-white font-bold py-5 px-6 text-2xl rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1">
                                開始記帳 🚀
                            </button>
                        </div>
                        
                        <div class="mt-10 border-t border-main-200/50 pt-6">
                            <p class="text-base text-main-700/60 mb-4 font-bold tracking-wide">☁️ 雲端最近登入</p>
                            <div class="flex flex-wrap justify-center gap-3">
                                ${recentUsers.length > 0 ? recentUsers.slice().reverse().slice(0, 8).map(u => `<button onclick="handleLogin('${u.name}')" class="text-base font-bold bg-white/80 border-2 border-main-200 text-main-800 hover:bg-main-100 hover:text-main-900 hover:border-main-400 px-5 py-2.5 rounded-xl shadow-sm transition-all">${u.name}</button>`).join('') : `<span class="text-base text-main-700/60 bg-white/50 px-5 py-2.5 rounded-xl">尚無紀錄</span>`}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderMain = () => {
            el('view-container').innerHTML = `
                <nav class="glass-nav text-white shadow-lg z-20 shrink-0">
                    <div class="w-full px-2 sm:px-4 md:px-6 lg:px-8 mx-auto">
                        <div class="flex justify-between items-center h-20 w-full overflow-x-auto scrollbar-hide gap-2 md:gap-4">
                            
                            <div class="flex items-center gap-2 sm:gap-3 shrink-0">
                                <span class="font-extrabold text-xl md:text-2xl tracking-widest hidden lg:flex items-center shrink-0 drop-shadow-md">
                                    <span class="bg-white/20 p-2 rounded-xl mr-2 shadow-sm">💰</span>雲端記帳
                                </span>
                                <div class="flex items-center bg-white/20 px-2 py-1.5 md:px-3 rounded-full border border-white/10 shadow-inner text-sm md:text-base font-medium shrink-0">
                                    <span class="status-dot ${connectionStatus === 'loading' ? 'bg-amber-400' : connectionStatus === 'success' ? 'bg-main-300' : 'bg-red-400'}"></span>
                                    <span class="hidden sm:inline">${connectionStatus === 'loading' ? '讀取中' : connectionStatus === 'success' ? '已同步' : '連線失敗'}</span>
                                </div>
                            </div>
                            
                            <div class="flex items-center space-x-1 sm:space-x-2 shrink-0 pl-1">
                                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn"><span class="mr-1.5 hidden sm:inline">📊</span>總覽</button>
                                <button onclick="switchTab('add')" id="nav-add" class="nav-btn"><span class="mr-1.5 hidden sm:inline">✍️</span>記一筆</button>
                                <button onclick="switchTab('history')" id="nav-history" class="nav-btn"><span class="mr-1.5 hidden sm:inline">📜</span>明細</button>
                                
                                <div class="ml-1 sm:ml-2 lg:ml-4 flex items-center pl-2 sm:pl-3 lg:pl-5 border-l border-white/30 shrink-0 whitespace-nowrap gap-1 md:gap-2">
                                    <div class="text-sm md:text-base lg:text-lg font-bold bg-white/20 px-3 py-1.5 rounded-xl shadow-inner flex items-center">
                                        <span class="mr-1">👤</span>${username}
                                    </div>
                                    <button onclick="logout()" class="text-white/70 hover:text-white hover:bg-white/20 p-2 rounded-lg transition-colors text-lg" title="登出">🚪</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
                <div id="main-content" class="flex-1 overflow-hidden flex flex-col w-full z-10 relative bg-slate-50/50"></div>
            `;
            switchTab(currentTab);
        };

        window.switchTab = (tab) => {
            currentTab = tab;
            ['dashboard', 'add', 'history'].forEach(t => {
                const btn = el(`nav-${t}`);
                if(btn) {
                    if(t === tab) btn.className = 'nav-btn whitespace-nowrap px-3 py-2 lg:px-4 lg:py-2.5 rounded-xl text-sm md:text-base lg:text-lg font-bold transition-all duration-200 border-2 border-white bg-white/20 text-white shadow-lg';
                    else btn.className = 'nav-btn whitespace-nowrap px-3 py-2 lg:px-4 lg:py-2.5 rounded-xl text-sm md:text-base lg:text-lg font-bold transition-all duration-200 border-2 border-transparent text-white/70 hover:text-white hover:bg-white/10';
                }
            });
            const content = el('main-content');
            if(tab === 'dashboard') renderDashboard(content);
            if(tab === 'add') renderAddRecord(content);
            if(tab === 'history') renderHistory(content);
        };

        // ==========================================
        //  Accounting Functions & Math
        // ==========================================
        const getFinancialStats = () => {
            let totalIncome = 0;
            let totalExpense = 0;
            const records = userData.records || [];
            
            records.forEach(r => {
                if(r.type === 'income') totalIncome += Number(r.amount);
                if(r.type === 'expense') totalExpense += Number(r.amount);
            });
            
            return {
                income: totalIncome,
                expense: totalExpense,
                balance: totalIncome - totalExpense,
                count: records.length
            };
        };

        window.submitRecord = (e) => {
            e.preventDefault();
            const type = el('record-type').value;
            const amount = parseFloat(el('record-amount').value);
            const category = el('record-category').value;
            const date = el('record-date').value;
            const note = el('record-note').value;

            if (!amount || amount <= 0 || !category || !date) {
                alert("請完整填寫金額、分類與日期！");
                return;
            }

            const newRecord = {
                id: Date.now().toString(),
                type,
                amount,
                category,
                date,
                note,
                timestamp: new Date().toISOString()
            };

            if(!userData.records) userData.records = [];
            userData.records.push(newRecord);
            
            saveUserDataToCloud();
            playCoinSound();
            
            // Show success msg
            el('add-success-msg').classList.remove('hidden');
            el('add-record-form').reset();
            el('record-date').value = new Date().toISOString().split('T')[0]; // reset date to today
            
            setTimeout(() => {
                el('add-success-msg').classList.add('hidden');
            }, 3000);
        };

        window.deleteRecord = (id) => {
            if(!confirm('確定要刪除這筆紀錄嗎？')) return;
            userData.records = userData.records.filter(r => r.id !== id);
            saveUserDataToCloud();
            playDeleteSound();
            if(currentTab === 'history') renderHistory(el('main-content'));
            if(currentTab === 'dashboard') renderDashboard(el('main-content'));
        };

        // ==========================================
        //  Sub-views rendering
        // ==========================================
        const renderDashboard = (container) => {
            const stats = getFinancialStats();
            const recent = (userData.records || []).slice().sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
            
            container.innerHTML = `
                <div class="w-full flex-1 p-4 md:p-8 overflow-y-auto relative animate-fade-in">
                    <div class="max-w-5xl mx-auto space-y-6">
                        <div class="flex justify-between items-end mb-4">
                            <h2 class="text-3xl md:text-4xl font-extrabold text-main-900">財務總覽 📊</h2>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <!-- 結餘 -->
                            <div class="bg-gradient-to-br from-main-400 to-accent-500 rounded-3xl p-6 shadow-lg text-white relative overflow-hidden">
                                <div class="absolute -right-4 -top-4 text-7xl opacity-20">💰</div>
                                <p class="text-main-100 font-bold text-lg mb-1">目前結餘</p>
                                <p class="text-4xl md:text-5xl font-black truncate tracking-wider">$ ${stats.balance.toLocaleString()}</p>
                            </div>
                            
                            <!-- 收入 -->
                            <div class="bg-white rounded-3xl p-6 shadow-sm border border-main-100 relative overflow-hidden flex flex-col justify-center">
                                <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-5xl opacity-10">📈</div>
                                <p class="text-slate-500 font-bold text-lg mb-1 flex items-center"><span class="w-3 h-3 rounded-full bg-blue-500 mr-2"></span>總收入</p>
                                <p class="text-3xl md:text-4xl font-black text-blue-600 truncate">$ ${stats.income.toLocaleString()}</p>
                            </div>
                            
                            <!-- 支出 -->
                            <div class="bg-white rounded-3xl p-6 shadow-sm border border-main-100 relative overflow-hidden flex flex-col justify-center">
                                <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-5xl opacity-10">📉</div>
                                <p class="text-slate-500 font-bold text-lg mb-1 flex items-center"><span class="w-3 h-3 rounded-full bg-rose-500 mr-2"></span>總支出</p>
                                <p class="text-3xl md:text-4xl font-black text-rose-600 truncate">$ ${stats.expense.toLocaleString()}</p>
                            </div>
                        </div>

                        <div class="bg-white rounded-3xl shadow-sm border border-main-100 mt-8 overflow-hidden">
                            <div class="bg-main-50/50 p-5 md:p-6 border-b border-main-100 flex justify-between items-center">
                                <h3 class="text-xl md:text-2xl font-bold text-main-800">最近 5 筆紀錄</h3>
                                <button onclick="switchTab('history')" class="text-main-600 font-bold hover:text-main-800">查看全部 ➔</button>
                            </div>
                            <div class="divide-y divide-main-50">
                                ${recent.length > 0 ? recent.map(r => renderRecordRow(r)).join('') : '<div class="p-10 text-center text-slate-400 font-bold text-lg">目前還沒有任何紀錄喔！趕快記一筆吧！</div>'}
                            </div>
                        </div>
                        
                    </div>
                </div>
            `;
        };

        const renderAddRecord = (container) => {
            const today = new Date().toISOString().split('T')[0];
            container.innerHTML = `
                <div class="w-full flex-1 p-4 md:p-8 overflow-y-auto relative animate-fade-in flex justify-center">
                    <div class="max-w-2xl w-full">
                        <div class="bg-white rounded-3xl shadow-xl border border-main-100 overflow-hidden">
                            <div class="bg-gradient-to-r from-main-400 to-accent-500 p-6 md:p-8 text-center">
                                <h2 class="text-3xl md:text-4xl font-extrabold text-white">新增紀錄 ✍️</h2>
                            </div>
                            
                            <div id="add-success-msg" class="hidden bg-main-100 border-l-4 border-main-500 text-main-800 p-4 mx-6 mt-6 rounded shadow-sm font-bold flex items-center">
                                <span class="mr-2 text-xl">🎉</span> 紀錄已成功新增並同步至雲端！
                            </div>

                            <form id="add-record-form" onsubmit="submitRecord(event)" class="p-6 md:p-8 space-y-6">
                                <!-- 類型與金額 -->
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-main-800 font-bold mb-2 text-lg">收支類型</label>
                                        <select id="record-type" class="w-full bg-slate-50 border-2 border-main-100 text-slate-700 rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-main-500 focus:ring-2 focus:ring-main-200 transition-all font-bold">
                                            <option value="expense">支出 📉</option>
                                            <option value="income">收入 📈</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-main-800 font-bold mb-2 text-lg">金額</label>
                                        <div class="relative">
                                            <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 font-bold text-xl">$</span>
                                            <input type="number" id="record-amount" min="1" step="any" placeholder="0" required class="w-full bg-slate-50 border-2 border-main-100 text-slate-800 rounded-xl pl-10 pr-4 py-3 text-xl font-black focus:outline-none focus:border-main-500 focus:ring-2 focus:ring-main-200 transition-all">
                                        </div>
                                    </div>
                                </div>

                                <!-- 分類與日期 -->
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-main-800 font-bold mb-2 text-lg">分類</label>
                                        <input type="text" id="record-category" placeholder="如：餐飲、交通、薪水" required class="w-full bg-slate-50 border-2 border-main-100 text-slate-700 rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-main-500 focus:ring-2 focus:ring-main-200 transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-main-800 font-bold mb-2 text-lg">日期</label>
                                        <input type="date" id="record-date" value="${today}" required class="w-full bg-slate-50 border-2 border-main-100 text-slate-700 rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-main-500 focus:ring-2 focus:ring-main-200 transition-all">
                                    </div>
                                </div>

                                <!-- 備註 -->
                                <div>
                                    <label class="block text-main-800 font-bold mb-2 text-lg">備註 (選填)</label>
                                    <textarea id="record-note" rows="2" placeholder="寫點什麼..." class="w-full bg-slate-50 border-2 border-main-100 text-slate-700 rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-main-500 focus:ring-2 focus:ring-main-200 transition-all resize-none"></textarea>
                                </div>

                                <button type="submit" class="w-full bg-gradient-to-r from-main-400 to-accent-500 hover:from-main-500 hover:to-accent-600 text-white font-extrabold py-4 rounded-xl shadow-lg text-xl transition-all transform hover:-translate-y-1">
                                    儲存紀錄 💾
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderHistory = (container) => {
            const records = (userData.records || []).slice().sort((a,b) => new Date(b.date) - new Date(a.date));
            
            container.innerHTML = `
                <div class="w-full flex-1 p-4 md:p-8 overflow-y-auto relative animate-fade-in">
                    <div class="max-w-5xl mx-auto">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                            <h2 class="text-3xl md:text-4xl font-extrabold text-main-900">歷史明細 📜</h2>
                            <button onclick="deleteUserData()" class="text-rose-500 hover:text-rose-700 bg-white px-4 py-2 rounded-lg border border-rose-200 shadow-sm font-bold transition-colors">🗑️ 清空所有資料</button>
                        </div>

                        <div class="bg-white rounded-3xl shadow-sm border border-main-100 overflow-hidden">
                            <div class="divide-y divide-main-50">
                                ${records.length > 0 ? records.map(r => renderRecordRow(r, true)).join('') : '<div class="p-16 text-center text-slate-400 font-bold text-xl flex flex-col items-center"><span class="text-6xl mb-4">📭</span>尚無任何記帳資料</div>'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderRecordRow = (r, showDelete = false) => {
            const isIncome = r.type === 'income';
            const sign = isIncome ? '+' : '-';
            const colorClass = isIncome ? 'text-blue-600' : 'text-rose-600';
            const bgIconClass = isIncome ? 'bg-blue-100 text-blue-600' : 'bg-rose-100 text-rose-600';
            const icon = isIncome ? '📈' : '📉';

            return `
                <div class="p-4 md:p-5 flex items-center justify-between hover:bg-slate-50 transition-colors group">
                    <div class="flex items-center gap-4 flex-1 min-w-0">
                        <div class="w-12 h-12 rounded-full ${bgIconClass} flex items-center justify-center text-2xl shrink-0 shadow-inner">
                            ${icon}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-baseline gap-2">
                                <h4 class="font-bold text-slate-800 text-lg truncate">${r.category}</h4>
                                <span class="text-sm text-slate-400 font-medium">${r.date}</span>
                            </div>
                            ${r.note ? `<p class="text-sm text-slate-500 truncate mt-0.5">${r.note}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-4 shrink-0 pl-4">
                        <span class="font-black text-xl md:text-2xl ${colorClass} tracking-wide whitespace-nowrap">${sign} $${Number(r.amount).toLocaleString()}</span>
                        ${showDelete ? `<button onclick="deleteRecord('${r.id}')" class="text-rose-300 hover:text-rose-600 p-2 rounded-lg hover:bg-rose-50 transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100" title="刪除"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>
                </div>
            `;
        };

        // Initialize
        initApp();

    </script>
</body>
</html>
