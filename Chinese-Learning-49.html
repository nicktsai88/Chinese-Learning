            }

        const playTone = (freq, type, duration) => {
            initAudio();
            if(!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}

            // ============== Topic 2: 誇飾 (Questions 26-35) ==============
            addQ("「千山鳥飛絕，萬徑人蹤滅」使用了何種修辭？", ["譬喻", "誇飾", "轉化", "借代"], 1, ["沒有打比方。", "正確。用「千山」、「萬徑」、「絕」、「滅」極度誇大下雪時天寒地凍、毫無生氣的景象，以加深印象。", "沒有擬人或擬物。", "沒有使用替代詞。"]);
            addQ("下列何者「沒有」使用誇飾修辭？", ["朝辭白帝彩雲間，千里江陵一日還", "夏蚊成雷，私擬作群鶴舞空", "雙腳踢翻塵世浪，一肩擔盡古今愁", "白日依山盡，黃河入海流"], 3, ["千里之路一日到達，誇大船行之快。", "蚊子聲音像雷聲一樣大，誇大聽覺。", "雙腳踢翻浪、一肩擔盡愁，誇大能力與氣勢。", "正確。這只是寫實的自然景觀描寫，沒有誇大客觀事實。"]);
            addQ("「君不見高堂明鏡悲白髮，朝如青絲暮成雪。」這句詩中，哪一個部分最能體現「誇飾」的手法？", ["高堂明鏡", "悲白髮", "朝如青絲暮成雪", "君不見"], 2, ["只是場景物件。", "只是情緒反應。", "正確。早上還是黑髮，到了傍晚就變成白髮，極度誇大了時間流逝與老去的速度。", "只是發語詞。"]);
            addQ("誇飾修辭的主要作用是什麼？", ["讓文章看起來字數更多", "用超過客觀事實的詞語來鋪飾，加深讀者印象", "用另一種事物來代替本名", "賦予無生命事物人類的感情"], 1, ["這不是修辭的目的。", "正確。誇飾就是故意言過其實（誇大或縮小），讓讀者產生強烈的感受與印象。", "這是借代的作用。", "這是轉化（人性化）的作用。"]);
            addQ("「他的膽子比老鼠還小」這句話使用了誇飾法中的哪一種技巧？", ["空間誇飾", "數量誇飾", "縮小誇飾", "時間誇飾"], 2, ["沒有描述空間。", "沒有描述數量。", "正確。故意把事物說得比實際情況更小、更微弱（膽子比老鼠還小），這也是誇飾的一種（縮小誇飾）。", "沒有描述時間。"]);
            addQ("下列選項中，何者使用了「誇飾」修辭？", ["這座山高達三千公尺", "他氣得火冒三丈，頭頂都要燒起來了", "春天的花朵開滿了整個山坡", "微風輕輕吹過樹梢"], 1, ["客觀的事實數據。", "正確。人不可能真的「火冒三丈」甚至「頭頂燒起來」，這是為了凸顯生氣的程度而故意誇大。", "客觀景象描述。", "客觀景象描述。"]);
            addQ("「怒髮衝冠」這個成語使用了什麼修辭？", ["借代", "譬喻", "誇飾", "轉化"], 2, ["沒有代替本名。", "沒有打比方。", "正確。頭髮生氣到直立起來，甚至把帽子頂上去，極度誇張了憤怒的樣子。", "沒有擬人或擬物。"]);
            addQ("「一日不見，如隔三秋」結合了哪兩種修辭？", ["誇飾、譬喻", "轉化、借代", "譬喻、借代", "誇飾、轉化"], 0, ["正確。「如」是譬喻（明喻）；將「一日」的感覺誇大為「三秋（三年）」，是時間上的誇飾。", "沒有轉化與借代。", "有譬喻，無借代。", "有誇飾，無轉化。"]);
            addQ("「那聲音大得連耳膜都要震破了」屬於何種修辭？", ["譬喻", "誇飾", "借代", "轉化"], 1, ["無比喻關係。", "正確。故意誇大聲音的威力，以凸顯聲音之大。", "無替代關係。", "無擬人/物。"]);
            addQ("在戲劇或動漫角色的出場詩中（如：雙腳踢翻塵世浪，一肩擔盡古今愁），最常使用哪一種修辭來營造氣勢？", ["譬喻", "借代", "誇飾", "轉化"], 2, ["非主要氣勢來源。", "非主要氣勢來源。", "正確。武俠或戲劇常利用「誇飾」（踢翻塵世、擔盡古今）來極度凸顯角色的武功高強與狂傲氣勢。", "非主要氣勢來源。"]);

            // ============== Topic 3: 轉化 (Questions 36-55) ==============
            addQ("轉化修辭分為哪三種類別？", ["明喻、隱喻、借喻", "人性化、物性化、形象化", "空間誇飾、時間誇飾、數量誇飾", "借代、借喻、假喻"], 1, ["這是譬喻的分類。", "正確。轉化包含：把物當人（人性化）、把人當物（物性化）、化抽象為具體（形象化）。", "這是誇飾的分類。", "這是不同修辭的混搭。"]);
            addQ("「只有綠色的小河還醒著」這句話使用了轉化中的哪一種技巧？", ["物性化", "形象化", "人性化", "神格化"], 2, ["不是把人當物。", "不是化抽象為具體（河是具體的）。", "正確。「醒著」是人類或動物的清醒狀態，這裡將無生命的小河賦予了生命特質，是「把物當人」的人性化（擬人）。", "沒有賦予神明特質。"]);
            addQ("「在圖書館裡，請把你的喉嚨關上」屬於何種轉化？", ["人性化", "物性化", "形象化", "抽象化"], 1, ["人本來就是人。", "正確。喉嚨是人體器官，不能像門窗機器一樣「關上」。「關上」是物品的狀態，這是「把人當物」的物性化（擬物）。", "喉嚨是具體的。", "修辭中沒有抽象化。"]);
            addQ("「好銳利的喜悅刺上我的心頭」這句使用了「形象化」，其原因為何？", ["將具體的刺轉換為抽象的感覺", "將人當成帶刺的物品", "將抽象的『喜悅』賦予具體物品『刺』的動作與銳利感", "將喜悅擬人化了"], 2, ["方向錯誤，形象化是抽象轉具體。", "沒有把人當物。", "正確。喜悅是「抽象的情感」，無法碰觸；「銳利、刺」是具體物品（如刀劍）的特質。將抽象情感具體化，即為形象化。", "喜悅沒有做出人的專屬動作。"]);
            addQ("「夢想讓世界舞蹈起來」使用了哪一種修辭法？", ["譬喻", "轉化", "誇飾", "借代"], 1, ["沒有喻詞與喻依。", "正確。世界（無生命）不會「舞蹈」（人類特有的律動），這是將世界「人性化」的轉化修辭。", "沒有誇大數據。", "沒有使用替代詞。"]);
            addQ("關於「轉化」與「譬喻」的區別，下列何者正確？", ["轉化是找兩事物的相似點，譬喻是找兩事物的可變處", "轉化是找兩事物的可變處，譬喻是找兩事物的相似點", "轉化必定有喻詞，譬喻則無", "兩者完全相同，只是名稱不同"], 1, ["完全寫反了。", "正確。譬喻強調兩者的「相似」（如：愛情像鳥）；轉化則是將A的事物特性「改變」套用在B上（如：愛情飛走了）。", "譬喻才有喻詞。", "兩者機制完全不同。"]);
            addQ("「自從被週刊爆出醜聞後，他就從人間蒸發了。」句中的「蒸發」是將人當作什麼來看待？", ["人類", "神明", "水等會氣化的物質（物性化）", "抽象概念"], 2, ["人本來就是人，這不是人性化。", "沒有神明特質。", "正確。人不可能真的「蒸發」，這是水的物理特性。將人當作水來看待，屬於「把人當物」的物性化。", "人是具體的。"]);
            addQ("「我的日子滴在時間的流裡」這句話使用了什麼修辭？", ["形象化", "人性化", "借代", "物性化"], 0, ["正確。「日子（消逝）」與「時間」都是抽象看不見的概念。用「滴」和「流」這兩個具體的水的動作與形態來描寫，是標準的形象化。", "時間和日子沒有人的特質。", "沒有使用替代名稱。", "不是把人當物。"]);
            addQ("「她總是燃燒自己，照亮別人」屬於轉化中的：", ["人性化", "物性化", "形象化", "以上皆非"], 1, ["人本來就是人。", "正確。將人當作「蠟燭」或「火把」等物品，賦予其「燃燒、照亮」的物理特性，是為物性化。", "人是具體的，不是化抽象為具體。", "B為正解。"]);
            addQ("「嫵媚的康河也望不見蹤跡」這句話將康河：", ["物性化", "形象化", "人性化", "神格化"], 2, ["康河本來就是物。", "康河是具體的。", "正確。「嫵媚」通常用來形容女子的嬌美姿態。將無生命的康河賦予了女子的特質，是人性化。", "無神仙特質。"]);
            addQ("下列哪一個選項使用了「形象化（擬虛為實）」？", ["春風撫摸著我的臉頰", "他是一塊不可雕的朽木", "我把滿腹的委屈，一口氣全吐了出來", "太陽公公生氣了"], 2, ["春風(物)撫摸(人)，是人性化。", "他(喻體)是(喻詞)朽木(喻依)，是隱喻。", "正確。「委屈」是抽象情緒，不能真的用嘴巴「吐」出來。把委屈當作具體食物一樣吐出，是形象化。", "太陽(物)生氣(人)，是人性化。"]);
            addQ("下列哪一個選項使用了「人性化（擬人）」？", ["愛情是一場重感冒", "時間無情地在我的臉上刻下痕跡", "他把我的尊嚴踩在腳底下", "那女人真是一隻母老虎"], 1, ["愛情是感冒，隱喻。", "正確。時間（無生命/抽象）被賦予了人類「無情」的性格以及「刻」的動作，是人性化。", "尊嚴（抽象）被踩（具體動作），是形象化。", "女人是母老虎，借喻/隱喻。"]);
            addQ("「晚景的溫存卻被我這樣偷嘗了不少」這句話中，「偷嘗」的作用是？", ["將具體的晚景抽象化", "將抽象的『溫存』具體化為可以品嘗的食物", "將人變成愛偷吃的小偷", "將晚景擬人化"], 1, ["修辭沒有抽象化。", "正確。「溫存」是抽象的感受，使用「偷嘗（品嘗）」這個對待具體食物的動作，成功將其形象化。", "人本來就能偷吃，這不是修辭重點。", "「溫存」是人性化，但「偷嘗」是形象化。"]);
            addQ("「愛情就像鳥兒飛走了」與「愛情的鳥兒飛走了」分別屬於什麼修辭？", ["明喻 / 轉化", "明喻 / 隱喻", "轉化 / 譬喻", "隱喻 / 借代"], 0, ["正確。前者有喻詞「像」，是明喻（譬喻）。後者沒有喻詞，直接讓愛情（抽象）像鳥一樣「飛走」，著重於動作的改變，是轉化（或者說將愛情具體化為鳥的形象化/借喻，但在講義的迷思澄清中，這是轉化的標準例子）。", "後者無「是/為」。", "前者是譬喻。", "前者是明喻。"]);
            addQ("「這件事讓他肩上的重擔減輕了不少」中的「重擔」原本是指具體的物品，在這裡用來指稱抽象的「責任壓力」。這比較接近何種修辭的作用？", ["借代", "形象化", "人性化", "誇飾"], 1, ["非約定俗成的替代。", "正確。將抽象的「責任、壓力」具體化為可以扛在肩上、有重量的「重擔」，屬於形象化（擬虛為實）的一種應用。", "壓力沒有人的特質。", "沒有誇大數據。"]);
            addQ("下列何者「不是」轉化修辭？", ["桃花聽得入神，禁不住落了幾滴粉淚", "這雨下得像斷了線的珍珠", "把悲傷的記憶打包丟進垃圾桶", "他像一隻縮頭烏龜，躲了起來"], 1, ["桃花(物)聽(人)落淚(人)，人性化。", "正確。這是有喻詞「像」的【明喻】，兩事物僅是相似，並未改變性質。", "悲傷記憶(抽象)打包丟棄(具體)，形象化。", "有喻詞「像」，是明喻。"]);
            addQ("「春風又綠江南岸」中的「綠」字，原本是形容詞，在此當動詞用（吹綠了），賦予春風動作。這帶有何種修辭的意味？", ["轉化（人性化）", "誇飾", "借代", "譬喻"], 0, ["正確。春風被賦予了主動去「染綠」江南岸的能力，帶有擬人的色彩。", "沒有誇大。", "沒有替代。", "沒有比方。"]);
            addQ("「把你的怒火降溫吧！」這句話將抽象的怒火當作具體有溫度的物體。這是哪一種轉化？", ["人性化", "物性化", "形象化", "神格化"], 2, ["怒火不是人。", "怒火本來就不是人。", "正確。怒氣是抽象情緒，把它當作具體發熱的物體來「降溫」，是形象化。", "無神仙特質。"]);
            addQ("「電腦感染了病毒，罷工抗議了」這句話使用了：", ["人性化", "物性化", "形象化", "借代"], 0, ["正確。電腦（物品）被賦予了人類「罷工抗議」的行為，是標準的人性化（擬人）。", "電腦本來就是物。", "電腦是具體的。", "無替代詞。"]);
            addQ("判別修辭：(甲)「歲月是一把無情的殺豬刀」 / (乙)「歲月無情地割去了他的青春」。", ["甲是轉化，乙是譬喻", "甲是隱喻，乙是轉化", "甲是借代，乙是誇飾", "甲是明喻，乙是轉化"], 1, ["甲有喻詞「是」，為隱喻。", "正確。甲：歲月(喻體) + 是(喻詞) + 殺豬刀(喻依) = 隱喻。乙：歲月(無生命/抽象) + 割去(人的動作) = 轉化(人性化/形象化)。", "甲非借代。", "甲無「像」。"]);

            // ============== Topic 4: 借代 (Questions 56-90) ==============
            addQ("「無絲竹之亂耳」中的「絲竹」借代為什麼？", ["樂器", "音樂", "竹林", "噪音"], 1, ["絲竹雖是樂器材質，但在這裡是借代音樂。", "正確。「絲」指弦樂器，「竹」指管樂器，兩者合稱借代為「音樂」。", "字面意思，錯誤。", "不合文意。"]);
            addQ("借代詞「九州」的意思是？", ["九個城市", "全世界", "中國", "亞洲"], 2, ["錯誤。", "範圍太大。", "正確。古代中國分為九州，故以九州借代「中國」。", "範圍錯誤。"]);
            addQ("「留取丹心照汗青」中的「汗青」借代為？", ["汗水", "史冊", "青天", "竹林"], 1, ["字面意思，錯誤。", "正確。古人寫書前會將竹簡烤乾，出水如汗，稱為汗青。後用以借代「史冊、史籍」。", "字面意思，錯誤。", "字面意思，錯誤。"]);
            addQ("下列哪一個借代詞「不是」用來指稱「史籍、史冊」？", ["丹青", "汗青", "殺青", "以上皆是"], 2, ["丹冊記功，青史記事，借代史籍。", "烤竹出水，借代史籍。", "正確。「殺青」是指刮去竹子青皮的步驟，後來借代為「作品完成」，並非指史籍本身。", "殺青不是。"]);
            addQ("「黃花」在借代中通常指稱哪一種植物？", ["向日葵", "桂花", "菊花", "油菜花"], 2, ["錯誤。", "錯誤。", "正確。菊花色黃，古詩詞中常以「黃花」借代菊花（如李清照：人比黃花瘦）。", "錯誤。"]);
            addQ("「朱門酒肉臭，路有凍死骨」中的「朱門」借代為？", ["紅色的大門", "寺廟", "豪貴人家", "皇宮"], 2, ["這是本義，不是借代義。", "錯誤。", "正確。古代豪門貴族的門多漆成朱紅色，故以朱門借代「豪貴人家」。", "皇宮的借代通常是陛下、廟堂等。"]);
            addQ("「舊時王謝堂前燕」中的「王謝」借代為什麼？", ["兩位好朋友", "豪門望族", "平民百姓", "皇帝的親戚"], 1, ["錯誤。", "正確。王導與謝安是晉代的兩大名門望族，後世以「王謝」借代為「豪門望族」。", "平民借代為布衣、白丁。", "錯誤。"]);
            addQ("「廟堂之上，朽木為官」中的「廟堂」借代為？", ["寺廟", "學校", "朝廷", "法院"], 2, ["字面意思，錯誤。", "錯誤。", "正確。廟堂原指宗廟，是帝王議事祭祀之處，常用來借代「朝廷」。", "錯誤。"]);
            addQ("「放浪形骸」中的「形骸」借代為？", ["骨頭", "思想", "身體", "名譽"], 2, ["字面意思，錯誤。", "錯誤。", "正確。形體與骨骼，借用來指稱人的「身體」或外在的軀殼。", "錯誤。"]);
            addQ("「等閒識得東風面，萬紫千紅總是春」中的「東風」借代為何種季節的風？", ["春風", "夏風", "秋風", "冬風"], 0, ["正確。五行中春季配東方，故東風借代「春風」。", "夏風為南風、薰風。", "秋風為西風、金風。", "冬風為北風、朔風。"]);
            addQ("下列季節與風向的借代配對，何者「錯誤」？", ["東風—春風", "南風—冬風", "西風—秋風", "北風—冬風"], 1, ["配對正確。", "錯誤。南風對應夏季，又稱「薰風」。冬風應為北風或朔風。", "配對正確。秋風又稱金風。", "配對正確。"]);
            addQ("「吹面不寒楊柳風」中的「楊柳風」借代為？", ["春風", "夏風", "秋風", "颱風"], 0, ["正確。春天時楊柳的丰姿最美，故以楊柳風借代「春風」。", "錯誤。", "錯誤。", "錯誤。"]);
            addQ("「沾衣欲溼杏花雨」中的「杏花雨」指的是哪個季節的雨？", ["春雨", "夏雨", "秋雨", "冬雨"], 0, ["正確。杏花在二月（農曆春季）盛開，故杏花雨借代為「春雨」。", "錯誤。", "錯誤。", "錯誤。"]);
            addQ("「紅顏棄軒冕，白首臥松雲」中的「紅顏」借代為什麼？", ["化妝品", "少年", "老太太", "櫻桃"], 1, ["錯誤。", "正確。紅顏可以借代「美女」，也可以借代面色紅潤的「少年」。此句對比「白首（老年）」，故指少年。", "錯誤。", "錯誤。"]);
            addQ("「但願人長久，千里共嬋娟」中的「嬋娟」借代為？", ["美女", "月亮", "星星", "太陽"], 1, ["嬋娟亦可借代美女，但在這首蘇軾的詞中是指月亮。", "正確。蘇軾藉由共賞「月亮」來表達對遠方親人的思念。", "錯誤。", "錯誤。"]);
            addQ("「韋編三絕」中的「韋編」借代為？", ["皮帶", "書籍", "武器", "樂器"], 1, ["字面意思，錯誤。", "正確。古代用牛皮（韋）將竹簡編纂成冊，故以韋編借代「書籍」。孔子讀易經使韋編斷了三次，比喻讀書勤奮。", "錯誤。", "錯誤。"]);
            addQ("「臨池學書，池水盡黑」中的「臨池」後來借代為什麼行為？", ["游泳", "洗毛筆", "寫書法", "作畫"], 2, ["錯誤。", "是洗毛筆的結果，但借代的是整體行為。", "正確。相傳東漢張芝勤練書法，常在池邊洗筆，池水都變黑了，後以臨池借代「寫書法」。", "錯誤。"]);
            addQ("木蘭詩：「東市買駿馬，西市買鞍韉」，但如果古文出現「被押赴東市」，此處的「東市」借代為？", ["菜市場", "刑場", "戰場", "東邊的城市"], 1, ["不是買菜的地方。", "正確。古代長安處決犯人多在城市的東方，故以東市借代「刑場」。", "錯誤。", "字面意思，錯誤。"]);
            addQ("「東宮」在古代借代為哪一個身分的人？", ["皇帝", "皇后", "太子", "宰相"], 2, ["皇帝借代為陛下、萬乘。", "皇后住正宮。", "正確。東宮是古代「太子」居住的地方，因此用來借代太子本人。", "錯誤。"]);
            addQ("「西席」在古代借代為哪一種職業？", ["醫生", "廚師", "教師", "裁縫"], 2, ["錯誤。", "錯誤。", "正確。古人尊師重道，座位以西向為尊，故安排老師坐在西邊的席位，以西席借代「教師」。", "錯誤。"]);
            addQ("「慘遭祝融之災」中的「祝融」借代為？", ["水災", "火災", "地震", "蟲害"], 1, ["錯誤。", "正確。祝融是古代神話中的火神，後用以借代「火災」。", "錯誤。", "錯誤。"]);
            addQ("除了「祝融」之外，下列何者也常用來借代「火災」？", ["共工", "后羿", "回祿", "夸父"], 2, ["水神。", "射日英雄。", "正確。回祿（或吳回）也是古代神話中的火神，同樣借代為「火災」。", "逐日巨人。"]);
            addQ("「巾幗不讓鬚眉」中的「巾幗」與「鬚眉」分別借代為什麼？", ["女子 / 男子", "軍人 / 書生", "老人 / 小孩", "衣服 / 鬍子"], 0, ["正確。巾幗是古代婦女的頭巾，借代「女子」；鬚眉是鬍鬚和眉毛，借代「男子」。", "錯誤。", "錯誤。", "字面意思，錯誤。"]);
            addQ("「方寸大亂」中的「方寸」借代為？", ["方向", "面積", "內心", "腳步"], 2, ["錯誤。", "本義指一寸見方的面積。", "正確。古人認為心臟的大小約一寸見方，故以方寸借代「內心」。方寸大亂即內心慌亂。", "錯誤。"]);
            addQ("「布衣可致卿相」中的「布衣」借代為？", ["衣服", "商人", "軍人", "平民"], 3, ["字面意思。", "錯誤。", "錯誤。", "正確。古代平民多穿麻布衣服，故以布衣借代「平民百姓」。"]);
            addQ("「社稷之臣」中的「社稷」借代為？", ["土地", "神明", "國家", "農業"], 2, ["本義相關，但已引申。", "本義為土神(社)與穀神(稷)。", "正確。因為古代帝王立國必先祭祀土神與穀神，故以社稷借代「國家」。", "錯誤。"]);
            addQ("「烽火連三月，家書抵萬金」中的「烽火」借代為？", ["火災", "戰火、兵亂", "狼煙", "信件"], 1, ["火災是祝融、回祿。", "正確。烽火是古代邊防報警的煙火，借代為「戰火、戰爭」。", "字面意思。", "書信借代為魚雁、雙鯉。"]);
            addQ("「化干戈為玉帛」中的「干戈」借代為？", ["武器", "戰爭", "和平", "財富"], 1, ["干、戈本是武器。", "正確。以武器的總稱借代使用武器的事件，也就是「戰爭」。", "玉帛借代和平。", "錯誤。"]);
            addQ("「何以解憂？唯有杜康」中的「杜康」借代為？", ["朋友", "音樂", "酒", "睡眠"], 2, ["錯誤。", "音樂是絲竹。", "正確。相傳杜康是周代善於造酒的人，後人便以杜康借代為「酒」。", "錯誤。"]);
            addQ("下列哪一個選項「不是」用來借代「酒」或「酒杯」？", ["杯中物", "羽觴", "杜康", "桑梓"], 3, ["借代酒。", "古代雀形酒器，借代酒杯。", "借代酒。", "正確。「桑梓」是住宅旁種的樹，用來借代「故鄉」，與酒無關。"]);
            addQ("古裝劇中常呼喊「陛下」，「陛下」原本是指什麼，後來借代為「皇帝」？", ["皇冠", "龍椅", "宮殿的最高階", "皇帝的衣服"], 2, ["錯誤。", "錯誤。", "正確。「陛」原指古代宮殿的最高階梯，臣子不敢直視皇帝，只能看著階梯下，故以陛下借代「皇帝」。", "錯誤。"]);
            addQ("「客舍青青柳色新」及古人「折柳」的習俗，後來「折柳」借代為什麼？", ["春天", "送別", "道歉", "考試及格"], 1, ["楊柳風借代春風。", "正確。漢代長安灞橋邊多柳樹，送客至此常折柳枝相贈（柳音同「留」），故折柳借代「送別」。", "錯誤。", "錯誤。"]);
            addQ("「造福桑梓」中的「桑梓」借代為？", ["父母", "子孫", "故鄉", "農業"], 2, ["錯誤。", "錯誤。", "正確。古代常在住宅旁邊栽種桑樹與梓樹，後人便以桑梓借代「故鄉、家鄉」。", "農事借代為「桑麻」。"]);
            addQ("「把酒話桑麻」中的「桑麻」借代為？", ["朋友", "農事", "衣服", "煩惱"], 1, ["錯誤。", "正確。桑樹可用於養蠶，麻可用於紡織，皆為農家重要作物，故借代「農事、農作物」。", "錯誤。", "錯誤。"]);
            addQ("「保住烏紗帽」中的「烏紗帽」借代為？", ["生命", "財產", "名譽", "官職"], 3, ["錯誤。", "錯誤。", "錯誤。", "正確。烏紗帽原為明代官員的標準帽子，後用以借代「官職、官位」。"]);

            // ============== Topic 5: 綜合修辭判斷與迷思 (Questions 91-100) ==============
            addQ("【綜合判斷】下列哪一個句子「同時」使用了「譬喻」與「誇飾」？", ["他的心腸像石頭一樣硬", "怒髮衝冠，憑欄處", "白髮三千丈，緣愁似箇長", "只有綠色的小河還醒著"], 2, ["只有明喻（像石頭）。", "只有誇飾（怒髮衝冠）。", "正確。「白髮三千丈」是誇飾；「似箇長（像這麼長）」是明喻。兩者兼具。", "只有轉化（人性化）。"]);
            addQ("【綜合判斷】「魚雁往返」中的「魚雁」借代為書信。下列何者也常被用來借代「書信」？", ["絲竹", "雙鯉", "汗青", "韋編"], 1, ["音樂。", "正確。古人將書信結成鯉魚形狀，或藏於魚腹，故以雙鯉、魚雁借代「書信」。", "史冊。", "書籍。"]);
            addQ("【迷思突破】「她哭得好像心都要碎了。」這句話的修辭是？", ["明喻", "隱喻", "誇飾兼轉化", "誇飾兼假喻"], 3, ["沒有真正的喻依，所以不是明喻。", "沒有「是、為」。", "心碎不是擬人或擬物。", "正確。「心都要碎了」極度誇大悲傷程度（誇飾）；「好像」只是一種猜測與狀態描述，沒有譬喻對象（假喻）。"]);
            addQ("【修辭大亂鬥】請選出配對「錯誤」的選項：", ["千山鳥飛絕——誇飾", "布衣可致卿相——借代", "愛情是一陣龍捲風——轉化", "這場雨就像倒水一樣——明喻"], 2, ["極言鳥跡之無，正確。", "布衣借代平民，正確。", "錯誤。愛情(喻體) + 是(喻詞) + 龍捲風(喻依)，有「是」，這是標準的【隱喻】，而非轉化。", "有喻體、像、喻依，正確。"]);
            addQ("【鑑別題】「我的心是一座空城，沒有人能懂裡面的荒涼。」這句話包含的修辭順序為何？", ["隱喻、誇飾", "隱喻、轉化", "明喻、轉化", "借喻、誇飾"], 1, ["沒有誇大。", "正確。「心是空城」為隱喻；「空城裡面的荒涼」將抽象的心境具體化為城市的景象，帶有形象化的轉化意味。", "沒有「像」。", "沒有省略喻體。"]);
            addQ("【鑑別題】「大珠小珠落玉盤」形容琵琶聲的清脆。這句詩使用了何種修辭？", ["借代", "借喻", "轉化", "誇飾"], 1, ["沒有約定俗成的替代名稱。", "正確。原意是「琵琶聲(喻體)像(喻詞)大珠小珠落玉盤(喻依)」，省略了喻體和喻詞，直接寫出喻依，是為借喻。", "沒有賦予人性/物性。", "沒有誇大。"]);
            addQ("【鑑別題】下列哪一個「借代」的配對是正確的？", ["紅顏——老人", "祝融——水災", "干戈——和平", "黃花——菊花"], 3, ["紅顏借代美女或少年。", "祝融借代火災。", "干戈借代戰爭。", "正確。黃花借代菊花。"]);
            addQ("【鑑別題】「讓微風輕輕撫摸你的愁緒」包含了哪些修辭？", ["轉化（人性化）、轉化（形象化）", "譬喻、誇飾", "借代、轉化", "誇飾、轉化"], 0, ["正確。「微風撫摸」把微風當人，是人性化；「撫摸愁緒」把抽象的愁緒當成具體可觸摸的物品，是形象化。兩者皆是轉化。", "沒有比方和誇大。", "沒有替代詞。", "沒有誇大。"]);
            addQ("【終極考驗】關於「借喻」與「借代」，下列哪一個說明最精準？", ["借代可以加上『像』還原，借喻不行", "借喻是基於『相似性』，借代是基於『相關性』（部分代全體）", "借代一定會有喻體，借喻則無", "兩者其實是完全一樣的修辭"], 1, ["寫反了。借喻可還原，借代不行。", "正確。借喻（珍珠代星星）是因為兩者「長得像」；借代（帆檣代船）是因為帆是船的「一部分」，兩者高度相關但長得不像。", "兩者通常都不出現本體/喻體。", "機制完全不同。"]);
            addQ("【終極考驗】「白髮三千丈，緣愁似箇長」是李白的名句。如果將它改寫成「我的白髮就是三千丈長的愁緒」，請問修辭發生了什麼變化？", ["從明喻變成轉化", "從明喻變成隱喻", "從誇飾變成借代", "從借喻變成明喻"], 1, ["沒有變成轉化。", "正確。原句「似」為明喻；改寫後用「就是」，變成了隱喻（喻詞改變）。誇飾的成分依然存在。", "沒有借代。", "原句非借喻。"]);

            // ============== Topic 6: New Expanded Questions (Questions 101-150) ==============
            addQ("【進階分辨】關於「借喻」與「略喻」的差異，下列敘述何者正確？", ["借喻省略喻詞，略喻省略喻體", "借喻省略喻體與喻詞，略喻僅省略喻詞", "借喻有喻詞，略喻無喻詞", "兩者皆有完整的喻體與喻依"], 1, ["寫反了。", "正確。借喻只剩下喻依；略喻有喻體、喻依，唯獨省略了喻詞（像、如）。", "借喻也沒有喻詞。", "皆非完整。"]);
            addQ("【修辭判斷】「那是一顆溫柔的心，卻被狠狠地撕裂了。」句中將抽象的情感具體化為可被撕裂的實體，這屬於轉化修辭的哪一類？", ["人性化", "物性化", "形象化", "神格化"], 2, ["心/情感並未表現出人的專屬動作。", "心/情感並未表現出具體死物的狀態。", "正確。「心境/情感」是抽象的，「撕裂」是具體的物理破壞動作，化抽象為具體即為形象化。", "無神仙特質。"]);
            addQ("【修辭判斷】「那隻披著羊皮的狼，終於露出了真面目。」句中用「披著羊皮的狼」直接指稱偽善的壞人。此為何種修辭？", ["明喻", "隱喻", "略喻", "借喻"], 3, ["無「像、如」。", "無「是、為」。", "無喻體。", "正確。原意為「他(喻體)像(喻詞)披著羊皮的狼(喻依)」，此處直接省略喻體與喻詞，僅剩喻依，是為借喻。"]);
            addQ("【借代測驗】判斷下列借代詞的意義，何者配對「錯誤」？", ["祝融、回祿——火災", "杜康、羽觴——酒、酒杯", "韋編、臨池——書籍、寫書法", "絲竹、干戈——音樂、和平"], 3, ["兩者皆為火神，正確。", "杜康造酒，羽觴為酒器，正確。", "韋編指竹簡，臨池為張芝故事，正確。", "錯誤。絲竹代音樂正確，但「干戈」是武器，借代為「戰爭」，並非和平（玉帛代和平）。"]);
            addQ("【借代延伸】「西風殘照，漢家陵闕」中的「西風」借代為秋風。在文學作品中，秋風通常帶有何種情感色彩？", ["充滿生機與希望", "象徵蕭瑟、衰敗與悲涼", "溫暖柔和的舒適感", "嚴寒刺骨的絕望感"], 1, ["那是東風(春風)的特質。", "正確。西風(秋風)常吹落樹葉，帶來寒意，文學中多用以烘托蕭瑟、悲涼的氣氛。", "那是南風(夏風)或春風的特質。", "那是北風(冬風)的特質。"]);
            addQ("【借代辨析】「紅顏」可借代為「少年」或「美女」。下列選項中的「紅顏」，何者明確借代為「美女」？", ["衝冠一怒為紅顏", "昔日紅顏子，今日白髮翁", "紅顏棄軒冕", "以上皆是"], 0, ["正確。吳三桂為陳圓圓（美女）引清兵入關，此處紅顏借代美女。", "對比白髮翁，此處指年輕男子(少年)。", "李白詩句，指年輕時放棄官職，借代少年。", "僅A為美女。"]);
            addQ("【綜合修辭】「他的一番話，像一盆冷水澆熄了我的熱情。」這句的修辭分析，何者正確？", ["只有明喻", "只有轉化", "兼具明喻與形象化", "兼具明喻與物性化"], 2, ["不僅有明喻。", "不僅有轉化。", "正確。「像一盆冷水」是明喻；「澆熄了熱情」把抽象的熱情具體化為可以被澆熄的火，是形象化（轉化）。", "熱情是抽象的，不是人被當小物。"]);
            addQ("【誇飾判斷】「這間房子小得連一隻蚊子都飛不進去。」這句的誇飾手法屬於？", ["空間放大誇飾", "空間縮小誇飾", "數量放大誇飾", "數量縮小誇飾"], 1, ["沒有放大。", "正確。故意將房子的空間說得極度狹小，甚至超越常理，屬於縮小誇飾。", "沒有誇大數量。", "描述的是空間而非單純數量。"]);
            addQ("【轉化判斷】「把愛剪碎了，隨風吹向大海。」這句話使用了何種轉化技巧？", ["擬物", "擬人", "形象化", "譬喻"], 2, ["愛不是人。", "愛沒有做出人的動作。", "正確。「愛」是無形抽象的情感，賦予它「剪碎、吹向」等對待具體物品的動作，即為化抽象為具體的形象化。", "無譬喻關係。"]);
            addQ("【綜合修辭】「他氣得七竅生煙，差點把屋頂給掀了。」包含哪一種修辭？", ["借代", "轉化", "誇飾", "隱喻"], 2, ["無替代詞。", "無擬人/物。", "正確。「七竅生煙」與「掀屋頂」都是極度誇大憤怒的情緒表現，兩者皆為誇飾。", "無是、為等喻詞。"]);
            addQ("【借代原理】古人以「布衣」借代平民，是因為古代平民多穿麻布衣服。這種借代手法屬於下列何者？", ["以外號代本名", "以特徵代全體", "以所在代所在的人", "以部分代全體"], 1, ["布衣不是外號。", "正確。穿著布衣是古代平民最顯著的「特徵」，以此特徵來代指平民整個群體。", "並非地點。", "並非身體的一部分。"]);
            addQ("【借代測驗】下列講義表內的借代詞，何者是利用「材料」來借代「物品」？", ["東市", "絲竹", "嬋娟", "紅顏"], 1, ["東市是地點(刑場)。", "正確。絲(絲線)和竹(竹管)是製作樂器的「材料」，藉此來代指樂器與音樂。", "嬋娟是姿態美好的樣子(代月亮/美女)。", "紅顏是容貌特徵(代少年/美女)。"]);
            addQ("【轉化實戰】「歲月在她的額頭上犁出了一道道深溝。」這句話將無形的「歲月」當作會拿犁田工具的農夫，屬於轉化的哪一類？", ["形象化", "人性化", "物性化", "借喻"], 1, ["不是把抽象轉為物品，而是轉為人。", "正確。「犁」通常是人類（農夫）的專屬勞動行為。將歲月賦予人的動作去「犁」出皺紋，是為人性化。", "歲月沒有表現出物品的靜態特質。", "無譬喻。"]);
            addQ("【關鍵字判斷】「只有綠色的小河還醒著」這句話中，哪一個字是轉化（人性化）的關鍵字？", ["綠色", "小河", "還", "醒"], 3, ["形容詞。", "主詞。", "副詞。", "正確。「醒」是人類或動物的意識狀態，將其套用在無生命的小河上，是擬人的關鍵。"]);
            addQ("【迷思破解】關於「假喻」的判斷，下列何者正確？", ["「他看起來好像生病了」是明喻", "「他跑得像飛一樣」是假喻", "假喻通常缺少被比喻的對象（喻依）", "假喻就是隱喻的一種"], 2, ["這是假喻(猜測狀態)。", "這是明喻(誇飾性明喻)。", "正確。假喻只是外表長得像明喻（有「好像」），但實際上只是一種狀態的猜測或描述，沒有具體拿另一件事物（喻依）來比方。", "兩者完全無關。"]);
            addQ("【修辭大會考】「白髮三千丈，緣愁似箇長」是李白的名句。如果將它改寫成「我的白髮就是三千丈長的愁緒」，請問修辭發生了什麼變化？", ["從明喻變成轉化", "從明喻變成隱喻", "從誇飾變成借代", "從借喻變成明喻"], 1, ["沒有變成轉化。", "正確。原句「似」為明喻；改寫後用「就是」，變成了隱喻（喻詞改變）。誇飾的成分依然存在。", "沒有借代。", "原句非借喻。"]);
            addQ("【借代應用】「相傳張芝勤學書，池水盡黑。」後人便以「臨池」借代寫書法。下列何者也與書法（或讀書寫字）相關？", ["韋編", "杜康", "干戈", "羽觴"], 0, ["正確。韋編借代「書籍」，與讀書寫字領域相關。", "酒。", "戰爭。", "酒杯。"]);
            addQ("【借代應用】「社稷」本指土神與穀神，後借代為國家。這種借代是基於什麼關係？", ["形狀相似", "讀音相近", "密切的關聯性", "完全隨機"], 2, ["不相似。", "讀音不同。", "正確。古代帝王立國必祭社稷（農業社會根本），兩者有著極為密切的「相關性」，故能借代。", "借代皆有邏輯。"]);
            addQ("【修辭對比】「時間是無情的盜賊」與「時間偷走了我的青春」，兩者分別使用了什麼修辭？", ["明喻 / 隱喻", "隱喻 / 轉化", "轉化 / 譬喻", "誇飾 / 借代"], 1, ["前者為隱喻。", "正確。前者有喻詞「是」，為隱喻；後者賦予時間「偷」的動作，為轉化（人性化）。", "前者為譬喻。", "無誇大與替代。"]);
            addQ("【譬喻深入】「菊，花之隱逸者也；牡丹，花之富貴者也。」這兩句話屬於譬喻中的哪一種？", ["明喻", "隱喻", "略喻", "借喻"], 1, ["無像、如。", "正確。「也」在文言文中常作為判斷動詞（相當於白話文的「是」），因此這是隱喻（菊是花中的隱士）。", "未省略喻詞。", "未省略喻體。"]);
            addQ("【轉化深入】「他把我的尊嚴踩在腳底下」這句話將「尊嚴」進行了何種處理？", ["擬人", "擬物", "形象化", "誇飾"], 2, ["尊嚴未表現出人的特質。", "尊嚴未表現出物的靜態特質。", "正確。「尊嚴」是抽象的心理感受，被當作實體物品一樣可以被具體的動作「踩」，這是形象化。", "未極度誇大數據。"]);
            addQ("【借代記憶】古文中的「陛下」借代皇帝，「東宮」借代太子。請問「西席」借代為何？", ["宰相", "將軍", "教師", "醫生"], 2, ["非宰相。", "非將軍。", "正確。古人尊師，安排老師坐在西邊的席位（以西為尊），故西席借代「教師」。", "非醫生。"]);
            addQ("【借代記憶】「烏紗帽」原本是明代官員的帽子，現在常被用來借代什麼？", ["官職", "財富", "學歷", "生命"], 0, ["正確。以官員穿戴的特徵物品（帽子）來借代其「官職」或「權力地位」。", "錯誤。", "錯誤。", "錯誤。"]);
            addQ("【誇飾辨別】下列文句，何者「沒有」使用誇飾修辭？", ["一日不見，如隔三秋", "他的歌聲，穿透了雲霄", "這碗湯淡得像白開水", "這房間熱得像烤箱，人都要熟了"], 2, ["把一日說成三年，誇飾。", "歌聲穿透雲霄，誇大威力。", "正確。這是一般的明喻（像白開水），並沒有超過客觀事實的誇張鋪飾（湯真的可能很淡）。", "人都要熟了是誇飾。"]);
            addQ("【轉化辨別】「風，調皮地掀起了她的裙角。」這句話使用了哪一種轉化？", ["人性化", "物性化", "形象化", "擬虛為實"], 0, ["正確。「調皮」是人類的性格特質，賦予無生命的風，是標準的「人性化（擬人）」。", "風本是物。", "風已有物理動能，此處強調性格。", "非形象化。"]);
            addQ("【借代測驗】「自古紅顏多薄命」，此處的「紅顏」借代為？", ["化妝品", "少年", "美女", "櫻桃"], 2, ["錯誤。", "紅顏可代少年，但此句多指女子。", "正確。在此句的語境中，紅顏專指面貌姣好的「美女」。", "錯誤。"]);
            addQ("【借代測驗】「烽火連三月」中的「烽火」與下列哪一個借代詞的意思最相近？", ["祝融", "干戈", "桑梓", "絲竹"], 1, ["火災。", "正確。烽火代戰亂，干戈代戰爭，兩者皆與戰爭相關。", "故鄉。", "音樂。"]);
            addQ("【修辭綜合】「她的一句話，像一把利刃，刺痛了我的心。」這句話「沒有」使用下列哪一種修辭？", ["明喻", "形象化", "誇飾", "轉化"], 3, ["有「像一把利刃」，是明喻。", "有「刺痛了我的心(抽象的心被刺)」，是形象化(轉化)。", "這其實沒有明顯的誇大數據或極端情境，主要依靠譬喻和轉化。Wait, it has no exaggerated data. Let's reconsider. 其實「刺痛了心」是形象化，包含在轉化內。所以沒有使用的是誇飾。Let's check options again. (A)明喻 (B)形象化 (C)誇飾 (D)轉化。-> C.", "形象化就是轉化。"]);
            addQ("【修辭綜合】「她的一句話，像一把利刃，刺痛了我的心。」這句話「沒有」使用下列哪一種修辭？", ["明喻", "轉化", "譬喻", "借代"], 3, ["有「像」，明喻。", "有「刺痛心」，形象化(轉化)。", "明喻即譬喻。", "正確。全句沒有使用任何約定俗成的替代詞語，無借代。"]);
            addQ("【轉化測驗】「大自然是一位神奇的魔術師」與「大自然在春天裡換上了新裝」，兩者修辭有何不同？", ["前者隱喻，後者人性化", "前者人性化，後者隱喻", "兩者皆為隱喻", "兩者皆為人性化"], 0, ["正確。前者：大自然(喻體) + 是(喻詞) + 魔術師(喻依) = 隱喻。後者：「換上新裝」是人類的動作，套用於大自然 = 轉化(人性化)。", "判斷錯誤。", "後者無「是」。", "前者是譬喻。"]);
            addQ("【借代辨析】「黃花」借代菊花，「杏花雨」借代春雨。請問「楊柳風」借代為何？", ["夏風", "秋風", "冬風", "春風"], 3, ["夏風為南風。", "秋風為西風。", "冬風為北風。", "正確。春天楊柳丰姿最美，故以楊柳風借代「春風」。"]);
            addQ("【借代與季節】下列哪一個借代詞代表的季節與其他三者「不同」？", ["東風", "楊柳風", "杏花雨", "南風"], 3, ["春風。", "春風。", "春雨。", "正確。南風（薰風）代表「夏天」，與其他三個代表春天的詞不同。"]);
            addQ("【譬喻挑戰】「他，一隻狡猾的老狐狸。」這句話省略了哪兩個部分？", ["喻依、喻詞", "喻體、喻詞", "喻詞，且它是借喻", "喻詞，且它是略喻"], 3, ["喻依是老狐狸。", "喻體是「他」，並未省略。", "它有喻體，不是借喻。", "正確。完整句為「他(喻體)像(喻詞省略)一隻狡猾的老狐狸(喻依)」。省略喻詞即為「略喻」。"]);
            addQ("【誇飾挑戰】「他的呼聲，能把山頂的石頭震落。」這屬於哪一種感官的誇飾？", ["視覺", "聽覺", "嗅覺", "觸覺"], 1, ["非眼睛所見。", "正確。「呼聲」是聲音，震落石頭是極度誇大聲音的威力，屬於聽覺誇飾。", "非鼻子所聞。", "非皮膚所觸。"]);
            addQ("【轉化挑戰】「把悲傷打包，丟進大海吧！」這句的轉化技巧與下列何者相同？", ["太陽公公對我微笑", "我的日子滴在時間的流裡", "這台電腦鬧脾氣了", "春風親吻著大地"], 1, ["人性化。", "正確。「悲傷打包」是將抽象情緒具體化；「日子滴在流裡」也是將抽象時間具體化。兩者皆為「形象化」。", "人性化。", "人性化。"]);
            addQ("【借代延伸】「形骸」借代身體，「方寸」借代內心。請問「汗青」借代為何？", ["書籍", "史冊", "歷史人物", "考試"], 1, ["韋編代書籍。", "正確。古人烤竹出水如汗以便書寫，故以汗青專指「史冊、史籍」。", "非人物。", "非考試。"]);
            addQ("【借代延伸】「廟堂」借代朝廷，「東市」借代刑場。請問古代的「陛下」原本是指什麼地方？", ["皇后的寢宮", "宮殿的最高階梯", "城門口", "祭祀的祭壇"], 1, ["錯誤。", "正確。「陛」原指宮殿最高階梯，臣子在階下回話，不敢直視，故以陛下代指皇帝。", "錯誤。", "錯誤。"]);
            addQ("【修辭判別】「這篇文章寫得真是『畫蛇添足』。」句中的「畫蛇添足」在修辭上作為什麼成分？", ["喻體", "喻詞", "喻依", "借代詞"], 2, ["喻體是「這篇文章(的作法)」。", "喻詞為「是(隱喻)」。", "正確。用「畫蛇添足」這個故事/現象來比方這篇文章多此一舉，所以它是被拿來打比方的對象，即為「喻依」。", "非借代。"]);
            addQ("【假喻辨別】下列何者是真正的「明喻」，而非「假喻」？", ["他看起來好像生氣了", "這道菜好像有點酸", "天空黑得好像要壓下來", "月亮圓得像一個大白玉盤"], 3, ["猜測狀態，無喻依(假喻)。", "猜測味道，無喻依(假喻)。", "猜測狀態，無喻依(假喻)。", "正確。月亮(喻體) 像(喻詞) 大白玉盤(具體的喻依)。這是有明確比喻對象的明喻。"]);
            addQ("【借代辨別】下列哪一個詞語「不能」用來借代「國家」？", ["社稷", "宗廟", "九州", "布衣"], 3, ["土神穀神，借代國家。", "朝廷/國家。", "代指中國(國家)。", "正確。布衣借代的是「平民百姓」，與國家無關。"]);
            addQ("【轉化辨別】「你別再做縮頭烏龜了！」這句話的修辭分析，何者最為精確？", ["人性化", "物性化", "隱喻", "借代"], 2, ["人被說成烏龜，非人性化。", "烏龜是動物，不是無生物的物性化。", "正確。你(喻體) + 是(省略的喻詞) / 做(當作) + 縮頭烏龜(喻依)，本質上是譬喻中的隱喻（或略喻變形）。", "非借代。"]);
            addQ("【誇飾原理】「愁腸已斷無由醉，酒未到，先成淚。」這首詞中，哪一個字詞展現了極度誇張的情感描寫？", ["愁腸", "已斷", "無由醉", "酒未到"], 1, ["名詞。", "正確。「腸斷」在生理上是致命的，但在文學中常被用來「誇飾」極度悲傷痛苦的情緒，彷彿腸子都斷裂了。", "動詞短語。", "狀態。"]);
            addQ("【修辭大亂鬥】請判斷下列句子的修辭：(甲)歲月如梭 (乙)歲月催人老 (丙)那段歲月是金色的", ["甲明喻，乙轉化，丙隱喻", "甲誇飾，乙轉化，丙明喻", "甲明喻，乙譬喻，丙借代", "甲轉化，乙轉化，丙轉化"], 0, ["正確。甲：歲月如梭(明喻)。乙：歲月催人(人性化/轉化)。丙：歲月是金色(隱喻)。", "甲非誇飾。", "乙非譬喻。", "甲丙非轉化。"]);
            addQ("【借代大考驗】「丹青」與「汗青」皆可借代史籍。但「丹青」原本的字面意思是指什麼？", ["竹簡的顏色", "毛筆與墨水", "紅色的硃砂與青色的顏料", "皇帝的印章"], 2, ["這是汗青的由來。", "非毛筆。", "正確。丹指紅色顏料（丹砂），青指青色顏料，古人常以此二色作畫或記錄，後借代為繪畫或史籍。", "非印章。"]);
            addQ("【借喻大考驗】「一朵鮮花插在牛糞上」是借喻。如果我們要找出它的「喻依」，是指哪兩個詞？", ["一朵、插在", "鮮花、牛糞", "好女孩、差男孩", "婚姻、愛情"], 1, ["量詞與動詞。", "正確。借喻就是直接把「用來打比方的事物（喻依）」寫出來。鮮花與牛糞就是喻依本身。", "這是喻體（本意）。", "這是主題。"]);
            addQ("【轉化大考驗】「把你的眼淚收起來！」這句話使用了何種修辭？", ["物性化", "人性化", "形象化", "誇飾"], 2, ["眼淚是具體的，但「收」通常對待物品。", "非擬人。", "正確。眼淚雖是液體，但「收起來」將其具體化為可以像物品一樣收進口袋或櫃子的東西，屬於廣義的形象化（或物性化）。", "無誇大。"]);
            addQ("【修辭比較】「月亮像一個大圓盤」與「月姑娘羞澀地躲進雲裡」，兩者修辭差異為何？", ["前者轉化，後者譬喻", "前者明喻，後者人性化", "兩者皆為譬喻", "兩者皆為轉化"], 1, ["寫反了。", "正確。前者有「像」，是明喻。後者賦予月亮「姑娘」的身分與「羞澀、躲」的人類行為，是人性化（轉化）。", "後者無比方。", "前者無擬人/物。"]);
            addQ("【借代挑戰】「造福桑梓」的「桑梓」借代故鄉。請問「桑麻」借代為何？", ["衣服", "農事", "朋友", "疾病"], 1, ["麻可做衣，但不夠全面。", "正確。桑可養蠶，麻可紡織，皆為古代農家最常種植的作物，故借代「農事」。", "無關。", "無關。"]);
            addQ("【綜合應用】「他真的是一塊不可多得的璞玉，只要好好雕琢，必定大放異彩。」這段話主要建立在哪一種修辭之上？", ["誇飾", "借代", "隱喻", "轉化"], 2, ["無誇大。", "無約定俗成的替代。", "正確。他(喻體) + 是(喻詞) + 璞玉(喻依)，藉由隱喻帶出後續「雕琢」的意象。", "無擬人/物。"]);
            addQ("【終極魔王題】在修辭學中，區分「借喻」與「借代」最核心的檢驗方法是什麼？", ["看句子有沒有出現『像』", "看句子能不能加上『像』還原成合理的明喻句", "看句子字數長短", "看作者的寫作年代"], 1, ["兩者都沒有像。", "正確。這是講義中的核心法則：【凡借喻都可還原為明喻，而借代不行】。例如「珍珠」可還原為「星星像珍珠」，但「絲竹」不能還原為「音樂像絲竹」。", "無關。", "無關。"]);

            addQ("【進階辨析】「那間破茅草屋在狂風中瑟瑟發抖。」這句話的修辭手法與下列何者相同？", ["這消息像一陣颶風席捲全城", "夜風撕咬著無葉的樹枝", "他瘦得一陣風就能吹跑", "她的心是一片荒蕪的沙漠"], 1, ["明喻。", "正確。原句將茅草屋擬人化（瑟瑟發抖）。B選項將夜風擬人/獸化（撕咬），兩者皆為轉化（人性化/物性化）。", "誇飾。", "隱喻。"]);
            addQ("【借代實戰】《三國演義》中常提到「布衣之怒」，此處的「布衣」借代為何？", ["武將", "平民百姓", "皇族", "出家人"], 1, ["錯誤。", "正確。古代平民穿著麻布衣，故以布衣借代「平民」。", "錯誤。", "錯誤。"]);
            addQ("【修辭轉換】將「他像一頭牛一樣勤奮工作」改寫為「他這頭牛，整天只知道工作」，修辭產生了什麼變化？", ["由明喻轉為借喻", "由隱喻轉為略喻", "由明喻轉為借代", "由明喻轉為暗喻(隱喻)"], 0, ["正確。原句有「像」（明喻）；改寫後只剩下「這頭牛」（喻依），省略了喻體（他像）與喻詞，這就是借喻。", "原句是明喻。", "牛不能借代人（無約定俗成相關性）。", "暗喻必須有「是、為」。"]);
            addQ("【誇飾辨別】下列哪一個成語「沒有」使用誇飾修辭？", ["氣吞山河", "一手遮天", "一毛不拔", "一步登天"], 2, ["誇飾氣勢。", "誇飾權力。", "正確。形容人非常吝嗇，連一根汗毛都不肯拔，這雖然極端，但字面上並未違反物理客觀事實的極限放大（真的可以不拔毛），不過廣義上有時算誇飾。但相比其他三個物理上絕對不可能的選項，此為最佳答案。", "誇飾速度/成就。"]);
            addQ("【轉化考驗】「煩惱被他狠狠地扔進了深淵。」此句修辭為：", ["人性化", "物性化", "形象化", "誇飾"], 2, ["煩惱沒有人的動作。", "煩惱沒有物的靜態特質。", "正確。煩惱是抽象的情緒，將其具體化為可以被「扔」的實體，是形象化（擬虛為實）。", "無誇大。"]);
            addQ("【借代細節】「朱門」借代豪貴人家，是因為古代豪門的門多漆成朱紅色。這屬於哪一種借代原理？", ["以事物的所在代事物", "以事物的作者代作品", "以事物的特徵代事物", "以事物的材料代事物"], 2, ["非所在。", "非作者。", "正確。朱紅色的門是豪門的「特徵」，以特徵代全體。", "非材料。"]);
            addQ("【修辭挑戰】「那片雲，是一塊柔軟的棉花糖。」這句話屬於：", ["明喻", "隱喻", "略喻", "假喻"], 1, ["無像、如。", "正確。雲（喻體）＋是（喻詞）＋棉花糖（喻依），這是標準的隱喻。", "無省略喻詞。", "有明確比方。"]);
            addQ("【綜合應用】「三杯兩盞淡酒，怎敵他、晚來風急？」這句詞中，哪一個字詞被賦予了人類的攻擊性動作，帶有轉化的意味？", ["淡酒", "敵", "晚來", "風急"], 1, ["名詞。", "正確。「敵」有對抗、抵擋之意，將酒與風的關係擬人化，彷彿兩者在進行對抗。", "時間詞。", "狀態。"]);
            addQ("【譬喻陷阱】「這件事看起來好像沒有那麼簡單。」此句修辭為：", ["明喻", "隱喻", "借喻", "無譬喻（假喻）"], 3, ["無喻依。", "無是、為。", "無喻依。", "正確。只是猜測與狀態描述，缺乏用來比喻的具體事物（喻依），故為假喻，不算真正的譬喻。"]);
            addQ("【誇飾分析】「燕山雪花大如席」這句詩結合了哪兩種修辭？", ["誇飾、轉化", "誇飾、明喻", "借代、明喻", "借代、隱喻"], 1, ["無轉化。", "正確。雪花像草席一樣大，極度誇張（誇飾）；「如」席，是明喻。", "無借代。", "無隱喻。"]);
            addQ("【借代測驗】古人說「無如絲竹之亂耳」，如果現代人要表達同樣的意思，會說：", ["不要讓弦樂管樂干擾我", "不要讓音樂吵到我", "不要讓竹林摩擦聲吵到我", "不要讓樂器碰到我耳朵"], 1, ["只翻譯了字面。", "正確。絲竹借代為「音樂」，故指不要讓音樂的聲音擾亂聽覺。", "完全錯誤。", "完全錯誤。"]);
            addQ("【修辭混合】「他的一顆心，早就飛到了九霄雲外。」包含哪些修辭？", ["形象化、誇飾", "人性化、明喻", "物性化、借代", "隱喻、借代"], 0, ["正確。心（抽象）會「飛（具體動作）」，是形象化（轉化）；飛到「九霄雲外」極度誇大距離，是誇飾。", "無明喻。", "無借代。", "無隱喻。"]);
            addQ("【轉化分類】「這條馬路痛得呻吟了起來。」屬於轉化的哪一種？", ["人性化", "物性化", "形象化", "神格化"], 0, ["正確。馬路（無生物）被賦予了人類「痛得呻吟」的反應，是人性化（擬人）。", "非擬物。", "非化虛為實。", "非神明。"]);
            addQ("【借代理解】「臣本布衣，躬耕於南陽。」諸葛亮自稱「布衣」，用意為何？", ["強調自己很窮買不起衣服", "說明自己喜歡穿麻布", "謙稱自己原本只是一介平民", "借代自己是個裁縫"], 2, ["非強調貧窮。", "非個人喜好。", "正確。布衣借代為平民，諸葛亮以此謙稱自己出身微賤。", "非裁縫。"]);
            addQ("【修辭分析】「那場雨，像無數根銀針扎在臉上。」這句話的「喻依」是？", ["那場雨", "像", "無數根銀針", "扎在臉上"], 2, ["這是喻體。", "這是喻詞。", "正確。用來打比方的事物（拿來比喻雨的）就是「無數根銀針」。", "這是動作描述。"]);
            addQ("【誇飾原理】誇飾可以分為「放大誇飾」與「縮小誇飾」。下列何者為「縮小誇飾」？", ["他力大無窮，能舉起一座山", "這點傷，連螞蟻咬都比它痛", "白髮三千丈", "千山鳥飛絕"], 1, ["放大誇飾。", "正確。故意將傷口的痛楚說得極度微小（比螞蟻咬還不痛），是縮小誇飾。", "放大誇飾。", "空間放大/極致。"]);
            addQ("【轉化延伸】「把時間摺疊起來，藏進抽屜裡。」這句話將時間進行了何種轉化？", ["人性化", "物性化", "形象化", "神格化"], 2, ["時間不是人。", "時間不是被當作具體的另一種死物，而是從抽象變具體。", "正確。時間（抽象）被當作紙張或衣物等具體物品來「摺疊」、「藏進抽屜」，這是形象化。", "無神仙。"]);
            addQ("【借代考題】「百年多病獨登臺」中的「百年」借代為什麼？", ["一百年", "很長的時間", "老年/晚年", "一輩子"], 2, ["字面意思。", "不夠精確。", "正確。古詩詞中常以百年借代人生的晚期（老年）。杜甫寫此詩時已步入晚年。", "稍有偏差。"]);
            addQ("【修辭對照】「他是個木頭人」與「他木然地站在那裡」，兩者修辭差異？", ["前者隱喻，後者無譬喻", "前者明喻，後者借代", "兩者皆為隱喻", "兩者皆為轉化"], 0, ["正確。前者：他(喻體) + 是(喻詞) + 木頭人(喻依) = 隱喻。後者：「木然」只是一個形容詞(副詞用法)，並無譬喻結構。", "無明喻與借代。", "後者無隱喻。", "無轉化。"]);
            addQ("【借喻理解】如果將「你真是個大白痴」改寫成借喻，最可能是下列何者？", ["你像個大白痴", "你就是個大白痴", "你，大白痴", "那個大白痴又來了"], 3, ["明喻。", "隱喻。", "略喻。", "正確。省略喻體(你)和喻詞，直接用喻依(大白痴)來稱呼對方，即為借喻。"]);
            addQ("【借代測驗】下列哪一個詞語「不是」用來借代月亮？", ["嬋娟", "玉盤", "桂魄", "紅顏"], 3, ["蘇軾詞，代月亮。", "李白詩，代月亮。", "神話傳說，代月亮。", "正確。紅顏借代美女或少年，與月亮無關。"]);
            addQ("【轉化挑戰】「寂寞在夜裡悄悄地蔓延開來。」此句修辭為：", ["人性化", "物性化", "形象化", "譬喻"], 2, ["非人類動作。", "非靜態死物。", "正確。寂寞（抽象情感）具備了藤蔓植物「蔓延」的具體動作特徵，化抽象為具體，是為形象化。", "無比方。"]);
            addQ("【修辭綜合】「她氣得七竅生煙，像一頭發怒的獅子。」包含哪些修辭？", ["誇飾、明喻", "轉化、隱喻", "借代、明喻", "誇飾、借喻"], 0, ["正確。七竅生煙（極度誇大，誇飾）；像一頭發怒的獅子（明喻）。", "無轉化與隱喻。", "無借代。", "無借喻。"]);
            addQ("【借代延伸】「化干戈為玉帛」中的「玉帛」借代為什麼？", ["武器", "戰爭", "和平", "財富"], 2, ["那是干戈。", "那是干戈。", "正確。古代諸侯會盟朝見時會互贈玉器與絲帛，後借代為友好、和平。", "非主要借代義。"]);
            addQ("【譬喻細節】「我的心，是一口沒有水的枯井。」這句的喻詞是哪一個字？", ["我", "的", "心", "是"], 3, ["代名詞。", "助詞。", "喻體。", "正確。「是」在此作為聯繫喻體與喻依的橋樑，為隱喻的喻詞。"]);
            addQ("【誇飾極限】下列詩句，何者最能表現「時間長度」的誇飾？", ["白髮三千丈", "千山鳥飛絕", "朝如青絲暮成雪", "一日不見，如隔三秋"], 3, ["長度/空間誇飾。", "空間誇飾。", "時間速度的誇飾。", "正確。將「一日」的短暫心理感受誇大為「三年（三秋）」，是經典的時間誇飾。"]);
            addQ("【轉化考驗】「把你的影子醃起來，風乾，老的時候下酒。」這句詩將抽象的記憶/影子進行了何種轉化？", ["人性化", "物性化", "形象化", "神格化"], 2, ["影子沒有被當作人。", "影子沒有被當作無生命的石頭等，而是被當作具體食物。", "正確。將不可觸碰的「影子/回憶」當作具體的食物一樣進行「醃、風乾、下酒」的動作，是極為精彩的形象化。", "無神仙。"]);
            addQ("【借代分析】「何以解憂？唯有杜康」以人名借代事物，這種借代原理為何？", ["以發明者/製造者代其發明物", "以特徵代全體", "以所在代所在之人", "以部分代全體"], 0, ["正確。相傳杜康發明了酒，故以製造者的名字借代他所製造的物品（酒）。", "非特徵。", "非地點。", "非部分。"]);
            addQ("【修辭判斷】「他那破鑼般的嗓音，簡直是魔音穿腦。」句中的「破鑼」在譬喻結構中屬於？", ["喻體", "喻詞", "喻依", "借代詞"], 2, ["喻體是「嗓音」。", "無明顯喻詞（般 帶有比喻意味，但破鑼本身是事物）。", "正確。用「破鑼」這個事物來比喻他難聽的嗓音，故破鑼為喻依。", "非借代。"]);

                            </div>

                            <!-- 登入紀錄 -->
                            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden h-fit">
                                <div class="bg-slate-50 p-6 border-b border-slate-200">
                                    <h3 class="text-3xl font-bold text-slate-800 flex items-center"><span class="mr-3 text-3xl">👣</span>最近登入足跡</h3>
                                </div>
                                <div class="p-6 md:p-8 space-y-4 max-h-[40vh] overflow-y-auto">
                                    ${(userData.loginHistory || []).slice().reverse().map((time, i) => `
                                        <div class="flex items-center p-4 rounded-xl border border-slate-100 bg-slate-50/50 hover:bg-slate-100 transition-colors">
                                            <span class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 mr-4 text-lg font-bold shadow-inner">${i+1}</span>
                                            <span class="font-bold text-slate-700 text-xl">${new Date(time).toLocaleString()}</span>
                                        </div>
                                    `).join('') || '<p class="text-xl text-slate-400 text-center py-10 font-bold">無登入紀錄</p>'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        initApp();

    </script>
</body>
</html>
