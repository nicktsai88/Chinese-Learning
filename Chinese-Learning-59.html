                ["兩者皆非單純的感嘆或諷刺。", "正確。「嗟哉」句嚴厲批評某些人連禽獸都不如，為責備；「癩蝦蟆」句則是看不起對方不自量力，為輕視。", "「嗟哉」句極為莊重嚴肅，絕非輕薄。", "後者完全沒有推測意味。"]);

            addQ("關於「推測」語氣，下列哪一個句子**不具有**推測的意味？", 
                ["我想牠的苦悶，大概是僅次於黏在膠紙上的蒼蠅。", "應是母慈重，使爾悲不任。", "菊之愛，陶後鮮有聞。", "大約大去之期不遠矣。"], 2, 
                ["有「我想」、「大概」等推測詞。", "有「應是」等推測詞。", "正確。「鮮有聞」（很少聽說）是周敦頤對社會現象的肯定陳述與感嘆，沒有猜測的意思。", "有「大約」等推測詞。"]);

            addQ("「你在此須要小心，休惹人說不是。」與「還站在那裡不動，趕快下來幫忙啊！」兩者的語氣分別為何？", 
                ["前者警告，後者祈求", "前者命令，後者責備", "前者叮嚀，後者命令", "前者叮嚀，後者警告"], 2, 
                ["前者無嚴重後果，非警告；後者態度強硬，非祈求。", "前者出於關心，非強制命令。", "正確。前者是長輩對晚輩出門在外的反覆囑咐與關心，為叮嚀；後者強制要求對方立即行動，為命令。", "後者無預告危險，非警告。"]);

            addQ("「湖中焉得更有此人！」（張岱《湖心亭看雪》）這句話表達了作者遇見知音時的何種語氣？", 
                ["反詰與驚喜", "反詰與輕視", "感嘆與諷刺", "推測與期望"], 0, 
                ["正確。「焉得」意即「哪裡能得到（想不到能遇到）」，是反詰句型；同時表達了作者在深夜湖中意外遇到同好的極度驚訝與喜悅（驚喜語氣）。", "遇到知音不可能輕視對方。", "沒有諷刺意味。", "已經遇到了，不是推測未來。"]);

            addQ("「白燈塔，白燈塔，你若是知道際遇如此，當也會和我一樣太息。」這句話的語氣包含了：", 
                ["呼告、推測", "假設、命令", "呼告、警告", "感嘆、自責"], 0, 
                ["正確。連呼兩次「白燈塔」是呼告法；「當也會」（應該也會）是對白燈塔反應的估計，屬於推測語氣。", "「當也會」不是命令。", "沒有警告意味。", "雖有太息，但句型核心在對燈塔說話並猜測其反應。"]);

            addQ("講義中提到：「有些句子，可能含有兩種語氣。」下列哪一個句子最明顯**同時具備**兩種語氣？", 
                ["飽食終日，無所用心，難矣哉！", "主啊，請陶冶我的兒子。", "令他馬，固不敗傷我乎？而廷尉乃當之罰金！", "穿上吧！涼了。"], 2, 
                ["主要為感嘆。", "主要為呼告/祈求。", "正確。張釋之的話語中，「固不敗傷我乎？」（難道不會撞傷我嗎？）是反詰語氣，而整段話的核心是對廷尉判決太輕的強烈不滿，帶有責備語氣。", "主要為叮嚀。"]);

            addQ("「朋友，只管走過去吧！不必逗留著採拾路畔的花朵來保存。」（泰戈爾）這句話的語氣最接近：", 
                ["命令", "警告", "期望 (勉勵)", "推測"], 2, 
                ["雖有祈使句型，但朋友之間多為勸勉，而非強制命令。", "沒有提出危險後果。", "正確。這是一種期許與勉勵（期望），希望朋友能勇往直前，不要因貪戀眼前小景而停滯。", "無推測詞。"]);

            addQ("「行之有恆，久久自芬芳。」這句話傳達了作者對讀者的何種語氣？", 
                ["推測", "期望", "警告", "感嘆"], 1, 
                ["雖有「自」（自然會）的預期，但核心在於勸勉。", "正確。這是一句勉勵的話語，期許讀者能夠持之以恆，最終必能獲得美好的結果（期望語氣）。", "非預告危險。", "非單純抒發情緒。"]);

            // Q21-Q30: 文言文與白話文的情境判斷
            addQ("「使天下無農夫，舉世皆餓死矣。」這句話透過什麼語氣來強調農夫的重要性？", 
                ["感嘆", "假設", "推測", "責備"], 1, 
                ["並非單純抒情。", "正確。句首的「使」字為「假使、如果」之意，透過假設一個不存在的極端情況，來反證農夫的不可或缺。", "這是一個邏輯推演的肯定結果，而非猜測。", "沒有責罵的對象。"]);

            addQ("「剛學會坐的妹妹突然站了起來，讓大家嚇了一跳。」此句描述的情境屬於何種語氣的展現？", 
                ["驚喜", "感嘆", "推測", "期望"], 0, 
                ["正確。描述出乎意料之外且令人振奮或訝異的事情發生，屬於驚喜語氣。", "感嘆通常帶有更深沉的主觀情緒。", "事情已經發生，非推測。", "非表達願望。"]);

            addQ("「這題我都不會，難道你能解得開？」這句話表面上是個問句，實際上表達了說話者的什麼心態？", 
                ["真誠的請教", "對自己能力的感嘆", "對對方能力的輕視", "對題目的責備"], 2, 
                ["「難道」一詞顯示並非真心發問。", "重點在後半句對他人的評價。", "正確。透過反詰句「難道你能解得開？」（答案為：你一定解不開），表達了說話者認為對方能力不如自己的傲慢與輕視。", "不能責備無生命的題目。"]);

            addQ("下列何者與「丞相玄機，神鬼莫測」所展現的語氣最為相近？", 
                ["商女不知亡國恨，隔江猶唱後庭花", "衣沾不足惜，但使願無違", "慈烏復慈烏，鳥中之曾參", "嗚呼！其真無馬邪？其真不知馬也！"], 2, 
                ["諷刺。", "期望。", "正確。兩者皆是對特定對象發出極高的評價與讚美，為「讚頌」語氣。", "感嘆/反詰。"]);

            addQ("「如果制定法律嚴懲亂丟垃圾的人，我們的環境應該會乾淨許多。」這句話包含了哪兩種語氣？", 
                ["假設與推測", "假設與警告", "警告與期望", "推測與命令"], 0, 
                ["正確。「如果」表示假設語氣；「應該會」表示對未來結果的不確定估計，為推測語氣。", "沒有提出不做的嚴重後果，非警告。", "有假設前提。", "沒有命令。"]);

            addQ("「我走了，到那邊來信！」這簡短的一句話，最能體現出說話者的何種語氣？", 
                ["命令", "叮嚀", "期望", "警告"], 1, 
                ["朋友或親人道別時的交代，通常不視為嚴厲的命令。", "正確。臨別時的囑咐，希望對方報平安，充滿關切之意，屬於叮嚀語氣。", "期望通常針對較大的人生願景。", "無危險成分。"]);

            addQ("「夕陽無限好，只是近黃昏。」（李商隱《登樂遊原》）這句千古名句最主要傳達了什麼語氣？", 
                ["讚頌", "推測", "感嘆", "自責"], 2, 
                ["雖然前半句讚美夕陽，但後半句的「只是」才是情感的重心轉折。", "沒有推測。", "正確。面對美好事物即將消逝，詩人發出深沉的惋惜與無奈，為標準的感嘆語氣。", "與個人過失無關。"]);

            addQ("「若再求多，便是佔人產業，莫大罪過。」這句話中「莫大罪過」一句產生了何種語氣效果？", 
                ["自責", "推測", "警告", "諷刺"], 2, 
                ["是在對他人說話，非自責。", "是一個肯定的判斷，非推測。", "正確。告訴對方如果繼續貪求，將會犯下大錯（提出嚴重後果），藉此阻止對方的行為，具有警告的意味。", "沒有嘲諷，是很直接的制止。"]);

            addQ("「漆黑的夜空劃過一道流星，觀星的人們發出一陣驚呼。」此情境對應講義中的哪一種語氣類別？", 
                ["驚喜", "感嘆", "祈求", "推測"], 0, 
                ["正確。流星的出現短暫且令人震撼，引發人們的「驚呼」，屬於遇到突發美好事物的「驚喜」語氣。", "感嘆通常較為悠長。", "人們並非在對流星許願（雖然常有此習俗，但句中只描述驚呼）。", "已經看見，非推測。"]);

            addQ("「唉！我現在想想，那時真是太聰明了！」（朱自清《背影》）關於此句的修辭與語氣，下列敘述何者完全正確？", 
                ["使用了譬喻修辭，語氣為讚頌", "使用了倒反修辭，語氣為自責", "使用了排比修辭，語氣為感嘆", "使用了設問修辭，語氣為諷刺"], 1, 
                ["沒有譬喻，也非讚美自己。", "正確。作者說自己「太聰明了」，其實是反話（倒反修辭），實際上是在懊悔當時不懂父親的愛，覺得自己太愚蠢，語氣為「自責」。", "無排比結構。", "無疑問句型。"]);

            // Q31-Q45: 專攻「反詰」語氣與常用字詞 (極度重要)
            addQ("在反詰語氣中，常用的「何」字，其意義通常為：", 
                ["為什麼、有什麼", "哪裡", "難道", "怎麼"], 0, 
                ["正確。「何足掛齒」意為「有什麼值得提起的呢？」。", "通常「安」、「烏」解作哪裡。", "通常「豈」、「其」解作難道。", "通常「焉」、「奚」解作怎麼。 (但古文中這些字義常有重疊，A為最常見解釋)"]);

            addQ("「不入虎穴，焉得虎子？」句中的「焉」字，替換為下列何者後，句意改變最大？", 
                ["安", "烏", "奚", "固"], 3, 
                ["「安得虎子」（怎麼能得到），意思不變。", "「烏得虎子」（怎麼能得到），意思不變。", "「奚得虎子」（怎麼能得到），意思不變。", "正確。「固」解作「本來、難道是（如：固如是乎）」，若改為「固得虎子」語法不通且無法表達「怎麼能」的疑問反詰語氣。"]);

            addQ("「燕雀安知鴻鵠之志哉！」此句表達了鴻鵠對燕雀的何種語氣？（多選題概念化為單選最佳解）", 
                ["反詰與讚頌", "反詰與輕視", "推測與期望", "感嘆與自責"], 1, 
                ["沒有讚美燕雀。", "正確。「安知……哉」為反詰語氣（怎麼會知道呢？答案是不會知道）；藉此比喻庸人不懂志士的抱負，帶有輕視的意味。", "無推測與期望。", "無感嘆與自責。"]);

            addQ("「不知言之人，烏可與言？」這句話的意思最接近下列何者？", 
                ["不知道別人說什麼的人，可以告訴他嗎？", "不會說話的人，哪裡可以和他交談呢？", "不能理解你話語的人，有什麼必要再和他說呢？", "烏鴉怎麼可能和人說話呢？"], 2, 
                ["非「告訴他」。", "「不知言」並非不會說話。", "正確。「烏」字作「哪裡、何必」解。意指與無法溝通的人多說是沒有用的（反詰語氣）。", "「烏」在此為疑問副詞，非指烏鴉。"]);

            addQ("「齒髮衰，不可返已，志氣衰，奚有不可返者哉？」句中「奚有不可返者哉」的實際意思是：", 
                ["志氣一定無法找回來了。", "為什麼志氣不能找回來呢？我也不知道。", "志氣衰退了，哪裡還有找回來的可能呢？（意即不能找回）", "志氣衰退了，難道沒有找回來的可能嗎？（意即一定能找回來）"], 3, 
                ["這是字面相反的意思。", "反詰句不是真的有疑問。", "這與作者想表達的積極態度相反。", "正確。反詰句「哪有不可返回的呢？」答案就在問題的反面：「一定有可以返回（找回來）的可能」。勉勵人要重振志氣。"]);

            addQ("「新筍已成堂下竹，落花都上燕巢泥，忍聽林表杜鵑啼？」這闕詞中的「忍」字，在此處解釋為：", 
                ["忍耐", "殘忍", "哪裡忍心", "忍不住"], 2, 
                ["非指咬牙忍耐。", "非指心地殘酷。", "正確。「忍聽……啼？」是一個反詰句，意為「怎麼忍心聽……」，表達作者面對春去夏來、韶光易逝的傷感。", "非忍不住。"]);

            addQ("「象至不仁，封之有庳。有庳之人奚罪焉？仁人固如是乎？」句末的「固如是乎」傳達了萬章對舜的作法抱持何種態度？", 
                ["極度贊同的讚頌", "深信不疑的推測", "提出質疑的反詰", "滿懷期待的期望"], 2, 
                ["萬章覺得這作法有問題，並非贊同。", "不是推測。", "正確。「固」有「難道」之意。「仁德的人難道是這樣做的嗎？」答案為反面（不該這樣做），萬章以此反詰語氣向孟子提出對舜的質疑。", "不是期望。"]);

            addQ("「且僕與足下俱楚人，使僕游揚足下名於天下，顧不美乎？」句中的「顧」字，其作用與下列何者最相近？", 
                ["難道（表示反詰）", "回頭看（表示動作）", "拜訪（表示行為）", "但是（表示轉折）"], 0, 
                ["正確。此處「顧」字用於疑問句中，加強反問語氣，解作「難道不……嗎？」。", "非本義的「回顧」。", "非「三顧茅廬」的「顧」。", "非轉折連詞。"]);

            addQ("孔子曰：「學而時習之，不亦說乎？」此句的語氣與下列何者**不同**？", 
                ["有朋自遠方來，不亦樂乎？", "人不知而不慍，不亦君子乎？", "區區小事，何足掛齒？", "無懷氏之民歐！葛天氏之民數！"], 3, 
                ["此為反詰語氣（不也是……嗎？），與題幹相同。", "此為反詰語氣，與題幹相同。", "此為反詰語氣，與題幹相同。", "正確。此為「推測」語氣，與題幹的「反詰」不同。"]);

            addQ("「有酒食，先生饌，曾是以為孝乎？」句中的「曾」字讀音與字義為何？", 
                ["音 ㄗㄥ，難道", "音 ㄘㄥˊ，曾經", "音 ㄗㄥ，增加", "音 ㄘㄥˊ，竟然"], 0, 
                ["正確。「曾」字在反詰句中常讀作 ㄗㄥ，解釋為「難道、乃、竟然」。全句意為「難道這樣就能認為是盡孝了嗎？」。", "音義皆非。", "非本義的「增」。", "讀音錯誤。"]);

            addQ("「人非聖賢，孰能無過？」這句話透過反詰語氣，想要表達的核心觀念是：", 
                ["只有聖賢才不會犯錯", "每個人都會犯錯，這是可以被理解的", "誰犯了錯就應該受到嚴懲", "聖賢也常常犯下大錯"], 1, 
                ["這只是前提，非核心想表達的寬容觀念。", "正確。「孰能無過？」（誰能沒有過錯呢？）答案是「每個人都有過錯」。以此勸人寬容看待他人的過失。", "與句意相反。", "與句意相反。"]);

            addQ("「如吾之衰者，其能久存乎？」這句話中的「其」字，作何解釋？", 
                ["他、他們（代詞）", "大概、或許（推測語氣）", "難道、怎麼（反詰語氣）", "期望、祈使（期望語氣）"], 2, 
                ["非代名詞。", "雖然韓愈的身體確實在衰退，但此處句型「其……乎？」配合文意，是強烈的反問：「難道能活得長久嗎？」（意即活不久了）。雖然「其……乎」有時表推測，但在191講義中被明確列為反詰字（同「豈」）。", "正確。依據講義分類，此處的「其」通「豈」，表示反問。", "非期望。"]);

            addQ("「因果循環、報應不爽！可不懼哉！」句中的「可」字，加強了何種語氣？", 
                ["推測語氣", "反詰語氣", "假設語氣", "輕薄語氣"], 1, 
                ["非推測。", "正確。「可不……哉！」是一個常見的反問句型，意為「難道可以不……嗎？」，藉此加強警告世人敬畏因果的語氣。", "非假設。", "非輕薄。"]);

            addQ("「吾師道也，夫庸知其年之先後生於吾乎？」句中的「庸」字，意義最接近下列何者？", 
                ["平庸、凡庸", "任用、雇用", "何必、豈", "功勞、勳績"], 2, 
                ["非「庸人」之意。", "非「雇庸」之意。", "正確。在文言文中，「庸」常作為副詞，表示反問，意為「何必、豈、哪裡」。全句意為「又何必知道他的年紀比我大還是小呢？」。", "非「酬庸」之意。"]);

            addQ("判斷下列四個含有反詰語氣的句子，哪一個同時也包含了「期望」的意味？", 
                ["予豈好辯哉？予不得已也。", "兩兔傍地走，安能辨我是雄雌？", "使僕游揚足下名於天下，顧不美乎？", "癩蝦蟆想吃天鵝肉。"], 2, 
                ["這是自我辯護。", "這是在陳述一個困難的事實。", "正確。「難道不好嗎？」反面意思就是「這是一件很好的事」，說話者藉由這個反問，強烈「期望」對方能答應自己的提議。", "這是輕視，且非典型反詰句型。"]);

            // Q46-Q60: 綜合進階判斷 (考驗多重語氣與細節)
            addQ("「娘（涼）什麼！老子都不老子呀！」與「吾數年來欲買舟而下，猶未能也，子何恃而往？」兩者語氣的比較，何者正確？", 
                ["兩者皆為輕薄語氣", "前者輕薄，後者輕視", "兩者皆為責備語氣", "前者責備，後者諷刺"], 1, 
                ["後者並無輕佻無禮的態度。", "正確。前者是小孩不知天高地厚的無禮回話（輕薄）；後者是富和尚看不起窮和尚，認為自己做不到的事對方更不可能做到（輕視）。", "兩者皆非標準責備。", "後者非諷刺。"]);

            addQ("「今天，我就要你作主！」與「主啊，請陶冶我的兒子。」兩者皆帶有要求對方做事的意味，但語氣上有何根本差異？", 
                ["前者為命令（強硬），後者為祈求（卑微）", "前者為叮嚀（關心），後者為期望（勉勵）", "前者為警告（威脅），後者為推測（估計）", "兩者皆為命令，無差異"], 0, 
                ["正確。前者「就要你」態度強硬無商量餘地，為命令；後者對神明說話，用「請」字，態度虔誠卑微，為祈求。", "語氣判斷錯誤。", "語氣判斷錯誤。", "有明顯尊卑與強弱差異。"]);

            addQ("「商女不知亡國恨，隔江猶唱後庭花。」與「在傳情達意的人類基本需要來說，現代人真是無能至極了。」兩者的共同語氣為何？", 
                ["皆帶有「諷刺」語氣", "皆帶有「自責」語氣", "皆帶有「感嘆」語氣", "皆帶有「輕薄」語氣"], 2, 
                ["後者沒有明顯的拐彎抹角的嘲諷，而是直接的批評與感嘆。", "皆無自責。", "正確。前者除了諷刺達官貴人，也隱含對國家命運的感嘆；後者則是作者對現代人溝通能力的退化發出深沉的慨嘆。兩者皆有感嘆成分。", "皆無輕佻態度。"]);

            addQ("下列哪一個文言文句子，**沒有**使用到假設語氣？", 
                ["使天下無農夫，舉世皆餓死矣。", "我軍若進，中其計也。", "入則無法家拂士，出則無敵國外患者，國恆亡。", "一室之不治，何以天下國家為？"], 3, 
                ["「使」表假設。", "「若」表假設。", "「入則……出則……」表假設條件。", "正確。此句為反詰語氣（一個房間都管不好了，怎麼能治理天下國家呢？），沒有假設詞。"]);

            addQ("「應是母慈重，使爾悲不任。」（白居易《慈烏夜啼》）這句話展現了作者的何種語氣？", 
                ["讚頌", "推測", "自責", "期望"], 1, 
                ["讚頌在詩的前半段（鳥中之曾參）。", "正確。「應是」（應該是）表達了作者對於慈烏為何悲啼不止的原因提出自己的猜測與估計。屬於推測語氣。", "與自責無關。", "與期望無關。"]);

            addQ("關於語氣判斷的技巧，下列敘述何者最為精確？", 
                ["一個句子絕對只會有一種語氣，不可混淆。", "只要看到問號「？」，就一定是反詰語氣。", "推敲說話者的身分、情境與關鍵字詞，是判斷語氣的要訣。", "「叮嚀」與「命令」完全相同，只是用字不同。"], 2, 
                ["講義明確指出一個句子可能含有兩種語氣。", "問號也可能是普通疑問或設問（懸問）。", "正確。如同「大約大去之期不遠矣」，需要結合關鍵字（大約）與情境（父親病重）才能精確判斷推測與感嘆雙重語氣。", "命令帶有強制性，叮嚀則是反覆的關懷，兩者程度不同。"]);

            addQ("下列各句「」中的詞語，何者**不是**用來表示「反問（反詰）」的語氣詞？", 
                ["有庳之人「奚」罪焉？", "「使」天下無農夫……", "「豈」有此理！", "「烏」可與言？"], 1, 
                ["「奚」在此意為「何、什麼」，表反問。", "正確。「使」在此意為「假使、如果」，是表示「假設」的語氣詞，而非反問。", "「豈」意為「難道」，表反問。", "「烏」意為「哪裡」，表反問。"]);

            addQ("「如果制定法律嚴懲亂丟垃圾的人，我們的環境應該會乾淨許多。」這句話中，哪一個詞彙是判斷「推測」語氣的關鍵？", 
                ["如果", "嚴懲", "應該會", "許多"], 2, 
                ["「如果」是判斷假設語氣的關鍵。", "「嚴懲」是動詞。", "正確。「應該會」表示對未來不確定狀況的合理估計，是推測語氣的標誌詞。", "「許多」是程度副詞。"]);

            addQ("「慈烏復慈烏，鳥中之曾參。」與「癩蝦蟆想吃天鵝肉。」這兩句話在情感評價上呈現何種對比？", 
                ["前者為極度悲傷，後者為極度憤怒", "前者為至高讚美（讚頌），後者為極端鄙視（輕視）", "前者為自我期許（期望），後者為嘲笑他人（諷刺）", "前者為合理推論（推測），後者為無理取鬧（輕薄）"], 1, 
                ["情感判斷錯誤。", "正確。前者將鳥比作聖賢，是讚頌；後者用醜陋動物比喻對方不自量力，是輕視。", "前者非期望，後者更偏向直接輕視而非婉轉諷刺。", "前者非推測。"]);

            addQ("「你今天不寫完功課，就不能吃晚餐。」這句話屬於警告語氣，其構成警告的要件是什麼？", 
                ["使用了祈使句型", "預先宣告了若不服從將面臨的懲罰或不利後果", "語氣非常溫和且充滿關心", "使用了反詰詞"], 1, 
                ["不一定是祈使句型。", "正確。警告的核心在於「預先告知危險或不利後果」（就不能吃晚餐），以促使對方改變行為。", "警告通常不溫和。", "此句無反詰。"]);

            addQ("「嗚呼！其真無馬邪？其真不知馬也！」（韓愈《馬說》）這段文字的語氣轉折為何？", 
                ["由讚頌轉為推測", "由感嘆轉為反詰，再轉為推測（或肯定）", "由自責轉為責備", "由期望轉為驚喜"], 1, 
                ["無讚頌。", "正確。「嗚呼」為感嘆；「其真無馬邪？」（難道真的沒有千里馬嗎？）為反詰；「其真不知馬也」（大概是真的不認識千里馬吧／其實是真的不認識馬）為推測或深沉的肯定結論。這句經典體現了複雜的語氣交織。", "無自責。", "無驚喜。"]);

            addQ("「衣沾不足惜，但使願無違。」（陶淵明《歸園田居》）這句詩中，「但使」二字透露出詩人的何種語氣？", 
                ["推測", "感嘆", "期望", "假設"], 2, 
                ["非對未來的估計。", "雖有情感，但並非無奈的嘆息。", "正確。「但使」意為「只要讓……」，強烈表達了詩人希望堅守歸隱之志、不願違背本心的「期望」與期許。", "雖字面有條件意味，但在修辭語氣分類上，其核心情感是強烈的期盼。"]);

            addQ("下列何組句子的語氣完全相同？", 
                ["有朋自遠方來，不亦樂乎？／ 湖中焉得更有此人！", "區區小事，何足掛齒？／ 兩兔傍地走，安能辨我是雄雌？", "前放道路坍方，請改道行駛。／ 穿上吧！涼了。", "這題我都不會，難道你能解得開？／ 周郎妙計安天下，賠了夫人又折兵。"], 1, 
                ["反詰 ／ 驚喜(含反詰句型)。", "正確。兩者皆為標準的「反詰」語氣（何足、安能）。", "警告 ／ 叮嚀。", "輕視 ／ 諷刺。"]);

            addQ("「大約大去之期不遠矣。」這句話能同時判斷為「推測」與「慨嘆」兩種語氣，這告訴我們在做教育會考語氣題時應該如何應對？", 
                ["隨便猜一個選項，因為都會對。", "向監考老師抗議題目出錯。", "尋找選項中唯一的合理答案，因為會考的四個選項會有明確的區別性。", "這題一定會送分，不必作答。"], 2, 
                ["不能隨便猜。", "題目沒有錯，是語言的豐富性。", "正確。講義的「說明」欄特別指出，會考題目會設計得有鑑別度，四個選項中只會有一個最符合或唯一合理的答案，學生應審慎推敲，不必因句子有多重語氣而恐慌。", "不會送分。"]);

            addQ("總結這份語氣判斷講義，若一個句子要具備「反詰」語氣，最不可或缺的要素是什麼？", 
                ["一定要有驚嘆號「！」", "一定要有像「嗎、呢、吧」的語氣詞", "表面是問句，但答案已隱含在問句的反面", "一定要使用文言文"], 2, 
                ["反詰多用問號「？」。", "不一定，如「其心不如禽！」。", "正確。這是反詰（激問）的核心定義，形式是問句，目的是用反問來加強肯定的語氣。", "白話文也有（如：你以為我願意待在家裡嗎？）。"]);

            return qList;
        };

        let currentTab = 'login';
        let learnSubTab = 'sec1';
        let quizState = { active: false, currentQ: 0, score: 0, answers: [], questions: [], showExplanation: false, selectedAns: null };
        let isLearnMenuOpen = false;

        const el = id => document.getElementById(id);

        const syncQuestionsFormat = (state) => {
            if (!state || !state.questions) return state;
            if (state.questions.length > 0 && !state.questions[0].exps) {
                const freshQuestions = generate60Questions();
                state.questions = state.questions.map(oldQ => {
                    const freshQ = freshQuestions.find(fq => fq.q === oldQ.q);
                    if (freshQ) return { ...freshQ, showExplanation: oldQ.showExplanation, selectedAns: oldQ.selectedAns, isCorrect: oldQ.isCorrect };
                    return oldQ;
                });
            }
            return state;
        };

        window.toggleLearnMenu = (show) => {
            isLearnMenuOpen = typeof show === 'boolean' ? show : !isLearnMenuOpen;
            const drawer = el('learn-drawer');
            const overlay = el('learn-overlay');
            if(drawer && overlay) {
                if(isLearnMenuOpen) {
                    drawer.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                } else {
                    drawer.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            }
        };

        const listenToGlobalUsers = () => {
            if (!isFirebaseInitialized || !currentUser) return;
            const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
            if(unsubscribeGlobal) unsubscribeGlobal();
            unsubscribeGlobal = onSnapshot(globalRef, (snap) => {
                if(snap.exists()) recentUsers = snap.data().users || [];
                else recentUsers = [];
                if(currentTab === 'login') renderLogin();
            });
        };

        const listenToUserDocument = (name) => {
            if (!isFirebaseInitialized || !currentUser) {
                loadLocalData(name);
                return;
            }
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, name);
            if(unsubscribeUser) unsubscribeUser();
            unsubscribeUser = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    userData = Object.assign({ favorites: [], mistakes: [], quizHistory: [], loginHistory: [], quizState: null }, data);
                    saveLocalData(name);
                    
                    if (userData.quizState) {
                        userData.quizState = syncQuestionsFormat(userData.quizState); 
                        const cloudStateStr = JSON.stringify(userData.quizState);
                        const localStateStr = JSON.stringify(quizState);
                        if (cloudStateStr !== localStateStr) {
                            quizState = userData.quizState;
                            try { if(username) localStorage.setItem(`${COLLECTION_NAME}_${username}_quiz`, cloudStateStr); } catch(e) {}
                            if(currentTab === 'quiz') {
                                let scrollPos = 0;
                                const scrollContainer = document.getElementById('quiz-scroll-container');
                                if (scrollContainer) scrollPos = scrollContainer.scrollTop;
                                renderQuizView(document.getElementById('main-content'));
                                setTimeout(() => {
                                    const newScrollContainer = document.getElementById('quiz-scroll-container');
                                    if (newScrollContainer && scrollPos > 0) newScrollContainer.scrollTop = scrollPos;
                                }, 10);
                                const navStats = document.getElementById('nav-quiz-stats');
                                if (navStats) {
                                    if (quizState.active) {
                                        navStats.classList.remove('hidden');
                                        navStats.classList.add('flex');
                                        updateQuizStats();
                                    } else {
                                        navStats.classList.add('hidden');
                                        navStats.classList.remove('flex');
                                    }
                                }
                            }
                        }
                    }
                } else {
                    userData = { favorites: [], mistakes: [], quizHistory: [], loginHistory: [new Date().toISOString()], quizState: null };
                    setDoc(userRef, userData, { merge: true });
                }
                if(currentTab === 'favorites') renderFavorites();
                else if(currentTab === 'mistakes') renderMistakes();
                else if(currentTab === 'history') renderHistory();
            }, (error) => console.error("Listen user error", error));
        };

        const saveUserDataToCloud = async () => {
            saveLocalData(username);
            if (!isFirebaseInitialized || !currentUser || !username) return;
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
            try { await setDoc(userRef, userData, { merge: true }); } catch(e) { console.error("Firebase save error:", e); }
        };

        const loadLocalData = (name) => {
            try {
                const localData = localStorage.getItem(`${COLLECTION_NAME}_${name}_data`);
                if (localData) userData = Object.assign({ favorites: [], mistakes: [], quizHistory: [], loginHistory: [], quizState: null }, JSON.parse(localData));
            } catch(e) {}
        };

        const saveLocalData = (name) => {
            try { if (name) localStorage.setItem(`${COLLECTION_NAME}_${name}_data`, JSON.stringify(userData)); } catch(e) {}
        };

        const saveQuizState = () => {
            try { if(username) localStorage.setItem(`${COLLECTION_NAME}_${username}_quiz`, JSON.stringify(quizState)); } catch(e) {}
            userData.quizState = quizState;
            saveUserDataToCloud();
        };

        const loadLocalQuizState = () => {
            if (userData.quizState) { quizState = syncQuestionsFormat(userData.quizState); return; }
            try {
                const localQuiz = localStorage.getItem(`${COLLECTION_NAME}_${username}_quiz`);
                if (localQuiz) {
                    const q = JSON.parse(localQuiz);
                    if (q && q.active) quizState = syncQuestionsFormat(q);
                }
            } catch(e) {}
        };

        const initApp = async () => {
            renderApp();
            const lastUser = localStorage.getItem(`${COLLECTION_NAME}_last_user`);
            if (isFirebaseInitialized) {
                await initAuth(); 
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        listenToGlobalUsers();
                        if (lastUser) {
                            username = lastUser;
                            setTimeout(() => listenToUserDocument(username), 200);
                            loadLocalQuizState();
                            renderMain();
                        } else renderLogin();
                    } else renderLogin();
                });
            } else {
                if (lastUser) {
                    username = lastUser;
                    loadLocalData(username);
                    loadLocalQuizState();
                    renderMain();
                } else renderLogin();
            }
        };

        window.handleLogin = async (name) => {
            if(!name.trim()) {
                const inputEl = document.getElementById('usernameInput');
                inputEl.classList.add('border-red-500', 'bg-red-50');
                inputEl.placeholder = "名稱不能為空！";
                setTimeout(() => {
                    inputEl.classList.remove('border-red-500', 'bg-red-50');
                    inputEl.placeholder = "✍️ 請輸入您的姓名/座號";
                }, 2000);
                return;
            }
            username = name;
            localStorage.setItem(`${COLLECTION_NAME}_last_user`, username);
            if (isFirebaseInitialized && currentUser) {
                const now = new Date().toISOString();
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);
                try {
                    const snap = await getDoc(userRef);
                    if (snap.exists()) {
                        userData = Object.assign({ favorites: [], mistakes: [], quizHistory: [], loginHistory: [], quizState: null }, snap.data());
                        if (userData.quizState) {
                            quizState = syncQuestionsFormat(userData.quizState);
                            try { localStorage.setItem(`${COLLECTION_NAME}_${username}_quiz`, JSON.stringify(quizState)); } catch(e){}
                        }
                    } else loadLocalData(username);
                    if (!userData.loginHistory) userData.loginHistory = [];
                    userData.loginHistory.push(now);
                    if (userData.loginHistory.length > 50) userData.loginHistory = userData.loginHistory.slice(-50);
                    await setDoc(userRef, userData, { merge: true });
                    const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
                    const gSnap = await getDoc(globalRef);
                    let users = gSnap.exists() ? gSnap.data().users || [] : [];
                    users = users.filter(u => u.name !== username);
                    users.push({ name: username, lastLogin: now });
                    if(users.length > 10) users = users.slice(-10);
                    await setDoc(globalRef, { users }, { merge: true });
                } catch(e) { console.error("Login data sync error:", e); }
                listenToUserDocument(username);
            } else {
                loadLocalData(username);
                if (!userData.loginHistory) userData.loginHistory = [];
                userData.loginHistory.push(new Date().toISOString());
                saveLocalData(username);
            }
            renderMain();
            initAudio(); // Initialize audio on first user interaction
        };

        const renderApp = () => { el('app').innerHTML = `<div id="view-container" class="w-full h-full flex flex-col bg-amber-50"></div>`; };

        window.renderLogin = () => {
            currentTab = 'login';
            el('view-container').innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center relative overflow-hidden p-6 z-0">
                    <div class="absolute inset-0 bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 -z-20"></div>
                    <div class="absolute -top-20 -left-20 w-96 h-96 bg-gradient-to-r from-indigo-300 to-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse -z-10"></div>
                    <div class="absolute top-40 -right-20 w-80 h-80 bg-gradient-to-r from-purple-300 to-pink-400 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse -z-10" style="animation-delay: 1s;"></div>
                    <div class="absolute -bottom-32 left-1/3 w-80 h-80 bg-gradient-to-r from-rose-300 to-indigo-400 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse -z-10" style="animation-delay: 2s;"></div>
                    <div class="absolute top-6 right-6 z-20">
                        <div class="flex flex-col items-end gap-3 w-full md:w-auto">
                            <div class="glass-card px-4 py-2 rounded-full shadow-sm text-sm font-bold text-indigo-800 flex items-center border border-white/50">
                                <span class="status-dot ${connectionStatus === 'loading' ? 'status-loading' : connectionStatus === 'success' ? 'status-success' : 'status-error'}"></span>
                                ${connectionStatus === 'loading' ? '雲端讀取中... ⏳' : connectionStatus === 'success' ? '雲端已同步 ☁️✨' : '雲端連線失敗 ❌'}
                            </div>

                        <h2 class="text-4xl md:text-5xl font-extrabold text-rose-950 mb-4">暫無紀錄</h2>
                        <p class="text-2xl md:text-3xl font-medium text-rose-800/60 mb-10">您還沒有完成任何測驗或留下足跡喔！</p>
                        <button onclick="switchTab('quiz')" class="bg-white border-4 border-rose-200 text-rose-600 hover:bg-rose-50 font-bold px-10 py-4 text-xl rounded-full shadow-md transition-colors">🚀 前往測驗</button>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-10 overflow-y-auto overflow-x-hidden pb-24 relative z-10">
                    <div class="w-full max-w-[96%] xl:max-w-[98%] mx-auto">
                        <div class="flex justify-between items-end border-b-4 border-amber-300 pb-5 mb-12">
                            <div>
                                <h2 class="text-4xl md:text-5xl font-extrabold text-amber-800 flex items-center"><span class="bg-amber-100 text-amber-600 w-14 h-14 flex items-center justify-center rounded-2xl mr-5 shadow-sm">📜</span>作答與登入紀錄</h2>
                                <p class="text-amber-900/60 mt-3 ml-20 font-bold text-lg md:text-xl">追蹤您的學習軌跡，跨裝置同步更新 ☁️</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                            <!-- 作答紀錄 -->
                            <div class="bg-white rounded-3xl shadow-xl border border-amber-100 overflow-hidden">
                                <div class="bg-amber-50 p-6 border-b border-amber-200">
                                    <h3 class="text-3xl font-bold text-amber-900 flex items-center"><span class="mr-3 text-3xl">🎯</span>最近作答成績</h3>
                                </div>
                                <div class="p-6 md:p-8 space-y-5 max-h-[60vh] overflow-y-auto">
                                    ${(userData.quizHistory || []).slice().reverse().map((h, i) => `
                                        <div class="flex justify-between items-center p-5 rounded-2xl border-2 border-slate-100 ${h.score >= 80 ? 'bg-emerald-50/50 border-emerald-100' : (h.score < 60 ? 'bg-rose-50/50 border-rose-100' : 'bg-slate-50')} transition-all hover:shadow-md">
                                            <div>
                                                <div class="font-bold text-slate-800 text-xl md:text-2xl">${h.date}</div>
                                                <div class="text-lg text-slate-500 mt-2 font-medium">共 ${h.total} 題，答對 <span class="font-bold text-slate-700">${h.correct}</span> 題</div>
                                            </div>
                                            <div class="text-5xl font-black ${h.score >= 80 ? 'text-emerald-600' : (h.score < 60 ? 'text-rose-500' : 'text-amber-500')}">${h.score}<span class="text-2xl ml-1 font-bold">分</span></div>
                                        </div>
                                    `).join('') || '<p class="text-xl text-slate-400 text-center py-10 font-bold">目前還沒有測驗紀錄喔</p>'}
                                </div>
                            </div>

                            <!-- 登入紀錄 -->
                            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden h-fit">
                                <div class="bg-slate-50 p-6 border-b border-slate-200">
                                    <h3 class="text-3xl font-bold text-slate-800 flex items-center"><span class="mr-3 text-3xl">👣</span>最近登入足跡</h3>
                                </div>
                                <div class="p-6 md:p-8 space-y-4 max-h-[40vh] overflow-y-auto">
                                    ${(userData.loginHistory || []).slice().reverse().map((time, i) => `
                                        <div class="flex items-center p-4 rounded-xl border border-slate-100 bg-slate-50/50 hover:bg-slate-100 transition-colors">
                                            <span class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 mr-4 text-lg font-bold shadow-inner">${i+1}</span>
                                            <span class="font-bold text-slate-700 text-xl">${new Date(time).toLocaleString()}</span>
                                        </div>
                                    `).join('') || '<p class="text-xl text-slate-400 text-center py-10 font-bold">無登入紀錄</p>'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        initApp();

    </script>
</body>
</html>
