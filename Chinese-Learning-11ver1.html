                ) : (
                    <div className="space-y-6">
                        <button onClick={onReviewAll} className="w-full bg-red-500 hover:bg-red-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg transition-all transform active:scale-95">挑戰所有錯題</button>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {mistakes.map(m => (
                                <div key={m.id} className="bg-white p-6 rounded-2xl shadow-sm border border-red-100 hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-start mb-3">
                                        <div className="flex items-center gap-2">
                                            <h3 className="text-xl font-black">{m.term}</h3>
                                            <span className={`px-2 py-0.5 rounded text-xs font-bold ${m.type === 'real' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}`}>{m.type === 'real' ? '實數' : '虛數'}</span>
                                        </div>
                                        <span className="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full font-bold">錯 {(mistakeLog || []).find(l => l && l.id === m.id)?.count || 0} 次</span>
                                    </div>
                                    <p className="text-gray-600 text-sm bg-gray-50 p-2 rounded">{m.definition}</p>
                                </div>
                            ))}
                        </div>
                        <div className="text-center mt-8">
                            <button onClick={() => {if(confirm('確定要清除所有錯題紀錄？')) setMistakeLog([])}} className="text-gray-400 hover:text-red-500 text-sm flex items-center justify-center mx-auto transition-colors"><Icon path={icons.trash} className="w-4 h-4 mr-2"/> 清空紀錄</button>
                        </div>
                    </div>
                )}
            </div>
        );

        const HistoryView = ({ historyLog, onMenu, onClear }) => (
            <div className="max-w-4xl mx-auto px-4 py-12 mt-12 animate-fade-in-up">
                <div className="flex items-center mb-8">
                    <button onClick={onMenu} className="mr-4 p-3 bg-white rounded-xl shadow border border-gray-200 hover:bg-gray-50"><Icon path={icons.left} className="w-5 h-5"/></button>
                    <h2 className="text-3xl font-black text-gray-800 flex items-center gap-3">📜 歷史戰績 <span className="text-sm font-normal text-gray-500 bg-gray-100 px-2 py-1 rounded-full">{(historyLog || []).length} 場</span></h2>
                </div>
                {(historyLog || []).length === 0 ? <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed shadow-sm"><Icon path={icons.history} className="w-16 h-16 mx-auto mb-4 text-gray-300"/><p className="text-xl font-bold text-gray-400">尚無戰役紀錄</p></div> : (
                    <div className="bg-white/95 backdrop-blur-md rounded-3xl shadow-lg overflow-hidden border border-gray-200">
                        <table className="w-full text-left border-collapse">
                            <thead className="bg-amber-50 border-b border-amber-100">
                                <tr>
                                    <th className="p-5 font-black text-amber-900 text-sm uppercase tracking-wider">日期</th>
                                    <th className="p-5 font-black text-amber-900 text-sm uppercase tracking-wider">挑戰模式</th>
                                    <th className="p-5 font-black text-amber-900 text-sm uppercase tracking-wider">戰功 (答對/總題)</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {(historyLog || []).map(log => (
                                    <tr key={log.id} className="hover:bg-amber-50/50 transition-colors">
                                        <td className="p-5 text-gray-600 font-mono">{log.date}</td>
                                        <td className="p-5 font-bold text-gray-800">{log.category}</td>
                                        <td className="p-5"><span className="font-black px-3 py-1 rounded-lg text-lg bg-gray-100 text-gray-700 border border-gray-200">{log.score} <span className="text-gray-400 font-normal text-sm">/ {log.total}</span></span></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                )}
                <div className="text-center mt-12 pb-10"><button onClick={() => {if(confirm('確定焚毀所有戰報？此操作無法復原！')) onClear()}} className="text-red-400 hover:text-red-600 text-sm flex items-center justify-center mx-auto hover:bg-red-50/80 px-4 py-2 rounded-lg transition-colors"><Icon path={icons.trash} className="w-4 h-4 mr-2"/> 清除所有紀錄</button></div>
            </div>
        );

        const QuizView = ({ questions, score, userName, combo, onAnswer, onFinish, onMenu, favorites, toggleFavorite, activeCategory, totalItems, quizPage, onPageChange, completedDays }) => {
            const [showResult, setShowResult] = useState(false);
            const isFinished = questions.length > 0 && questions.every(q => q.userAnswer !== null);
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);

            useEffect(() => { if (isFinished && !showResult) { const timer = setTimeout(() => { onFinish(); setShowResult(true); }, 1500); return () => clearTimeout(timer); } }, [isFinished]);

            if (showResult) {
                return (
                    <div className="max-w-2xl mx-auto pt-10 px-4 animate-fade-in-up mt-12 no-print">
                        <div className="bg-white rounded-3xl shadow-2xl overflow-hidden text-center border-4 border-amber-400">
                            <div className="bg-amber-500 p-10 text-white relative overflow-hidden"><h2 className="text-4xl font-black mb-2 font-serif relative z-10">戰役結束</h2><p className="opacity-90 font-bold text-lg relative z-10">主公 {userName} 辛苦了</p></div>
                            <div className="p-10">
                                <div className="text-8xl font-black text-amber-600 mb-2 font-mono tracking-tighter">{score} <span className="text-3xl text-gray-300 font-bold">/ {questions.length}</span></div>
                                <div className="flex justify-center gap-4 mb-10"><div className="flex-1 bg-green-50 text-green-700 py-4 rounded-2xl font-black text-xl border-2 border-green-200">大捷 {score}</div><div className="flex-1 bg-red-50 text-red-700 py-4 rounded-2xl font-black text-xl border-2 border-red-200">失利 {questions.length - score}</div></div>
                                <button onClick={onMenu} className="w-full py-4 bg-amber-600 text-white rounded-2xl font-black shadow-lg hover:bg-amber-700 transition-all text-xl">返回大營</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto pb-20 px-4 mt-12 no-print">
                    <div className="bg-white/95 backdrop-blur shadow-sm p-4 rounded-b-2xl mb-8 sticky top-16 z-30 border-t-4 border-amber-500 flex flex-col md:flex-row justify-between items-center transition-all">
                        <div className="flex items-center gap-4 mb-4 md:mb-0 w-full md:w-auto justify-between md:justify-start">
                            <button onClick={onMenu} className="text-gray-500 text-sm flex items-center hover:text-red-600 font-bold bg-gray-100 px-3 py-2 rounded-lg transition-colors"><Icon path={icons.left} className="w-4 h-4 mr-1"/> 撤退</button>
                            <div className="font-bold text-xl flex items-center gap-3"><span>{userName}</span><span className="bg-amber-100 text-amber-800 px-3 py-1 rounded-full text-sm font-black border border-amber-200">戰功: {score}</span></div>
                        </div>
                        {activeCategory !== '瀑布模式' && activeCategory !== '錯題本' && activeCategory !== '收藏夾' && (
                            <div className="flex overflow-x-auto overflow-y-hidden max-w-full w-full md:w-auto pb-1 md:pb-0 gap-2">
                                {Array.from({ length: totalPages }).map((_, i) => (<button key={i} onClick={() => onPageChange(i)} className={`px-3 py-1.5 rounded-md text-xs font-bold whitespace-nowrap flex items-center gap-1 transition-all flex-shrink-0 ${quizPage === i ? 'bg-amber-600 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>卷{i + 1}{(completedDays || []).some(item => item && item.id === `數字成語-${i}`) && <span className="bg-green-400 text-white text-[10px] w-3 h-3 flex items-center justify-center rounded-full">✓</span>}</button>))}
                            </div>
                        )}
                        {activeCategory === '瀑布模式' && (
                            <div className="text-cyan-600 font-bold text-sm bg-cyan-50 px-3 py-1 rounded-full border border-cyan-200 flex items-center">
                                <Icon path={icons.activity} className="w-4 h-4 mr-1"/> 瀑布模式：全題目挑戰
                            </div>
                        )}
                    </div>
                    
                    <div className="space-y-8">
                        {questions.map((q, idx) => (
                            <div key={idx} className={`bg-white rounded-3xl p-8 shadow-md border-4 transition-all duration-500 ${q.userAnswer === null ? 'border-transparent' : (q.isCorrect ? 'border-green-200' : 'border-red-200')}`}>
                                <div className="flex justify-between items-center mb-6">
                                    <span className="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-sm font-bold">問題 {idx+1}</span>
                                    <button onClick={() => toggleFavorite(q.id)} className="p-2 rounded-full hover:bg-gray-100 transition-colors"><Icon path={icons.heart} className={`w-7 h-7 ${(favorites || []).includes(q.id) ? "text-red-500" : "text-gray-300"}`} fill={(favorites || []).includes(q.id) ? "currentColor" : "none"}/></button>
                                </div>
                                
                                <h3 className="text-3xl md:text-4xl font-black text-center mb-10 tracking-widest text-gray-800">
                                    「{q.term}」
                                </h3>
                                
                                <div className="grid grid-cols-2 gap-4 md:gap-8 mb-6 max-w-2xl mx-auto">
                                    {['real', 'imaginary'].map(type => {
                                        const label = type === 'real' ? '實數' : '虛數';
                                        let btnClass = "py-6 rounded-2xl font-black text-2xl border-4 transition-all ";
                                        if (q.userAnswer === null) btnClass += "bg-white border-gray-200 text-gray-600 hover:border-amber-400 hover:shadow-lg active:scale-95";
                                        else {
                                            if (type === q.type) btnClass += "bg-green-100 border-green-500 text-green-700 shadow-md";
                                            else if (type === q.userAnswer) btnClass += "bg-red-100 border-red-500 text-red-700 opacity-80";
                                            else btnClass += "bg-gray-50 border-gray-100 text-gray-300 opacity-50 grayscale";
                                        }
                                        return <button key={type} onClick={() => onAnswer(idx, type)} disabled={q.userAnswer !== null} className={btnClass}>{label}</button>
                                    })}
                                </div>
                                
                                {/* 答題後顯示解析 (無論對錯皆顯示) */}
                                {q.userAnswer !== null && (
                                    <div className={`p-5 rounded-2xl animate-fade-in-up mt-6 border-l-8 ${q.isCorrect ? 'bg-green-50/80 border-green-400' : 'bg-red-50/80 border-red-400'}`}>
                                        <div className="font-bold mb-2 flex items-center gap-2 text-lg">
                                            {q.isCorrect ? <span className="text-green-600 flex items-center"><Icon path={icons.check} className="w-6 h-6 mr-1"/> 答對了！</span> : <span className="text-red-600 flex items-center"><Icon path={icons.alert} className="w-6 h-6 mr-1"/> 答錯了！此題為 {q.type === 'real' ? '實數' : '虛數'}</span>}
                                        </div>
                                        <div className="text-gray-800 text-lg leading-relaxed flex items-start">
                                            <span className="font-black text-amber-800 bg-amber-100 px-2 py-0.5 rounded text-sm mr-3 mt-1 flex-shrink-0">解析</span>
                                            <span>{q.definition}</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const parsedData = useMemo(() => ({ "數字成語": IDIOM_DATA }), []);
            const allItems = IDIOM_DATA;
            const [currentMode, setCurrentMode] = useState('menu');
            const [userName, setUserName] = useState('');
            const [isLocked, setIsLocked] = useState(false);
            const [showNameWarning, setShowNameWarning] = useState(false);
            const [activeCategory, setActiveCategory] = useState(null);
            const [favorites, setFavorites] = useState([]);
            const [historyLog, setHistoryLog] = useState([]);
            const [mistakeLog, setMistakeLog] = useState([]);
            const [completedDays, setCompletedDays] = useState([]);
            const [globalUsers, setGlobalUsers] = useState([]);
            const [connectionStatus, setConnectionStatus] = useState('loading');
            
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [quizScore, setQuizScore] = useState(0);
            const [combo, setCombo] = useState(0);
            const [learnPage, setLearnPage] = useState(0);
            const [quizPage, setQuizPage] = useState(0);
            
            const [savedLevelSession, setSavedLevelSession] = useState(null);
            const [savedWaterfallSession, setSavedWaterfallSession] = useState(null);

            const musicPlayerRef = useRef(null);

            const triggerMusic = () => { if(musicPlayerRef.current) musicPlayerRef.current.triggerPlay(); };

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        setConnectionStatus('loading');
                        
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        
                        setConnectionStatus('success');
                    } catch (e) { 
                        console.error(e);
                        setConnectionStatus('error'); 
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (user) => {
                    if (user) {
                        // 修正：路徑片段必須是偶數
                        const globalDocRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, DOC_GLOBAL);
                        onSnapshot(globalDocRef, (snap) => { if (snap.exists()) setGlobalUsers(snap.data().users || []); else setDoc(globalDocRef, { users: [] }); }, (err) => console.error("Global Users error:", err));
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!isLocked || !userName || !auth.currentUser) return;
                // 修正：路徑片段必須是偶數 (利用 uid 作為層級，將 userName 視為文件名稱，以區分不同挑戰者)
                const userId = auth.currentUser.uid;
                const userDocRef = doc(db, 'artifacts', appId, 'users', userId, COLLECTION_NAME, userName);
                const unsub = onSnapshot(userDocRef, (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        setFavorites(d.favorites || []);
                        setHistoryLog(d.history || []);
                        setMistakeLog(d.mistakes || []);
                        setCompletedDays(d.progress || []);
                        setSavedLevelSession(d.currentLevelSession || null);
                        setSavedWaterfallSession(d.currentWaterfallSession || null);
                    }
                }, (err) => console.error("User data fetch error:", err));
                return () => unsub();
            }, [isLocked, userName]);

            const updateUserData = async (field, value) => {
                if (!isLocked || !auth.currentUser) return;
                try {
                    const userId = auth.currentUser.uid;
                    const userDocRef = doc(db, 'artifacts', appId, 'users', userId, COLLECTION_NAME, userName);
                    await setDoc(userDocRef, { [field]: value, lastUpdate: new Date().toISOString() }, { merge: true });
                } catch(err) {
                    console.error("Update error:", err);
                }
            };

            const handleLogin = async () => {
                const trimmedName = userName.trim();
                if (!trimmedName) { setShowNameWarning(true); return; }
                setUserName(trimmedName);
                setIsLocked(true);
                setShowNameWarning(false);
                if (auth.currentUser) {
                    const globalDocRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, DOC_GLOBAL);
                    await setDoc(globalDocRef, { users: arrayUnion(trimmedName) }, { merge: true });
                }
            };

            const handleQuickLogin = (name) => { setUserName(name); setIsLocked(true); setShowNameWarning(false); };
            const handleLogout = () => { if(confirm('確定要登出嗎？')) { setIsLocked(false); setUserName(''); setFavorites([]); setHistoryLog([]); setMistakeLog([]); setCompletedDays([]); setSavedLevelSession(null); setSavedWaterfallSession(null); } };
            
            const handleDeleteUser = async () => { 
                if (confirm('確定要刪除資料嗎？這將清除所有學習紀錄！')) { 
                    try { 
                        const globalDocRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, DOC_GLOBAL); 
                        await updateDoc(globalDocRef, { users: arrayRemove(userName) }); 
                        const userId = auth.currentUser?.uid;
                        const userDocRef = doc(db, 'artifacts', appId, 'users', userId, COLLECTION_NAME, userName); 
                        await setDoc(userDocRef, { deleted: true }); 
                        setFavorites([]); setHistoryLog([]); setMistakeLog([]); setCompletedDays([]); setIsLocked(false); setUserName(''); 
                    } catch (e) { alert("刪除失敗"); } 
                } 
            };

            const toggleFavorite = (id) => { 
                const newFavorites = (favorites || []).includes(id) ? (favorites || []).filter(fid => fid !== id) : [...(favorites || []), id]; 
                setFavorites(newFavorites); 
                updateUserData('favorites', newFavorites); 
            };
            
            const playSoundEffect = (type) => {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;
                    const ctx = new AudioContext();
                    const now = ctx.currentTime;
                    if (type === 'correct') {
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        osc.frequency.setValueAtTime(523.25, now); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                        osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now + 0.5);
                    } else {
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        osc.frequency.setValueAtTime(150, now); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                        osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now + 0.3);
                    }
                } catch (e) {}
            };

            const handleStartQuiz = (category, pageIdx = 0, isMistakeMode = false) => {
                if (!isLocked) { setShowNameWarning(true); return; }
                
                if (savedLevelSession && savedLevelSession.category === category && savedLevelSession.pageIdx === pageIdx && !isMistakeMode) { 
                    setQuizQuestions(savedLevelSession.questions); setQuizScore(savedLevelSession.score); setCombo(savedLevelSession.combo); setQuizPage(savedLevelSession.pageIdx); setActiveCategory(savedLevelSession.category); setCurrentMode('quiz'); 
                    if(musicPlayerRef.current) musicPlayerRef.current.triggerPlay();
                    return; 
                }
                
                let sourceItems = isMistakeMode ? allItems.filter(i => (mistakeLog || []).some(m => m && m.id === i.id)) :
                                  (category === '收藏夾' ? allItems.filter(i => (favorites || []).includes(i.id)) : 
                                  allItems.slice(pageIdx * ITEMS_PER_PAGE, (pageIdx + 1) * ITEMS_PER_PAGE));
                
                if (sourceItems.length === 0) { alert(isMistakeMode ? "目前沒有錯題！" : "此頁面無題目"); return; }
                const quizSet = [...sourceItems].sort(() => Math.random() - 0.5).map(item => ({ ...item, userAnswer: null, isCorrect: null }));
                
                setQuizQuestions(quizSet);
                setQuizScore(0);
                setCombo(0);
                setQuizPage(pageIdx);
                setActiveCategory(isMistakeMode ? '錯題本' : category);
                setCurrentMode('quiz');
                window.scrollTo(0,0);
                if(musicPlayerRef.current) musicPlayerRef.current.triggerPlay();
            };

            const handleStartWaterfall = () => {
                if (!isLocked) { setShowNameWarning(true); return; }
                if (savedWaterfallSession) {
                    setQuizQuestions(savedWaterfallSession.questions); setQuizScore(savedWaterfallSession.score); setCombo(savedWaterfallSession.combo); setQuizPage(0); setActiveCategory('瀑布模式'); setCurrentMode('quiz');
                    window.scrollTo(0,0);
                    if(musicPlayerRef.current) musicPlayerRef.current.triggerPlay();
                    return;
                }
                
                const quizSet = [...allItems].sort(() => Math.random() - 0.5).map(item => ({ ...item, userAnswer: null, isCorrect: null }));
                setQuizQuestions(quizSet); setQuizScore(0); setCombo(0); setQuizPage(0); setActiveCategory('瀑布模式'); setCurrentMode('quiz');
                window.scrollTo(0,0);
                if(musicPlayerRef.current) musicPlayerRef.current.triggerPlay();
            };

            const handleAnswer = (qIndex, type) => {
                const newQs = [...quizQuestions];
                const q = newQs[qIndex];
                if (q.userAnswer !== null) return; // Prevent double answering
                
                const isCorrect = type === q.type;
                q.userAnswer = type; q.isCorrect = isCorrect;
                
                let newScore = quizScore; let newCombo = combo;
                if (isCorrect) { 
                    newScore++; newCombo++; 
                    setQuizScore(newScore); setCombo(newCombo);
                    playSoundEffect('correct');
                    if (newCombo % 5 === 0) confetti({ particleCount: 100, origin: { y: 0.6 } });
                } else {
                    newCombo = 0; setCombo(0);
                    playSoundEffect('wrong');
                    const newMistakes = [...(mistakeLog || [])];
                    const idx = newMistakes.findIndex(m => m && m.id === q.id);
                    if (idx > -1) newMistakes[idx].count += 1;
                    else newMistakes.push({ id: q.id, count: 1 });
                    setMistakeLog(newMistakes); updateUserData('mistakes', newMistakes);
                }
                setQuizQuestions(newQs);
                
                const sessionData = { questions: newQs, score: newScore, combo: newCombo, category: activeCategory, pageIdx: quizPage };
                if (activeCategory === '瀑布模式') updateUserData('currentWaterfallSession', sessionData);
                else if (activeCategory !== '錯題本') updateUserData('currentLevelSession', sessionData);
            };

            const finishQuiz = () => {
                const record = { id: Date.now(), date: new Date().toLocaleString(), userName, score: quizScore, total: quizQuestions.length, category: activeCategory };
                const newHistory = [record, ...(historyLog || [])];
                setHistoryLog(newHistory); updateUserData('history', newHistory);
                
                if (activeCategory !== '收藏夾' && activeCategory !== '錯題本' && activeCategory !== '瀑布模式') {
                    const progressKey = `${activeCategory}-${quizPage}`;
                    if (quizScore > 0) {
                        const existingEntryIndex = (completedDays || []).findIndex(item => item && item.id === progressKey);
                        let newCompleted = [...(completedDays || [])];
                        if (existingEntryIndex >= 0) {
                            newCompleted[existingEntryIndex] = { ...newCompleted[existingEntryIndex], score: Math.max(newCompleted[existingEntryIndex].score || 0, quizScore), date: new Date().toLocaleDateString() };
                        } else {
                            newCompleted.push({ id: progressKey, date: new Date().toLocaleDateString(), score: quizScore });
                        }
                        setCompletedDays(newCompleted); updateUserData('progress', newCompleted);
                    }
                }
                
                if (activeCategory === '瀑布模式') updateUserData('currentWaterfallSession', null);
                else if (activeCategory !== '錯題本') updateUserData('currentLevelSession', null);
            };

            return (
                <div className="min-h-screen relative font-sans selection:bg-amber-200 selection:text-amber-900">
                    <MusicPlayer ref={musicPlayerRef} />
                    {currentMode === 'menu' && (
                        <MenuView 
                            userName={userName} setUserName={setUserName} showNameWarning={showNameWarning} 
                            mistakeLog={mistakeLog} favorites={favorites} parsedData={parsedData} 
                            onStartLearn={(cat) => { setActiveCategory(cat); setLearnPage(0); setCurrentMode('learn'); triggerMusic(); }} 
                            onStartQuiz={(cat, page = 0) => handleStartQuiz(cat, page)} 
                            onViewHistory={() => setCurrentMode('history')} 
                            onViewMistakes={() => setCurrentMode('mistakes')} 
                            onViewTable={() => setCurrentMode('table')} 
                            onPrint={() => setCurrentMode('print')} 
                            onLogin={handleLogin} isLocked={isLocked} onQuickLogin={handleQuickLogin} 
                            onLogout={handleLogout} onDeleteUser={handleDeleteUser} globalUsers={globalUsers} 
                            triggerMusic={triggerMusic} connectionStatus={connectionStatus} 
                            completedDays={completedDays} onStartWaterfall={handleStartWaterfall} 
                        />
                    )}

                    {currentMode === 'learn' && <LearnView items={activeCategory === '收藏夾' ? allItems.filter(i => (favorites || []).includes(i.id)) : parsedData["數字成語"]} learnPage={learnPage} setLearnPage={setLearnPage} favorites={favorites} toggleFavorite={toggleFavorite} completedDays={completedDays} onMenu={() => setCurrentMode('menu')} />}
                    {currentMode === 'table' && <TableView items={IDIOM_DATA} onMenu={() => setCurrentMode('menu')} favorites={favorites} toggleFavorite={toggleFavorite} />}
                    {currentMode === 'quiz' && <QuizView questions={quizQuestions} score={quizScore} userName={userName} combo={combo} onAnswer={handleAnswer} onFinish={finishQuiz} onMenu={() => setCurrentMode('menu')} favorites={favorites} toggleFavorite={toggleFavorite} activeCategory={activeCategory} totalItems={activeCategory === '收藏夾' ? (favorites || []).length : parsedData["數字成語"].length} quizPage={quizPage} onPageChange={(page) => handleStartQuiz(activeCategory, page)} completedDays={completedDays} />}
                    {currentMode === 'mistakes' && <MistakeView mistakes={IDIOM_DATA.filter(i => (mistakeLog || []).some(m => m && m.id === i.id))} mistakeLog={mistakeLog} setMistakeLog={l => updateUserData('mistakes', l)} onMenu={() => setCurrentMode('menu')} onReviewAll={() => handleStartQuiz(null, 0, true)} />}
                    {currentMode === 'history' && <HistoryView historyLog={historyLog} onMenu={() => setCurrentMode('menu')} onClear={() => updateUserData('history', [])} />}
                    {currentMode === 'print' && <PrintView items={IDIOM_DATA} onMenu={() => setCurrentMode('menu')} />}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
