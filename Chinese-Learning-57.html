            addQ("(甲)悲觀的人，在每個機會中看到困難；樂觀的人，在每個困難中看到機會。\n(乙)生活是一面鏡子，你對它笑，它就對你笑；你對它哭，它就對你哭。\n兩句話共同要傳達的道理是？",
                ["(A) 機會總是伴隨著困難", "(B) 心境決定了我們眼中的世界", "(C) 樂觀能解決所有問題", "(D) 人生充滿不可預測的變數"], 1,
                ["此為(甲)句中悲觀者的視角。", "正確。兩者皆說明「主觀的心態與視角」會改變「客觀現實的呈現」。", "過度推論，樂觀改變的是視角，不一定能「解決所有」。", "未提及變數。"]);

            addQ("(甲)我雖然不同意你的觀點，但我誓死捍衛你說話的權利。\n(乙)真正的寬容，是允許別人和自己不一樣。\n綜合兩句話，下列何種行為最符合其精神？",
                ["(A) 為了和諧而放棄自己的原則", "(B) 強烈批判並試圖改變異見者", "(C) 尊重並包容多元意見的存在", "(D) 對任何事物都抱持無所謂的態度"], 2,
                ["捍衛說話權利不代表放棄自身觀點(仍可不同意)。", "與寬容精神相悖。", "正確。這正是伏爾泰名言與寬容定義的核心精神。", "此為消極冷漠，非積極的寬容。"]);

            addQ("(甲)不要因為走得太遠，而忘記了為什麼出發。\n(乙)初心易得，始終難守。\n這兩句話共同的核心概念為何？",
                ["(A) 莫忘初衷", "(B) 堅持不懈", "(C) 飲水思源", "(D) 亡羊補牢"], 0,
                ["正確。(甲)的「為什麼出發」與(乙)的「初心」皆指最初的理想與信念，告誡人應堅守本心。", "堅持不懈未點出「初心」的內涵。", "感恩之意，與初衷無關。", "事後補救，不符題意。"]);

            addQ("(甲)真正的強者不是沒有眼淚的人，而是含著眼淚依然奔跑的人。\n(乙)勇氣不是不害怕，而是帶著恐懼繼續前行。\n這兩句話對「強大/勇敢」的定義有何共同之處？",
                ["(A) 壓抑負面情緒的表現", "(B) 無所畏懼的完美人格", "(C) 接納脆弱並堅持行動", "(D) 拒絕向現實環境妥協"], 2,
                ["兩者皆允許眼淚/恐懼存在，並非壓抑。", "兩者皆點出強者/勇者也會有眼淚與害怕(不完美)。", "正確。承認脆弱(眼淚/害怕)，但仍選擇採取行動(奔跑/前行)。", "重點在克服內心，而非對抗外在環境。"]);

            addQ("(甲)你無法改變風向，但你可以調整風帆。\n(乙)既然不能改變客觀環境，就改變自己的心境。\n根據這兩句話，面對困境的最佳策略是？",
                ["(A) 逆流而上，人定勝天", "(B) 順應環境，調整自我", "(C) 聽天由命，隨遇而安", "(D) 避開阻礙，另尋出路"], 1,
                ["兩句話皆承認有無法改變的外力(風向/環境)，非人定勝天。", "正確。「調整風帆」與「改變心境」皆指改變自身的態度或方法來適應外在。", "隨遇而安缺乏「調整」的積極動作。", "非逃避，而是去應對。"]);

            addQ("(甲)人生就像騎單車，為了保持平衡，你必須不斷前進。\n(乙)流水不腐，戶樞不蠹。\n這兩句話共同揭示了什麼道理？",
                ["(A) 欲速則不達", "(B) 凡事順其自然", "(C) 運動有益身心", "(D) 生命在於持續活動與進步"], 3,
                ["無欲速不達之意。", "強調要主動前進，非順其自然。", "過於表面，兩者皆為比喻。", "正確。單車需前進才平衡；流水與門軸因常活動而不敗壞，皆強調持續活動與進步的重要性。"]);

            // Q11~Q20 文言文對比 (人物、修養、哲理)
            addQ("(甲)牡丹之愛，宜乎眾矣。(乙)菊之愛，陶後鮮有聞。\n關於周敦頤《愛蓮說》中的這兩句話，下列解析何者正確？",
                ["(A) 兩者皆是對世人品味的讚賞", "(B) (甲)句隱含諷刺，(乙)句帶有惋惜", "(C) 兩者皆感嘆知音難尋", "(D) (甲)句表惋惜，(乙)句表諷刺"], 1,
                ["(甲)諷刺追逐名利者多；(乙)惋惜隱逸高潔者少。", "正確。宜乎眾矣(愛富貴的人當然很多)為反諷；陶後鮮有聞(像陶淵明一樣的高士很少)為惋惜。", "只有(乙)有此意。", "選項相反。"]);

            addQ("(甲)木受繩則直，金就礪則利。\n(乙)玉不琢，不成器；人不學，不知道。\n兩者共同說明的道理為何？",
                ["(A) 天生我材必有用", "(B) 學習必須循序漸進", "(C) 後天的學習與磨鍊至關重要", "(D) 因材施教方能成大器"], 2,
                ["未提及天賦。", "未提及順序。", "正確。木需墨線、金需磨刀石、玉需雕琢、人需學習，皆強調後天加工磨鍊(教育/學習)的必要性。", "未提及因材施教。"]);

            addQ("(甲)千里之行，始於足下。(乙)合抱之木，生於毫末；九層之台，起於累土。\n這兩句話同屬《老子》，其欲傳達的哲理為何？",
                ["(A) 登高必自卑，行遠必自邇", "(B) 欲速則不達", "(C) 有志者事竟成", "(D) 斬草不除根，春風吹又生"], 0,
                ["正確。「登高必自卑，行遠必自邇」意為做事需由近及遠、由低到高，從最基本處做起，與甲乙兩句「從微小處開始」的意涵完全契合。", "未強調速度。", "未強調志向。", "與除惡無關。"]);

            addQ("(甲)君子成人之美，不成人之惡。(乙)己所不欲，勿施於人。\n關於這兩句孔子的話，下列說明何者最恰當？",
                ["(A) 兩者皆強調對自身欲望的克制", "(B) (甲)強調成全他人，(乙)強調推己及人", "(C) 兩者皆在探討如何辨別君子與小人", "(D) (甲)是消極防範，(乙)是積極作為"], 1,
                ["並非克制欲望。", "正確。(甲)主張成全別人的好事；(乙)主張自己不想要的別強加給別人(推己及人的恕道)。皆為待人接物之理。", "只有(甲)的後半句(小人反是)有辨別之意。", "(甲)是積極成全，(乙)是消極不施加。"]);

            addQ("(甲)業精於勤，荒於嬉。(乙)學如逆水行舟，不進則退。\n這兩句話皆在勉勵學子應如何？",
                ["(A) 勤勉不懈，切勿貪玩荒廢", "(B) 選擇良師益友", "(C) 理論與實務並重", "(D) 專心致志，心無旁騖"], 0,
                ["正確。(甲)點出勤奮能精進，嬉戲會荒廢；(乙)點出不前進就會後退。兩者皆告誡人須持續努力不懈怠。", "未提及師友。", "未提及實務。", "未強調專心。"]);

            addQ("(甲)不患人之不己知，患不知人也。\n(乙)君子病無能焉，不病人之不己知也。\n綜合兩句話，孔子認為君子最應該擔憂(患/病)的是什麼？",
                ["(A) 別人不了解自己", "(B) 自己缺乏識人的眼光與真才實學", "(C) 國家的施政方針錯誤", "(D) 朋友的背叛與誤解"], 1,
                ["甲乙兩句皆明確表示「不患/不病」人之不己知(不擔憂別人不了解自己)。", "正確。(甲)患不知人(擔憂沒有識人之明)；(乙)病無能(擔憂自己沒有能力)。", "無關國政。", "無關背叛。"]);

            addQ("(甲)近朱者赤，近墨者黑。(乙)蓬生麻中，不扶而直；白沙在涅，與之俱黑。\n這兩句話共同強調的影響力來自於何處？",
                ["(A) 天賦本性", "(B) 後天教育", "(C) 環境薰陶", "(D) 自身意志"], 2,
                ["兩者皆強調外在改變，非天生。", "並非指教育體制。", "正確。朱墨、麻涅皆代表「環境」，強調環境對人品格的潛移默化。", "自身意志(如出淤泥而不染)恰好與此兩句的觀點相反。"]);

            addQ("(甲)知之者不如好之者，好之者不如樂之者。(乙)學而時習之，不亦說乎？\n關於這兩句話的共同點，下列何者正確？",
                ["(A) 皆強調複習的重要性", "(B) 皆點出學習的最高境界在於「樂」", "(C) 皆認為天賦比努力重要", "(D) 皆提倡與同好切磋交流"], 1,
                ["只有(乙)提到複習(習)。", "正確。(甲)以「樂之」為最高層次；(乙)的「說乎」(悅)亦點出學習帶來的喜悅。", "未提及天賦。", "(乙)的下一句「有朋自遠方來」才有此意，但題幹未列。"]);

            addQ("(甲)尺有所短，寸有所長。(乙)梅須遜雪三分白，雪卻輸梅一段香。\n這兩句話共同傳達的道理為？",
                ["(A) 萬物皆有其優缺點，各有所長", "(B) 尺寸與長短是相對的概念", "(C) 虛心求教才能彌補自身不足", "(D) 表面上的缺點往往是潛在的優點"], 0,
                ["正確。(甲)以度量工具喻人；(乙)以梅與雪互比。皆說明事物各有其長處與短處，無法絕對完美。", "此為(甲)的表象。", "未提及求教。", "未提及缺點轉化為優點。"]);

            addQ("(甲)生於憂患，死於安樂。(乙)禍兮福之所倚，福兮禍之所伏。\n這兩句話共同蘊含了何種哲學思維？",
                ["(A) 宿命論，萬事皆已注定", "(B) 辯證法，事物會向對立面轉化", "(C) 享樂主義，應活在當下", "(D) 虛無主義，一切皆空"], 1,
                ["非宿命。", "正確。(甲)憂患(壞)能使人生存(好)，安樂(好)會導致滅亡(壞)；(乙)禍與福相互依存轉化。皆展現了對立面轉化的辯證思維。", "反對享樂。", "非虛無。"]);

            // Q21~Q30 白話文對比 (混合文類、深層寓意)
            addQ("(甲)真正的發現之旅，不在於尋找新的風景，而在於擁有新的眼光。(普魯斯特)\n(乙)我們不缺美，缺的是發現美的眼睛。(羅丹)\n這兩句話皆認為「發現」的關鍵在於？",
                ["(A) 不斷旅行拓展視野", "(B) 具備豐富的美學知識", "(C) 改變看待事物的視角與心境", "(D) 尋找前人未曾涉足的秘境"], 2,
                ["(甲)明確否定了「尋找新風景」。", "未強調知識。", "正確。「新的眼光」與「發現美的眼睛」皆指內在視角與心態的轉變。", "此為(甲)否定的概念。"]);

            addQ("(甲)最可怕的敵人不是別人，而是自己。\n(乙)勝人者有力，自勝者強。\n這兩句話對「真正的強大」有何共同見解？",
                ["(A) 擊敗外在所有的對手", "(B) 克服並超越自身的弱點", "(C) 擁有不被他人動搖的自信", "(D) 隱藏自己真實的情緒"], 1,
                ["此為「有力」，非真正的「強」。", "正確。(甲)視自己為最大敵人；(乙)認為能戰勝自己(自勝)才是真正的強大。", "未提及自信。", "未提及隱藏情緒。"]);

            addQ("(甲)沒有礁石的阻擋，哪能激起美麗的浪花？\n(乙)平靜的海洋，練不出熟練的水手。\n兩句話皆藉由「海洋」的意象來說明什麼道理？",
                ["(A) 逆境與挫折能造就非凡與卓越", "(B) 大自然的力量是令人敬畏的", "(C) 人生總是充滿了變幻莫測的風險", "(D) 航海是一項極具挑戰的冒險"], 0,
                ["正確。礁石與不平靜的海洋皆喻指「逆境」；浪花與熟練水手喻指「卓越成就」。", "僅為表象。", "未強調不可預測性。", "僅為表象。"]);

            addQ("(甲)與其在別人的劇本裡當配角，不如在自己的故事裡當主角。\n(乙)不要讓他人的噪音，淹沒了你內心的聲音。(賈伯斯)\n這兩句話共同鼓勵人們應該？",
                ["(A) 勇敢拒絕別人的請託", "(B) 專注自我，活出真實的自己", "(C) 努力成為社會關注的焦點", "(D) 不計代價地追求財富與地位"], 1,
                ["非拒絕請託。", "正確。(甲)強調做自己的主角；(乙)強調聽從內心的聲音。皆鼓勵活出真實的自我，不盲從他人。", "主角是指人生的主宰，非社會焦點。", "未提及財富。"]);

            addQ("(甲)如果冬天來了，春天還會遠嗎？(雪萊)\n(乙)黑夜無論怎樣悠長，白晝總會到來。(莎士比亞)\n這兩句西方名言，常被用來？",
                ["(A) 感嘆時光的流逝", "(B) 描寫四季與日夜的交替", "(C) 在絕望中帶給人希望", "(D) 勸戒世人應未雨綢繆"], 2,
                ["無感嘆之意。", "此為表面字義，非引申用意。", "正確。冬天與黑夜象徵低潮與困境；春天與白晝象徵希望與光明。皆在鼓勵人熬過困境，希望即在眼前。", "未提及防範未然。"]);

            addQ("(甲)世界上最遙遠的距離，不是生與死，而是我就站在你面前，你卻不知道我愛你。(泰戈爾)\n(乙)真正的孤獨不是一個人獨處，而是身在人群中卻無人理解。\n這兩句話所描述的「距離」與「孤獨」，本質上都是指？",
                ["(A) 物理空間上的遙遠", "(B) 生死之間的跨越", "(C) 心靈層面的無法溝通與隔閡", "(D) 愛情中的單相思"], 3,
                ["兩者皆否定了物理空間的遙遠(站在面前/身在人群)。", "只有甲提及，且被否定。", "正確。心靈無法相通才是最深層的距離與孤獨。", "乙句不限於愛情。"]);

            addQ("(甲)與惡龍纏鬥過久，自身亦成為惡龍；凝視深淵過久，深淵將回以凝視。(尼采)\n(乙)近之則不遜，遠之則怨。\n(甲)句的核心哲理，與下列哪一句中國古語最不相關？",
                ["(A) 薰蕕不同器 (好壞不能混雜)", "(B) 近朱者赤，近墨者黑", "(C) 鮑魚之肆，久而不聞其臭", "(D) 入芝蘭之室，久而不聞其香"], 0,
                ["甲句強調「受到凝視/對抗對象的同化」。", "薰蕕不同器意指好人壞人不能共處，未提及「同化」的概念，最不相關。", "環境同化作用，與甲相關。", "環境同化作用，與甲相關。", "環境同化作用，與甲相關。"]); // Modified to fit 4 options

            addQ("(甲)有時候，方向比努力更重要。\n(乙)南轅北轍的結果，只是徒勞無功。\n根據這兩句話，行動前最應具備的條件是？",
                ["(A) 堅定的意志力", "(B) 充足的資源配備", "(C) 正確的目標與決策", "(D) 團隊的通力合作"], 2,
                ["若方向錯誤，意志力越堅定走得越偏(南轅北轍)。", "未提及資源。", "正確。「方向」與避免「南轅北轍」(方向錯誤)皆強調正確目標決策的首要性。", "未提及團隊。"]);

            addQ("(甲)我們總以為擁有的太少，卻忘了我們原本就一無所有。\n(乙)你若為錯過太陽而流淚，你也會錯過群星。(泰戈爾)\n(甲)句偏向於什麼態度？(乙)句偏向於什麼勸告？",
                ["(A) (甲)悲觀厭世；(乙)珍惜當下", "(B) (甲)知足感恩；(乙)勿沉溺於過去的遺憾", "(C) (甲)看破紅塵；(乙)目光長遠", "(D) (甲)清心寡慾；(乙)把握未來"], 1,
                ["(甲)並非悲觀，而是點醒。", "正確。(甲)提醒人本來就一無所有，現有的都該知足；(乙)勸人不要因懊悔過去而錯失現在與未來的微小美好。", "(甲)未到看破紅塵。", "(甲)非純粹清心寡慾。"]);

            addQ("(甲)語言是銀，沉默是金。\n(乙)大音希聲，大象無形。\n關於這兩句話的意涵，下列何者正確？",
                ["(A) 兩者皆認為「無/沉默」的境界高於「有/表達」", "(B) (甲)句在談財富價值，(乙)句在談音樂與繪畫", "(C) 兩者皆主張人們不應隨便發表意見", "(D) (甲)句屬道家思想，(乙)句屬儒家思想"], 0,
                ["正確。金貴於銀；希聲(無聲)勝於有聲。皆推崇「無」或「內斂」的至高境界。", "此為表面字義，誤解其寓意。", "(乙)是美學與哲學觀境，不僅止於發表意見。", "(甲)為西方諺語，(乙)為道家(老子)思想。"]);

            // Q31~Q40 難度提升混合題 (同中求異、異中求同)
            addQ("(甲)君子之交淡如水，小人之交甘若醴。(莊子)\n(乙)以勢交者，勢傾則絕；以利交者，利窮則散。(王通)\n若將(甲)(乙)兩句對照，(甲)句的「甘若醴」最可能對應到(乙)句的何種交友方式？",
                ["(A) 以心交者", "(B) 以道交者", "(C) 以勢/利交者", "(D) 以文交者"], 2,
                ["以心交應為君子之交。", "以道交應為君子之交。", "正確。「甘若醴」(像甜酒般濃烈)通常建立在利益與權勢的勾結上，故勢傾利窮則絕散，對應小人之交。", "以文會友為正面。"]);

            addQ("(甲)不以物喜，不以己悲。(范仲淹)\n(乙)得之不喜，失之不憂。(蘇軾)\n這兩句話展現了何種共同的生命境界？",
                ["(A) 悲天憫人的胸懷", "(B) 超然物外的豁達", "(C) 隨波逐流的無奈", "(D) 憤世嫉俗的清高"], 1,
                ["未提及對他人的憐憫。", "正確。兩者皆不受外在事物的得失與個人際遇的影響，展現了超脫的豁達心胸。", "無無奈之感。", "無憤世嫉俗。"]);

            addQ("(甲)盡信書，則不如無書。(孟子)\n(乙)吾愛吾師，吾更愛真理。(亞里斯多德)\n這兩位中西方哲人的名言，共同強調了何種治學態度？",
                ["(A) 尊師重道", "(B) 博覽群書", "(C) 獨立思考與批判精神", "(D) 理論與實踐的結合"], 2,
                ["(乙)雖說吾愛吾師，但重點在後句「更愛真理」。", "未提及閱讀數量。", "正確。(甲)強調不盲從書本；(乙)強調不盲從權威(老師)，只追求真理。皆展現獨立判斷與批判精神。", "未提及實踐。"]);

            addQ("(甲)飛鳥盡，良弓藏；狡兔死，走狗烹。\n(乙)狡兔死，獵犬充飢；高鳥盡，良弓受銎。\n此兩句話多用來比喻什麼歷史現象？",
                ["(A) 物競天擇，適者生存", "(B) 功臣在事成後遭到殺害或遺棄", "(C) 人生無常，禍福相依", "(D) 工具的耗損與汰換是必然的"], 1,
                ["非生物學現象。", "正確。弓與狗皆喻指「功臣」，敵人(鳥/兔)被消滅後，功臣就失去了利用價值，反而成為君主的威脅而遇害。", "非單純禍福。", "此為表象解釋。"]);

            addQ("(甲)燕雀安知鴻鵠之志哉！(陳涉)\n(乙)井蛙不可以語於海者，拘於虛也；夏蟲不可以語於冰者，篤於時也。(莊子)\n這兩句話皆使用了「動物」的對比，其寓意有何關聯？",
                ["(A) (甲)強調見識的差異；(乙)強調志向的高低", "(B) 皆以小動物比喻見識淺薄/格局狹隘之人", "(C) 皆在感嘆生命的短暫與渺小", "(D) (甲)屬道家思想；(乙)屬兵家思想"], 1,
                ["選項相反。(甲)強調志向；(乙)強調見識。", "正確。燕雀、井蛙、夏蟲皆喻指格局小、見識淺的人；鴻鵠、海、冰則為大格局。", "非感嘆生命。", "陳涉非道家或兵家(為農民起義)。"]);

            addQ("(甲)水至清則無魚，人至察則無徒。\n(乙)海納百川，有容乃大。\n若要為這兩句話下一個共同的標題，何者最為適切？",
                ["(A) 慎選交友", "(B) 廉潔自守", "(C) 寬容大度", "(D) 順應自然"], 2,
                ["非慎選交友。", "非廉潔。", "正確。(甲)水太清沒魚，人太苛察(不包容)就沒有朋友；(乙)海能容納百川所以廣大。兩者皆指出「包容、寬恕」的重要性。", "非順應自然。"]);

            addQ("(甲)天下之至柔，馳騁天下之至堅。(老子)\n(乙)滴水穿石，非一日之功。\n這兩句話雖然皆以「水」的柔弱來論述，但其側重點有何不同？",
                ["(A) (甲)側重「柔弱勝剛強」的本質；(乙)側重「持之以恆」的累積", "(B) (甲)側重速度；(乙)側重力量", "(C) (甲)強調破壞力；(乙)強調建設性", "(D) 兩者觀點完全一致，並無不同"], 0,
                ["正確。(甲)探討道家的柔勝剛哲理；(乙)強調恆心的力量(非一日之功)。", "皆非側重速度。", "皆非強調破壞。", "兩者有細微側重差異。"]);

            addQ("(甲)與其詛咒黑暗，不如點亮蠟燭。(乙)臨淵羨魚，不如退而結網。\n兩句話皆為「比較句」中的「與其...不如...」句型。其共同的啟示為何？",
                ["(A) 凡事皆有兩面，應樂觀看待", "(B) 空想或抱怨無益，應採取實際行動", "(C) 選擇適合自己的工具才能成功", "(D) 學習接納生命中的不完美"], 1,
                ["非探討兩面性。", "正確。詛咒/羨魚皆為無濟於事的「空想/抱怨」；點亮/結網皆為解決問題的「實際行動」。", "非強調工具。", "非接納不完美。"]);

            addQ("(甲)金玉其外，敗絮其中。(乙)繡花枕頭，外強中乾。\n這兩句成語皆可用來形容下列哪一種人？",
                ["(A) 外表出眾且內涵豐富的人", "(B) 深藏不露、大智若愚的人", "(C) 虛有其表、缺乏實力的人", "(D) 歷經滄桑、外貌憔悴的人"], 2,
                ["此為表裡如一的好評價。", "此為外弱內強。", "正確。金玉/繡花指華麗的外表；敗絮/中乾指內在破敗空虛。皆指虛有其表之人。", "無關滄桑。"]);

            addQ("(甲)路遙知馬力，日久見人心。(乙)試玉要燒三日滿，辨材須待七年期。(白居易)\n這兩句話共同說明了哪一種檢驗真理或人品的方法？",
                ["(A) 旁人客觀的評價", "(B) 時間的漫長考驗", "(C) 逆境與挫折的打擊", "(D) 利益當前的抉擇"], 1,
                ["未提及旁人。", "正確。「路遙/日久」與「三日滿/七年期」皆強調需要經過長時間的觀察與考驗，才能看清真相或人品。", "雖也是檢驗法，但題幹未提及。", "非利益考驗。"]);

            // Q41~Q50 細節推敲與邏輯辨誤
            addQ("(甲)寧為雞首，不為牛後。\n(乙)寧為蘭撲，不為蕭存。\n這兩句「寧可...不為...」的句式，其價值觀的取向有何不同？",
                ["(A) (甲)重實質權力，(乙)重高潔節操", "(B) (甲)重團隊合作，(乙)重個人表現", "(C) 皆強調退隱山林的決心", "(D) 皆感嘆生不逢時"], 0,
                ["正確。(甲)寧做小團體首領，不做大團體跟班，重地位與主導權；(乙)寧可做被摧毀的蘭花(香草)，也不做苟活的艾蕭(雜草)，重節操。", "無關團隊。", "無關退隱。", "無關生不逢時。"]);

            addQ("(甲)倉廩實而知禮節，衣食足而知榮辱。(管仲)\n(乙)貧賤不能移，威武不能屈。(孟子)\n關於這兩句話對「物質生活與道德」的看法，下列敘述何者最為精確？",
                ["(A) 兩者皆認為物質決定道德", "(B) (甲)認為物質基礎是道德的前提；(乙)認為道德不應受物質匱乏影響", "(C) 兩者皆認為道德比物質更重要", "(D) (甲)屬儒家觀點；(乙)屬法家觀點"], 1,
                ["(乙)認為道德不受物質決定。", "正確。(甲)管仲認為要先吃飽穿暖，人民才懂禮義；(乙)孟子認為即使貧賤(物質匱乏)，君子節操也不會改變。", "(甲)將物質放在前提。", "(甲)為管子(齊法家偏向)，(乙)為儒家。"]);

            addQ("(甲)不識廬山真面目，只緣身在此山中。(蘇軾)\n(乙)旁觀者清，當局者迷。\n(甲)句中哪一個字詞的意思最貼近(乙)句的「當局者迷」？",
                ["(A) 廬山", "(B) 真面目", "(C) 身在此山中", "(D) 只緣"], 2,
                ["廬山是客體。", "真面目是真相。", "正確。「身在此山中」就是身處事件之中(當局者)，因此看不清全貌(迷)。", "只緣是因為。"]);

            addQ("(甲)海內存知己，天涯若比鄰。(王勃)\n(乙)相見時難別亦難，東風無力百花殘。(李商隱)\n這兩首描寫離別的唐詩，其情感基調有何不同？",
                ["(A) (甲)曠達豪邁；(乙)纏綿哀怨", "(B) (甲)悲憤激昂；(乙)超然物外", "(C) 兩者皆充滿深沉的絕望", "(D) 兩者皆展現對未來的期盼"], 0,
                ["正確。(甲)認為只要有知己，天涯海角也像鄰居，情感豁達；(乙)連用兩個「難」字與落花意象，極盡纏綿哀痛。", "情感配對錯誤。", "只有(乙)偏向感傷。", "只有(甲)較為正面。"]);

            addQ("(甲)盡人事，聽天命。\n(乙)謀事在人，成事在天。\n這兩句話對「人」與「天(命運)」的關係，抱持何種態度？",
                ["(A) 極度悲觀，認為人完全無法掌握命運", "(B) 狂妄自大，認為人定勝天", "(C) 豁達務實，強調人應盡全力，結果則順應自然", "(D) 投機取巧，只做表面工夫以欺瞞上天"], 2,
                ["若完全無法掌握，就不需「盡人事/謀事」。", "若人定勝天，則無須「聽天命/成事在天」。", "正確。兩者皆主張在個人能控制的部分(人事/謀事)做到最好，而對不可控的結果(天命)坦然接受。", "曲解文意。"]);

            addQ("(甲)授人以魚，不如授人以漁。\n(乙)給他吃魚，不如教他釣魚。\n這兩句話(其實為同意轉換)強調的教育或助人原則為何？",
                ["(A) 物質的援助永遠多於精神的援助", "(B) 傳授方法與技能，比直接給予成果更有價值", "(C) 應因材施教，不可一視同仁", "(D) 助人應量力而為，不可傾家蕩產"], 1,
                ["完全相反。", "正確。「魚」喻指直接的物質成果；「漁」(釣魚技術)喻指謀生的技能方法。強調教導技能才是長遠之計。", "未提及因材施教。", "未提及量力而為。"]);

            addQ("(甲)不飛則已，一飛衝天；不鳴則已，一鳴驚人。\n(乙)十年寒窗無人問，一舉成名天下知。\n這兩句話皆描述了何種人生歷程？",
                ["(A) 懷才不遇，終生抱憾", "(B) 少年得志，大放異彩", "(C) 隱忍潛伏，最終爆發取得巨大成功", "(D) 沽名釣譽，華而不實"], 2,
                ["最終有成功。", "非少年得志。", "正確。(甲)的「不飛/不鳴」與(乙)的「十年寒窗」皆為長期的潛伏與累積；後者皆為一夕之間的巨大成功(衝天/驚人/天下知)。", "非負面詞彙。"]);

            addQ("(甲)匹夫無罪，懷璧其罪。(左傳)\n(乙)樹大招風，名高引謗。\n這兩句話共同指出了什麼社會現象的無奈？",
                ["(A) 法律總是保護有權勢的人", "(B) 才能出眾或擁有珍寶，容易招致他人的嫉妒與陷害", "(C) 謠言止於智者，流言蜚語不攻自破", "(D) 財富與名聲是人一生追求的終極目標"], 1,
                ["未探討法律不公。", "正確。匹夫(平民)本無罪，卻因懷有和氏璧(珍寶)而獲罪；樹大/名高則引來風/謗。皆指好事物易招禍。", "未提及謠言止於智者。", "並非提倡追求名利。"]);

            addQ("(甲)獨學而無友，則孤陋而寡聞。(禮記)\n(乙)三人行，必有我師焉。(論語)\n這兩句儒家經典名言，共同提倡何種學習態度？",
                ["(A) 閉門造車，深思熟慮", "(B) 尊師重道，盲從權威", "(C) 走出書本，重視實踐", "(D) 虛心求教，重視同儕間的交流學習"], 3,
                ["(甲)明確反對「獨學(閉門造車)」。", "(乙)強調向所有人學習，非權威。", "未特別強調實踐。", "正確。(甲)指出沒有朋友切磋會孤陋寡聞；(乙)指出別人身上總有值得學習之處。皆強調交流與虛心求教。"]);

            addQ("(甲)橘生淮南則為橘，生於淮北則為枳。(晏子春秋)\n(乙)近朱者赤，近墨者黑。\n這兩句話雖然喻體不同(植物 vs 染料)，但喻意皆在強調何者的重要性？",
                ["(A) 氣候變遷", "(B) 遺傳基因", "(C) 環境影響", "(D) 努力程度"], 2,
                ["氣候僅為(甲)的表象。", "基因與此寓意無關。", "正確。(甲)因地理環境(淮南/北)改變植物性狀；(乙)因接觸的染料(環境/朋友)改變人的品行。皆強調外在環境的決定性影響。", "兩者皆非探討個人努力。"]);

            return qList;
        };

        let currentTab = 'login';
        let learnSubTab = 'sec1';
        let quizState = { active: false, currentQ: 0, score: 0, answers: [], questions: [], showExplanation: false, selectedAns: null };
        let isLearnMenuOpen = false;

        const el = id => document.getElementById(id);

        const syncQuestionsFormat = (state) => {
            if (!state || !state.questions) return state;
            if (state.questions.length > 0 && !state.questions[0].exps) {
                const freshQuestions = generate50Questions();
                state.questions = state.questions.map(oldQ => {
                    const freshQ = freshQuestions.find(fq => fq.q === oldQ.q);
                    if (freshQ) return { ...freshQ, showExplanation: oldQ.showExplanation, selectedAns: oldQ.selectedAns, isCorrect: oldQ.isCorrect };
                    return oldQ;
                });
            }
            return state;
        };

        window.toggleLearnMenu = (show) => {
            isLearnMenuOpen = typeof show === 'boolean' ? show : !isLearnMenuOpen;
            const drawer = el('learn-drawer');
            const overlay = el('learn-overlay');
            if(drawer && overlay) {
                if(isLearnMenuOpen) {
                    drawer.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                } else {
                    drawer.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            }
        };

        const listenToGlobalUsers = () => {
            if (!isFirebaseInitialized || !currentUser) return;
            const globalRef = doc(db, 'artifacts', appId, 'public', 'data', DOC_GLOBAL, COLLECTION_NAME);
            if(unsubscribeGlobal) unsubscribeGlobal();
            unsubscribeGlobal = onSnapshot(globalRef, (snap) => {
                if(snap.exists()) recentUsers = snap.data().users || [];
                else recentUsers = [];
                if(currentTab === 'login') renderLogin();
            });
        };

        const listenToUserDocument = (name) => {
            if (!isFirebaseInitialized || !currentUser) {
                loadLocalData(name);
                return;
            }
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, name);
            if(unsubscribeUser) unsubscribeUser();
            unsubscribeUser = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    userData = Object.assign({ favorites: [], mistakes: [], quizHistory: [], loginHistory: [], quizState: null }, data);
                    saveLocalData(name);
                    
                    if (userData.quizState) {
                        userData.quizState = syncQuestionsFormat(userData.quizState); 
                        const cloudStateStr = JSON.stringify(userData.quizState);
                        const localStateStr = JSON.stringify(quizState);
                        if (cloudStateStr !== localStateStr) {
                            quizState = userData.quizState;
                            try { if(username) localStorage.setItem(`${COLLECTION_NAME}_${username}_quiz`, cloudStateStr); } catch(e) {}
                            if(currentTab === 'quiz') {
                                let scrollPos = 0;
                                const scrollContainer = document.getElementById('quiz-scroll-container');
                                if (scrollContainer) scrollPos = scrollContainer.scrollTop;
                                renderQuizView(document.getElementById('main-content'));
                                setTimeout(() => {
                                    const newScrollContainer = document.getElementById('quiz-scroll-container');
                                    if (newScrollContainer && scrollPos > 0) newScrollContainer.scrollTop = scrollPos;
                                }, 10);
                                const navStats = document.getElementById('nav-quiz-stats');
                                if (navStats) {
                                    if (quizState.active) {
                                        navStats.classList.remove('hidden');
                                        navStats.classList.add('flex');
                                        updateQuizStats();
                                    } else {
                                        navStats.classList.add('hidden');
                                        navStats.classList.remove('flex');
                                    }
                                }
                            }
                        }
                    }
                } else {
                    userData = { favorites: [], mistakes: [], quizHistory: [], loginHistory: [new Date().toISOString()], quizState: null };
                    setDoc(userRef, userData, { merge: true });
                }
                if(currentTab === 'favorites') renderFavorites();
                else if(currentTab === 'mistakes') renderMistakes();
                else if(currentTab === 'history') renderHistory();
            }, (error) => console.error("Listen user error", error));
        };

        const saveUserDataToCloud = async () => {
            saveLocalData(username);
            if (!isFirebaseInitialized || !currentUser || !username) return;
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', `${COLLECTION_NAME}_profiles`, username);

                            <div class="absolute top-0 right-0 w-40 h-40 bg-rose-100 rounded-bl-full -z-10 opacity-50"></div>
                            <div class="w-24 h-24 md:w-32 md:h-32 bg-gradient-to-br from-pink-500 to-rose-600 rounded-full mx-auto mb-8 flex items-center justify-center shadow-lg">
                                <span class="text-6xl md:text-7xl text-white">🧠</span>
                            </div>
                            <h2 class="text-3xl md:text-5xl font-extrabold mb-6 text-rose-950 tracking-wide">句義比較 50題挑戰 🏆🔥</h2>
                            <p class="text-rose-800/80 mb-10 text-xl md:text-2xl leading-loose">
                                涵蓋白話與文言雙句、會考高難度閱讀題型，全面驗收您的判讀精熟度！<br>
                                <span class="bg-rose-100 text-rose-800 font-bold px-5 py-2 rounded-full inline-block mt-6 border border-rose-200 shadow-sm">🌊 瀑布流模式</span><br>
                                <span class="text-lg md:text-xl text-rose-600 mt-3 block font-bold">🎯 點擊選項後，詳細解析將直接顯示在每個選項框框內，無須滑動對照！</span>
                            </p>
                            <button onclick="startQuiz()" class="w-full sm:w-auto bg-gradient-to-r from-pink-600 to-rose-600 hover:from-pink-700 hover:to-rose-700 text-white font-bold py-5 px-16 text-2xl md:text-3xl rounded-2xl shadow-xl transition-all transform hover:-translate-y-1 hover:shadow-2xl">
                                開始挑戰 🚀🔥
                            </button>
                        </div>
                    </div>
                `;
            } else {
                renderQuizWaterfall(container);
            }
        };

        window.startQuiz = () => {
            initAudio(); 
            const qList = [...generate50Questions()].sort(() => 0.5 - Math.random()).map(q => ({
                ...q, selectedAns: null, showExplanation: false, isCorrect: false
            }));
            quizState = { active: true, isFinished: false, questions: qList };
            saveQuizState();
            renderQuizView(el('main-content'));
            const navStats = el('nav-quiz-stats');
            if (navStats) { navStats.classList.remove('hidden'); navStats.classList.add('flex'); }
            updateQuizStats();
        };

        window.updateQuizStats = () => {
            if (!quizState.active) return;
            let correct = 0; let incorrect = 0; let answered = 0;
            const total = quizState.questions.length;
            quizState.questions.forEach(q => {
                if (q.showExplanation && q.selectedAns !== -1) {
                    answered++;
                    if (q.isCorrect) correct++; else incorrect++;
                }
            });
            const progressPercent = (answered / total) * 100;
            const elCorrect = document.getElementById('nav-stat-correct');
            const elIncorrect = document.getElementById('nav-stat-incorrect');
            const elBar = document.getElementById('nav-stat-progress-bar');
            if (elCorrect) elCorrect.innerText = correct;
            if (elIncorrect) elIncorrect.innerText = incorrect;
            if (elBar) elBar.style.width = progressPercent + '%';
        };

        window.restartQuizWithConfirm = () => {
            if(confirm('確定要重新開始挑戰嗎？這將會清除目前的畫面，並產生全新的測驗題目！')) startQuiz();
        };

        const renderQuizWaterfall = (container) => {
            const total = quizState.questions.length;
            const isFinished = quizState.isFinished;
            
            let headerHtml = isFinished 
                ? ` <div class="glass-card flex flex-col md:flex-row justify-between items-center rounded-2xl p-5 md:p-6 shadow-lg border border-rose-300 mb-10 sticky top-0 z-50 backdrop-blur-xl bg-gradient-to-r from-pink-50 to-rose-50">
                        <div class="flex items-center mb-4 md:mb-0">
                            <span class="text-5xl mr-4 drop-shadow-md">🏆✨</span>
                            <div>
                                <h2 class="text-2xl md:text-3xl font-extrabold text-rose-900">測驗結算完成 🎉</h2>
                                <p class="text-rose-700 font-bold text-lg mt-1">總分：<span class="text-3xl md:text-4xl text-rose-600 font-black">${quizState.scorePercent}</span> 分 (答對 ${quizState.correctCount} / 共 ${total} 題)</p>
                            </div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="switchTab('mistakes')" class="text-base md:text-lg text-rose-600 hover:text-white hover:bg-rose-500 px-4 py-2 rounded-xl font-bold transition-colors flex items-center border-2 border-rose-200 hover:border-rose-500 bg-white"><span class="mr-2">🩹</span>錯題本</button>
                            <button onclick="restartQuizWithConfirm()" class="text-base md:text-lg text-white bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-600 hover:to-pink-600 px-4 py-2 rounded-xl font-bold transition-colors flex items-center shadow-md hover:shadow-lg"><span class="mr-2">🔄</span>重新挑戰</button>
                        </div>
                    </div>`
                : ` <div class="flex justify-end mb-4">
                        <button onclick="clearQuizHistory()" class="text-sm md:text-base text-rose-500 hover:text-rose-700 hover:bg-rose-50 px-4 py-2 rounded-xl font-bold transition-colors flex items-center border border-rose-200 bg-white shadow-sm"><span class="mr-2">🚪</span>放棄作答</button>
                    </div>`;

            let html = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-10 overflow-y-auto overflow-x-hidden pb-24 scrollbar-hide relative z-10" id="quiz-scroll-container">
                    <div class="w-full max-w-[96%] xl:max-w-[98%] mx-auto relative">
                        ${headerHtml}
                        <div id="questions-list" class="space-y-10 w-full">
            `;
            quizState.questions.forEach((_, qIdx) => { html += `<div id="q-block-${qIdx}" class="bg-white rounded-3xl shadow-lg overflow-hidden border border-rose-100 transition-all w-full">${generateSingleQuestionHtml(qIdx)}</div>`; });
            html += `</div>`;
            
            if (!isFinished) {
                html += `
                        <button onclick="finishQuizWaterfall()" class="w-full mt-16 bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-extrabold py-6 md:py-8 text-2xl md:text-4xl rounded-3xl shadow-2xl transition-all transform hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(0,0,0,0.2)] flex items-center justify-center break-words border-b-8 border-rose-700">

                 html += `
                        <button onclick="restartQuizWithConfirm()" class="w-full mt-16 bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-600 hover:to-pink-600 text-white font-extrabold py-6 md:py-8 text-2xl md:text-4xl rounded-3xl shadow-2xl transition-all transform hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(0,0,0,0.2)] flex items-center justify-center break-words border-b-8 border-pink-700">
                            🔄 重新開始挑戰 🚀💪
                        </button>`;                
            }
            html += `</div></div>`;
            container.innerHTML = html;
        };

        const generateSingleQuestionHtml = (qIdx) => {
            const q = quizState.questions[qIdx];
            let optionsHtml = '';
            
            q.opts.forEach((opt, i) => {
                let btnClass = "w-full text-left p-3 md:p-5 text-xl md:text-2xl rounded-2xl border-2 transition-all duration-200 flex flex-col items-start group relative overflow-hidden ";
                let iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-rose-50 text-rose-600 flex items-center justify-center mr-3 md:mr-5 font-extrabold text-xl md:text-2xl transition-colors shrink-0 shadow-inner group-hover:bg-rose-100 group-hover:text-rose-700">${String.fromCharCode(65+i)}</span>`;
                
                let optExpHtml = '';
                
                if (!q.showExplanation) {
                    btnClass += "border-rose-100 hover:border-rose-400 hover:bg-rose-50/50 bg-white cursor-pointer hover:shadow-md";
                } else {
                    let expText = (q.exps && q.exps[i]) ? q.exps[i] : '無詳細解析';
                    
                    if (i === q.ans) {
                        btnClass += "border-emerald-400 bg-emerald-50/30 text-emerald-900 shadow-md z-10 ring-2 ring-emerald-400/20";
                        iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-emerald-500 text-white flex items-center justify-center mr-3 md:mr-5 font-bold text-2xl md:text-3xl shrink-0 shadow-sm">✅</span>`;
                        optExpHtml = `<div class="mt-3 p-3 md:p-4 rounded-xl text-base md:text-lg border border-emerald-200 bg-emerald-100/60 text-emerald-900 animate-fade-in w-full leading-relaxed font-medium"><span class="font-bold mr-2 text-emerald-700">🎯 解析：</span>${expText}</div>`;
                    } else if (i === q.selectedAns) {
                        btnClass += "border-rose-400 bg-rose-50/40 text-rose-900";
                        iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-rose-500 text-white flex items-center justify-center mr-3 md:mr-5 font-bold text-2xl md:text-3xl shrink-0 shadow-sm">❌</span>`;
                        optExpHtml = `<div class="mt-3 p-3 md:p-4 rounded-xl text-base md:text-lg border border-rose-200 bg-rose-100/60 text-rose-900 animate-fade-in w-full leading-relaxed font-medium"><span class="font-bold mr-2 text-rose-700">💡 解析：</span>${expText}</div>`;
                    } else {
                        btnClass += "border-slate-200 bg-slate-50/60 opacity-90 cursor-not-allowed";
                        iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-slate-200 text-slate-500 flex items-center justify-center mr-3 md:mr-5 font-extrabold text-xl md:text-2xl shrink-0">${String.fromCharCode(65+i)}</span>`;
                        optExpHtml = `<div class="mt-3 p-3 md:p-4 rounded-xl text-base md:text-lg border border-slate-200 bg-white text-slate-700 animate-fade-in w-full leading-relaxed font-medium"><span class="font-bold mr-2 text-slate-500">💡 解析：</span>${expText}</div>`;
                    }
                }

                optionsHtml += `
                    <button ${q.showExplanation ? 'disabled' : `onclick="answerWaterfallQuestion(${qIdx}, ${i})"`} class="${btnClass}">
                        <div class="flex items-center w-full">
                            ${iconHtml}
                            <span class="flex-1 leading-relaxed break-words z-10 text-left ${q.showExplanation && i === q.ans ? 'text-emerald-900 font-bold' : 'text-slate-800 font-medium'} group-hover:text-rose-950">${opt}</span>
                        </div>
                        ${optExpHtml}
                    </button>
                `;
            });

            let generalExpHtml = '';
            if (q.showExplanation && q.generalExp) {
                generalExpHtml = `
                    <div class="mt-5 p-4 md:p-5 bg-rose-50/80 border border-rose-200 rounded-2xl relative overflow-hidden animate-fade-in text-left shadow-sm">
                        <div class="absolute left-0 top-0 bottom-0 w-2 bg-rose-400"></div>
                        <p class="text-lg md:text-xl leading-loose break-words whitespace-pre-wrap pl-3 font-bold text-rose-900">${q.generalExp}</p>
                    </div>
                `;
            }

            const isFav = userData.favorites && userData.favorites.includes(q.q);
            const favIconHtml = isFav 
                ? '<i class="fa-solid fa-heart text-rose-500"></i>' 
                : '<i class="fa-regular fa-heart text-rose-500"></i>';

            let statusTag = '';
            let bgGradient = '';
            if (q.showExplanation) {
                if (q.selectedAns === q.ans) {
                    statusTag = '<span class="text-emerald-600 font-bold text-lg md:text-xl flex items-center bg-emerald-100 px-3 py-1 rounded-full shadow-sm"><span class="mr-2">✅</span>答對 🎉</span>';
                    bgGradient = 'bg-gradient-to-r from-emerald-50 to-white';
                } else if (q.selectedAns === -1) {
                    statusTag = '<span class="text-amber-600 font-bold text-lg md:text-xl flex items-center bg-amber-100 px-3 py-1 rounded-full shadow-sm"><span class="mr-2">⚠️</span>未作答</span>';
                    bgGradient = 'bg-gradient-to-r from-amber-50 to-white';
                } else {
                    statusTag = '<span class="text-rose-600 font-bold text-lg md:text-xl flex items-center bg-rose-100 px-3 py-1 rounded-full shadow-sm"><span class="mr-2">❌</span>答錯 💦</span>';
                    bgGradient = 'bg-gradient-to-r from-rose-50 to-white';
                }
            } else {
                statusTag = '<span class="text-rose-400 font-bold text-base md:text-lg flex items-center bg-rose-100/50 px-3 py-1 rounded-full border border-rose-200"><span class="mr-2">✍️</span>作答區</span>';
                bgGradient = 'bg-rose-50/30';
            }

            return `
                <div class="px-5 md:px-8 py-4 border-b border-rose-100 flex justify-between items-center transition-colors ${bgGradient}">
                    <div class="flex items-center">
                        <span class="font-extrabold text-rose-500 text-lg md:text-xl bg-white px-3 py-1 rounded-xl border border-rose-100 shadow-sm">🤔 Q ${qIdx + 1}</span>
                        <button onclick="toggleQuizFavorite(${qIdx})" class="ml-4 text-[1.5rem] md:text-3xl hover:scale-110 transition-transform focus:outline-none drop-shadow-sm" title="加入/取消最愛">
                            ${favIconHtml}
                        </button>
                    </div>
                    ${statusTag}
                </div>
                <div class="p-5 md:p-8 w-full overflow-hidden">
                    <h3 class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-6 leading-loose break-words text-left">${q.q}</h3>
                    <div class="space-y-3 w-full">
                        ${optionsHtml}
                    </div>
                    ${generalExpHtml}
                </div>
            `;
        };

        window.toggleQuizFavorite = (qIdx) => {
            const q = quizState.questions[qIdx];
            const qText = q.q;
            if (!userData.favorites) userData.favorites = [];
            const idx = userData.favorites.indexOf(qText);
            if (idx > -1) userData.favorites.splice(idx, 1);
            else userData.favorites.push(qText);
            saveUserDataToCloud();
            const block = document.getElementById(`q-block-${qIdx}`);
            if (block) block.innerHTML = generateSingleQuestionHtml(qIdx);
        };

        window.answerWaterfallQuestion = (qIdx, optIdx) => {
            const q = quizState.questions[qIdx];
            if(q.showExplanation) return; 

            const isCorrect = optIdx === q.ans;
            q.selectedAns = optIdx;
            q.showExplanation = true;
            q.isCorrect = isCorrect;
            
            if (isCorrect) {
                playCorrectSound();
                confetti({ particleCount: 60, spread: 70, origin: { y: 0.7 }, zIndex: 10000, colors: ['#e11d48', '#f43f5e', '#fb7185', '#fda4af', '#fecdd3'] });
            } else {
                playWrongSound();
                const mistakeId = q.q; 
                if(!userData.mistakes) userData.mistakes = [];
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId, q: q.q, opts: q.opts, ans: q.ans, exps: q.exps, generalExp: q.generalExp, time: new Date().toISOString()
                    });
                    saveUserDataToCloud();
                }
            }
            saveQuizState();
            const block = document.getElementById(`q-block-${qIdx}`);
            if (block) block.innerHTML = generateSingleQuestionHtml(qIdx);
            updateQuizStats();
        };

        window.finishQuizWaterfall = async () => {
            let correctCount = 0; let answeredCount = 0;
            quizState.questions.forEach(q => {
                if (q.showExplanation && q.selectedAns !== -1) {
                    answeredCount++;
                    if (q.isCorrect) correctCount++;
                }
            });
            if (answeredCount < quizState.questions.length) {
                if(!confirm(`您還有 ${quizState.questions.length - answeredCount} 題尚未作答，確定要直接交卷結算嗎？未作答的題目將以錯誤計算。`)) return;
            }
            quizState.questions.forEach(q => {
                if (!q.showExplanation) {
                    q.showExplanation = true; q.isCorrect = false; q.selectedAns = -1;
                }
            });
            quizState.isFinished = true; quizState.correctCount = correctCount; quizState.answeredCount = answeredCount;
            const total = quizState.questions.length;
            const scorePercent = Math.round((correctCount / total) * 100);
            quizState.scorePercent = scorePercent;
            saveQuizState();
            
            if (!userData.quizHistory) userData.quizHistory = [];
            userData.quizHistory.push({ date: new Date().toLocaleString(), score: scorePercent, total: total, correct: correctCount });
            if (userData.quizHistory.length > 50) userData.quizHistory = userData.quizHistory.slice(-50);
            saveUserDataToCloud();

            renderQuizView(document.getElementById('main-content'));
            confetti({ particleCount: 300, spread: 100, origin: { y: 0.3 }, zIndex: 10000, colors: ['#e11d48', '#f43f5e', '#fb7185', '#fda4af', '#fecdd3'] });
            
            setTimeout(() => {
                const scrollContainer = document.getElementById('quiz-scroll-container');
                if (scrollContainer) scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
            }, 100);
        };

        window.clearQuizHistory = () => {
            if(confirm('警告：確定要清除目前的作答紀錄嗎？\n(此動作將會遺失目前所有測驗進度)')) {
                if(confirm('【第二次確認】真的要清除作答紀錄並放棄目前測驗嗎？\n按下「確定」將會清空並返回測驗首頁。')) {
                    quizState = { active: false, currentQ: 0, score: 0, answers: [], questions: [], showExplanation: false, selectedAns: null };
                    saveQuizState();
                    const navStats = document.getElementById('nav-quiz-stats');
                    if (navStats) { navStats.classList.add('hidden'); navStats.classList.remove('flex'); }
                    renderQuizView(document.getElementById('main-content'));
                }
            }
        };

        window.renderMistakes = (container) => {
            if(!container) container = document.getElementById('main-content');
            if(!userData.mistakes || userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 text-rose-400 flex-col text-center relative z-10 animate-fade-in">
                        <div class="w-40 h-40 bg-emerald-50 rounded-full flex items-center justify-center mb-8 shadow-inner border-4 border-emerald-200 text-7xl">🥳</div>
                        <h2 class="text-4xl md:text-5xl font-extrabold text-rose-950 mb-4">太棒了！✨</h2>
                        <p class="text-2xl md:text-3xl font-medium text-rose-800/60">目前沒有任何錯題紀錄 🎉</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-10 overflow-y-auto overflow-x-hidden pb-24 relative z-10">
                    <div class="w-full max-w-[96%] xl:max-w-[98%] mx-auto">
                        <div class="flex justify-between items-end border-b-4 border-rose-200 pb-5 mb-12">
                            <div>
                                <h2 class="text-4xl md:text-5xl font-extrabold text-rose-800 flex items-center"><span class="bg-rose-100 text-rose-600 w-14 h-14 flex items-center justify-center rounded-2xl mr-5 shadow-sm">🩹</span>錯題本 📚</h2>
                                <p class="text-rose-900/50 mt-3 ml-20 font-bold text-lg md:text-xl">收錄您在測驗中答錯的題目，溫故知新 🔄💡</p>
                            </div>
                            <button onclick="clearMistakes()" class="text-base md:text-xl text-rose-500 hover:text-rose-700 bg-white hover:bg-rose-50 px-5 py-3 rounded-xl border-2 border-rose-200 shadow-sm font-bold transition-all flex items-center shrink-0 mb-2"><span class="mr-2">🗑️</span>清空</button>
                        </div>
                        <div class="space-y-10 md:space-y-12 w-full">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-6 md:p-10 rounded-3xl shadow-lg border border-rose-100 w-full overflow-hidden relative group">
                                    <div class="absolute top-0 left-0 w-2 h-full bg-gradient-to-b from-rose-400 to-rose-600"></div>
                                    <h3 class="font-extrabold text-rose-950 mb-6 text-2xl md:text-3xl break-words leading-loose flex items-start text-left">
                                        <span class="text-rose-500 mr-3 text-2xl font-black bg-rose-50 px-3 py-1 rounded-xl">🤔 Q</span>${m.q}
                                    </h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-5 text-xl md:text-2xl w-full font-medium text-left">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-4 md:p-5 rounded-2xl break-words transition-all flex flex-col ${idx === m.ans ? 'bg-emerald-50 text-emerald-900 font-bold border-2 border-emerald-400 shadow-md ring-2 ring-emerald-400/20' : 'bg-slate-50 text-slate-600 border border-slate-200'}">
                                                <div class="flex items-start">
                                                    <span class="inline-block w-8 md:w-10 font-bold ${idx === m.ans ? 'text-emerald-600' : 'text-slate-400'}">${String.fromCharCode(65+idx)}.</span> 
                                                    <span class="flex-1">${opt}</span>
                                                    ${idx === m.ans ? '<span class="ml-2 text-emerald-500 text-2xl">✅</span>' : ''}
                                                </div>
                                                ${(m.exps && m.exps[idx]) ? `<div class="mt-3 p-3 rounded-xl text-base md:text-lg border ${idx === m.ans ? 'border-emerald-200 bg-emerald-100/50 text-emerald-800' : 'border-slate-200 bg-white text-slate-600'} leading-relaxed font-medium"><span class="font-bold mr-2 ${idx === m.ans ? 'text-emerald-700' : 'text-slate-500'}">${idx === m.ans ? '🎯 解析：' : '💡 解析：'}</span>${m.exps[idx]}</div>` : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                    ${m.generalExp ? `
                                    <div class="mt-5 p-4 md:p-5 bg-rose-50/80 border border-rose-200 rounded-2xl relative overflow-hidden animate-fade-in text-left shadow-sm">
                                        <div class="absolute left-0 top-0 bottom-0 w-2 bg-rose-400"></div>
                                        <p class="text-lg md:text-xl leading-loose break-words whitespace-pre-wrap pl-3 font-bold text-rose-900">${m.generalExp}</p>
                                    </div>` : ''}
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = () => {
            if(confirm('警告：確定要清空所有錯題紀錄嗎？\n(此動作無法復原)')) {
                if(confirm('【第二次確認】真的要徹底清空錯題本嗎？\n按下「確定」將會刪除所有錯題資料。')) {
                    userData.mistakes = []; saveUserDataToCloud(); renderMistakes();
                }
            }
        };

        window.renderFavorites = (container) => {
            if(!container) container = document.getElementById('main-content');
            if(!userData.favorites || userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 text-rose-400 flex-col text-center relative z-10 animate-fade-in">
                        <div class="w-40 h-40 bg-rose-50 rounded-full flex items-center justify-center mb-8 shadow-inner border-4 border-rose-100 text-7xl">💔</div>
                        <h2 class="text-4xl md:text-5xl font-extrabold text-rose-950 mb-4">暫無收藏</h2>
                        <p class="text-2xl md:text-3xl font-medium text-rose-800/60 mb-10">在測驗中點擊愛心圖示即可收藏題目！ 📌✨</p>
                        <button onclick="switchTab('quiz')" class="bg-white border-4 border-rose-200 text-rose-600 hover:bg-rose-50 font-bold px-10 py-4 text-xl rounded-full shadow-md transition-colors">🚀 前往測驗</button>
                    </div>`;
                return;
            }

            const allQList = generate50Questions();
            const favQuestions = userData.favorites.map(favText => {
                return allQList.find(q => q.q === favText) || { q: favText, opts: [], ans: 0, exps: [], generalExp: '題目資料已遺失' };
            });

            container.innerHTML = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-10 overflow-y-auto overflow-x-hidden pb-24 relative z-10">
                    <div class="w-full max-w-[96%] xl:max-w-[98%] mx-auto">
                        <div class="flex items-end border-b-4 border-rose-200 pb-5 mb-12">
                            <h2 class="text-4xl md:text-5xl font-extrabold text-rose-800 flex items-center"><span class="bg-rose-100 text-rose-600 w-14 h-14 flex items-center justify-center rounded-2xl mr-5 shadow-sm">💖</span>我的最愛 🌟</h2>
                            <p class="text-rose-900/50 mt-3 ml-8 font-bold text-lg md:text-xl hidden sm:block mb-1">您專屬的重點筆記收藏夾 🎒✨</p>
                        </div>
                        <div class="space-y-10 md:space-y-12 w-full">
                            ${favQuestions.map((qObj, i) => {
                                if (qObj.opts.length === 0) return '';
                                return `
                                <div class="bg-white p-6 md:p-10 rounded-3xl shadow-lg border border-rose-100 w-full overflow-hidden relative group">
                                    <div class="absolute top-0 left-0 w-2 h-full bg-gradient-to-b from-rose-400 to-rose-600"></div>
                                    <div class="flex justify-between items-start mb-6">
                                        <h3 class="font-extrabold text-rose-950 text-2xl md:text-3xl break-words leading-loose flex items-start pr-6 flex-1 text-left">
                                            <span class="text-rose-500 mr-3 text-2xl font-black bg-rose-50 px-3 py-1 rounded-xl">📌 Q</span>${qObj.q}
                                        </h3>
                                        <button onclick="toggleFavoritePage('${qObj.q}')" class="text-[2rem] md:text-3xl hover:scale-110 transition-transform shrink-0 mt-1 focus:outline-none drop-shadow-sm" title="移除最愛">
                                            <i class="fa-solid fa-heart text-rose-500"></i>
                                        </button>
                                    </div>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-5 text-xl md:text-2xl w-full font-medium text-left">
                                        ${qObj.opts.map((opt, idx) => `
                                            <div class="p-4 md:p-5 rounded-2xl break-words transition-all flex flex-col ${idx === qObj.ans ? 'bg-emerald-50 text-emerald-900 font-bold border-2 border-emerald-400 shadow-md ring-2 ring-emerald-400/20' : 'bg-slate-50 text-slate-600 border border-slate-200'}">
                                                <div class="flex items-start">
                                                    <span class="inline-block w-8 md:w-10 font-bold ${idx === qObj.ans ? 'text-emerald-600' : 'text-slate-400'}">${String.fromCharCode(65+idx)}.</span> 
                                                    <span class="flex-1">${opt}</span>
                                                    ${idx === qObj.ans ? '<span class="ml-2 text-emerald-500 text-2xl">✅</span>' : ''}
                                                </div>
                                                ${(qObj.exps && qObj.exps[idx]) ? `<div class="mt-3 p-3 rounded-xl text-base md:text-lg border ${idx === qObj.ans ? 'border-emerald-200 bg-emerald-100/50 text-emerald-800' : 'border-slate-200 bg-white text-slate-600'} leading-relaxed font-medium"><span class="font-bold mr-2 ${idx === qObj.ans ? 'text-emerald-700' : 'text-slate-500'}">${idx === qObj.ans ? '🎯 解析：' : '💡 解析：'}</span>${qObj.exps[idx]}</div>` : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                    ${qObj.generalExp ? `
                                    <div class="mt-5 p-4 md:p-5 bg-rose-50/80 border border-rose-200 rounded-2xl relative overflow-hidden animate-fade-in text-left shadow-sm">
                                        <div class="absolute left-0 top-0 bottom-0 w-2 bg-rose-400"></div>
                                        <p class="text-lg md:text-xl leading-loose break-words whitespace-pre-wrap pl-3 font-bold text-rose-900">${qObj.generalExp}</p>
                                    </div>` : ''}
                                </div>
                                `;
                            }).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.toggleFavoritePage = (qText) => {
            if (!userData.favorites) return;
            const idx = userData.favorites.indexOf(qText);
            if (idx > -1) {
                if(confirm('確定要從最愛中移除此題嗎？')) {
                    userData.favorites.splice(idx, 1);
                    saveUserDataToCloud();
                    renderFavorites();
                }
            }
        };

        window.renderHistory = (container) => {
            if(!container) container = document.getElementById('main-content');
            if((!userData.quizHistory || userData.quizHistory.length === 0) && (!userData.loginHistory || userData.loginHistory.length === 0)) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 text-rose-400 flex-col text-center relative z-10 animate-fade-in">
                        <div class="w-40 h-40 bg-slate-50 rounded-full flex items-center justify-center mb-8 shadow-inner border-4 border-slate-200 text-7xl">📜</div>
                        <h2 class="text-4xl md:text-5xl font-extrabold text-rose-950 mb-4">暫無紀錄</h2>
                        <p class="text-2xl md:text-3xl font-medium text-rose-800/60 mb-10">您還沒有完成任何測驗或留下足跡喔！</p>
                        <button onclick="switchTab('quiz')" class="bg-white border-4 border-rose-200 text-rose-600 hover:bg-rose-50 font-bold px-10 py-4 text-xl rounded-full shadow-md transition-colors">🚀 前往測驗</button>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-10 overflow-y-auto overflow-x-hidden pb-24 relative z-10">
                    <div class="w-full max-w-[96%] xl:max-w-[98%] mx-auto">
                        <div class="flex justify-between items-end border-b-4 border-amber-300 pb-5 mb-12">
                            <div>
                                <h2 class="text-4xl md:text-5xl font-extrabold text-amber-800 flex items-center"><span class="bg-amber-100 text-amber-600 w-14 h-14 flex items-center justify-center rounded-2xl mr-5 shadow-sm">📜</span>作答與登入紀錄</h2>
                                <p class="text-amber-900/60 mt-3 ml-20 font-bold text-lg md:text-xl">追蹤您的學習軌跡，跨裝置同步更新 ☁️</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                            <!-- 作答紀錄 -->
                            <div class="bg-white rounded-3xl shadow-xl border border-amber-100 overflow-hidden">
                                <div class="bg-amber-50 p-6 border-b border-amber-200">
                                    <h3 class="text-3xl font-bold text-amber-900 flex items-center"><span class="mr-3 text-3xl">🎯</span>最近作答成績</h3>
                                </div>
                                <div class="p-6 md:p-8 space-y-5 max-h-[60vh] overflow-y-auto">
                                    ${(userData.quizHistory || []).slice().reverse().map((h, i) => `
                                        <div class="flex justify-between items-center p-5 rounded-2xl border-2 border-slate-100 ${h.score >= 80 ? 'bg-emerald-50/50 border-emerald-100' : (h.score < 60 ? 'bg-rose-50/50 border-rose-100' : 'bg-slate-50')} transition-all hover:shadow-md">
                                            <div>
                                                <div class="font-bold text-slate-800 text-xl md:text-2xl">${h.date}</div>
                                                <div class="text-lg text-slate-500 mt-2 font-medium">共 ${h.total} 題，答對 <span class="font-bold text-slate-700">${h.correct}</span> 題</div>
                                            </div>
                                            <div class="text-5xl font-black ${h.score >= 80 ? 'text-emerald-600' : (h.score < 60 ? 'text-rose-500' : 'text-amber-500')}">${h.score}<span class="text-2xl ml-1 font-bold">分</span></div>
                                        </div>
                                    `).join('') || '<p class="text-xl text-slate-400 text-center py-10 font-bold">目前還沒有測驗紀錄喔</p>'}
                                </div>
                            </div>

                            <!-- 登入紀錄 -->
                            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden h-fit">
                                <div class="bg-slate-50 p-6 border-b border-slate-200">
                                    <h3 class="text-3xl font-bold text-slate-800 flex items-center"><span class="mr-3 text-3xl">👣</span>最近登入足跡</h3>
                                </div>
                                <div class="p-6 md:p-8 space-y-4 max-h-[40vh] overflow-y-auto">
                                    ${(userData.loginHistory || []).slice().reverse().map((time, i) => `
                                        <div class="flex items-center p-4 rounded-xl border border-slate-100 bg-slate-50/50 hover:bg-slate-100 transition-colors">
                                            <span class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 mr-4 text-lg font-bold shadow-inner">${i+1}</span>
                                            <span class="font-bold text-slate-700 text-xl">${new Date(time).toLocaleString()}</span>
                                        </div>
                                    `).join('') || '<p class="text-xl text-slate-400 text-center py-10 font-bold">無登入紀錄</p>'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        initApp();

    </script>
</body>
</html>
