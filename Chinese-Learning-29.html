            try {

                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        };

            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'recent_users', COLLECTION_NAME);
                await setDoc(ref, { users: arrayUnion(name) }, { merge: true });
                if (!recentUsers.includes(name)) recentUsers.push(name);
            } catch(e) {}

                                <div class="ml-2 sm:ml-4 flex items-center pl-3 sm:pl-5 border-l border-white/20 shrink-0 whitespace-nowrap">
                                    <span class="text-sm sm:text-base font-bold mr-3 bg-white/10 px-3 py-1.5 rounded-lg text-white"><span class="mr-2">👤</span>${username}</span>

            `;

        window.logout = () => {

            userData = { favorites: [], mistakes: [] };

        window.switchTab = (tab) => {

            ['learn', 'quiz', 'mistakes', 'favorites'].forEach(t => {
                const btn = el(`nav-${t}`);

                        btn.classList.add('bg-white/20', 'text-white', 'shadow-sm');
                        btn.classList.remove('text-white/70', 'hover:bg-white/10');
                    } else {
                        btn.classList.remove('bg-white/20', 'text-white', 'shadow-sm');
                        btn.classList.add('text-white/70', 'hover:bg-white/10');
                    }
                }
            });

            const navStats = el('nav-quiz-stats');
            if (navStats) {
                if (tab === 'quiz' && quizState.active) {
                    navStats.classList.remove('hidden');
                    navStats.classList.add('flex');

                } else {
                    navStats.classList.add('hidden');

        const renderLearnView = (container) => {

            const themeColors = {
                'orange': 'text-orange-900 bg-orange-50 border-orange-200',

                    <button onclick="toggleLearnMenu(true)" class="text-orange-800 hover:text-red-600 focus:outline-none flex items-center px-4 py-2 bg-white/80 rounded-xl border border-white shadow-sm mr-4 transition-all hover:shadow">
                        <i class="fas fa-bars text-xl md:mr-3"></i>

                <div id="learn-overlay" onclick="toggleLearnMenu(false)" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-30 hidden transition-opacity duration-300"></div>
                <div id="learn-drawer" class="fixed inset-y-0 left-0 w-[24rem] max-w-[85vw] bg-white border-r border-orange-100 z-40 transform -translate-x-full transition-transform duration-300 ease-in-out overflow-y-auto shadow-2xl flex flex-col">
                    <div class="p-6 bg-orange-50 flex justify-between items-center border-b border-orange-100 shrink-0">
                        <span class="font-extrabold text-2xl text-orange-900">📑 學習目錄 🗺️</span>
                        <button onclick="toggleLearnMenu(false)" class="text-orange-400 hover:text-red-500 transition-colors bg-white w-10 h-10 rounded-full flex items-center justify-center shadow-sm border border-orange-100"><i class="fas fa-times text-xl"></i></button>
                        </div>
                    <ul class="py-4 flex-1 px-3 space-y-1">
                        ${learnData.map(d => {

                            const themeConfig = {
                                'orange': isSelected ? 'bg-orange-50 text-orange-900 border-orange-500' : 'hover:bg-orange-50/50',
                                'amber': isSelected ? 'bg-amber-50 text-amber-900 border-amber-500' : 'hover:bg-amber-50/50',
                                'rose': isSelected ? 'bg-rose-50 text-rose-900 border-rose-500' : 'hover:bg-rose-50/50',
                            };
                            const defaultClass = isSelected ? 'bg-orange-50 text-orange-900 border-orange-500 shadow-sm' : 'text-slate-600 border-transparent hover:bg-orange-50';
                            const activeClass = d.theme ? themeConfig[d.theme] : defaultClass;
                            return `
                            <li>
                                <button onclick="selectLearnTab('${d.id}')" id="ltab-${d.id}" class="w-full text-left px-5 py-4 text-lg md:text-xl font-bold rounded-xl transition-all border-l-4 ${isSelected ? activeClass + ' shadow-sm' : 'text-slate-600 border-transparent hover:bg-orange-50 hover:pl-6 hover:text-orange-800'}">
                                    ${d.title}
                                </button>
                            </li>
                        `}).join('')}
                    </ul>
                </div>
                <div class="flex-1 p-4 md:p-6 lg:p-10 overflow-y-auto overflow-x-hidden w-full relative z-10" id="learn-content-area"></div>
            `;
            renderLearnContent();
        };

        window.selectLearnTab = (id) => {
            learnSubTab = id;
            renderLearnView(el('main-content')); 
            toggleLearnMenu(false);
        };

        window.renderLearnContent = () => {
            const area = el('learn-content-area');
            if(!area) return;
            const data = learnData.find(d => d.id === learnSubTab);
            area.innerHTML = `
                <div class="max-w-5xl mx-auto w-full animate-fade-in pb-12">
                    ${data.content}
                </div>
            `;
            setTimeout(() => {
                document.querySelectorAll('.fav-btn').forEach(btn => {
                    const id = btn.getAttribute('data-id');
                    if(userData.favorites.includes(id)) {
                        btn.classList.remove('text-gray-300', 'text-white/50');
                        btn.classList.add('text-rose-500');
                        btn.innerHTML = '❤️';
                    }
                });
            }, 0);
        };

        const renderQuizView = (container) => {
            if(!quizState.active) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 overflow-y-auto relative z-10">
                        <div class="glass-card p-8 md:p-12 rounded-3xl shadow-2xl text-center max-w-3xl w-full border border-white/60 relative overflow-hidden">
                            <div class="absolute top-0 right-0 w-40 h-40 bg-orange-100 rounded-bl-full -z-10 opacity-50"></div>
                            
                            <div class="w-24 h-24 bg-gradient-to-br from-orange-500 to-red-600 rounded-full mx-auto mb-8 flex items-center justify-center shadow-lg">
                                <span class="text-5xl text-white">🧠</span>
                            </div>
                            
                            <h2 class="text-3xl md:text-4xl font-extrabold mb-6 text-orange-950 tracking-wide">50題 綜合挑戰測驗 🏆</h2>
                            <p class="text-orange-800/80 mb-10 text-lg md:text-xl leading-loose">
                                題目涵蓋講義所有應用文分類，驗收您的精熟度！<br>
                                <span class="bg-orange-100 text-orange-800 font-bold px-4 py-1.5 rounded-full inline-block mt-4 border border-orange-200 shadow-sm">🌊 瀑布流模式</span><br>
                                <span class="text-base text-orange-700/60 mt-2 block">點擊選項後立即顯示解析，無須換頁，快速複習最有效率！ ✨</span>
                            </p>
                            <button onclick="startQuiz()" class="w-full sm:w-auto bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-700 hover:to-red-700 text-white font-bold py-4 px-16 text-xl md:text-2xl rounded-2xl shadow-xl transition-all transform hover:-translate-y-1 hover:shadow-2xl">
                                開始挑戰 🚀🔥
                            </button>
                        </div>
                    </div>
                `;
            } else {
                renderQuizWaterfall(container);
            }
        };

        window.startQuiz = () => {
            const qList = [...generate120Questions()].sort(() => 0.5 - Math.random()).map(q => ({
                ...q,
                selectedAns: null,
                showExplanation: false,
                isCorrect: false
            }));
            quizState = { active: true, questions: qList };
            saveQuizState();
            renderQuizView(el('main-content'));
            
            const navStats = el('nav-quiz-stats');
            if (navStats) {
                navStats.classList.remove('hidden');
                navStats.classList.add('flex');
            }
            updateQuizStats();
        };

        window.updateQuizStats = () => {
            if (!quizState.active) return;
            let correct = 0; let incorrect = 0; let answered = 0;
            const total = quizState.questions.length;
            quizState.questions.forEach(q => {
                if (q.showExplanation) {
                    answered++;
                    if (q.isCorrect) correct++; else incorrect++;
                }
            });
            const progressPercent = (answered / total) * 100;
            const elCorrect = document.getElementById('nav-stat-correct');
            const elIncorrect = document.getElementById('nav-stat-incorrect');
            const elBar = document.getElementById('nav-stat-progress-bar');
            if (elCorrect) elCorrect.innerText = correct;
            if (elIncorrect) elIncorrect.innerText = incorrect;
            if (elBar) elBar.style.width = progressPercent + '%';
        };

        const renderQuizWaterfall = (container) => {
            const total = quizState.questions.length;
            let html = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-8 overflow-y-auto overflow-x-hidden pb-24 scrollbar-hide relative z-10" id="quiz-scroll-container">
                    <div class="max-w-4xl mx-auto relative w-full">
                        <div class="glass-card flex justify-between items-center rounded-2xl p-4 md:p-5 shadow-sm border border-white/60 mb-8 sticky top-0 z-50 backdrop-blur-xl">
                            <h2 class="text-xl md:text-2xl font-extrabold text-orange-900 flex items-center"><span class="mr-3 text-orange-600 bg-orange-100 p-2 rounded-lg">📝</span>測驗進行中 ⏳</h2>
                            <button onclick="clearQuizHistory()" class="text-sm md:text-base text-rose-500 hover:text-rose-700 hover:bg-rose-50 px-3 py-1.5 rounded-lg font-bold transition-colors flex items-center border border-transparent hover:border-rose-200"><span class="mr-1.5">🚪</span>放棄作答</button>
                        </div>
                        <div id="questions-list" class="space-y-8 w-full">
            `;
            quizState.questions.forEach((_, qIdx) => {
                html += `<div id="q-block-${qIdx}" class="bg-white rounded-3xl shadow-lg overflow-hidden border border-orange-100 transition-all w-full">${generateSingleQuestionHtml(qIdx)}</div>`;
            });
            html += `
                        </div>
                        <button onclick="finishQuizWaterfall()" class="w-full mt-12 bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-extrabold py-5 md:py-6 text-xl md:text-3xl rounded-2xl shadow-xl transition-all transform hover:-translate-y-1 hover:shadow-2xl flex items-center justify-center break-words border-b-4 border-red-700">
                            🏁 完成測驗並結算成績 📊
                        </button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        };

        const generateSingleQuestionHtml = (qIdx) => {
            const q = quizState.questions[qIdx];
            let optionsHtml = '';
            
            q.opts.forEach((opt, i) => {
                let btnClass = "w-full text-left p-4 md:p-5 text-lg md:text-xl rounded-2xl border-2 transition-all duration-200 flex items-center group relative overflow-hidden ";
                let iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center mr-4 font-extrabold text-lg md:text-xl transition-colors shrink-0 shadow-inner group-hover:bg-orange-100 group-hover:text-orange-700">${String.fromCharCode(65+i)}</span>`;
                
                if (!q.showExplanation) {
                    btnClass += "border-orange-100 hover:border-orange-400 hover:bg-orange-50/50 bg-white cursor-pointer hover:shadow-md";
                } else {
                    if (i === q.ans) {
                        btnClass += "border-emerald-400 bg-emerald-50 text-emerald-900 font-bold shadow-md z-10 ring-2 ring-emerald-400/20";
                        iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-emerald-500 text-white flex items-center justify-center mr-4 font-bold text-xl md:text-2xl shrink-0 shadow-sm">✅</span>`;
                    } else if (i === q.selectedAns) {
                        btnClass += "border-rose-400 bg-rose-50 text-rose-900 font-bold";
                        iconHtml = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-rose-500 text-white flex items-center justify-center mr-4 font-bold text-xl md:text-2xl shrink-0 shadow-sm">❌</span>`;
                    } else {
                        btnClass += "border-slate-100 bg-slate-50 opacity-50 cursor-not-allowed";
                    }
                }

                optionsHtml += `
                    <button ${q.showExplanation ? 'disabled' : `onclick="answerWaterfallQuestion(${qIdx}, ${i})"`} class="${btnClass}">
                        ${iconHtml}
                        <span class="flex-1 leading-relaxed break-words z-10 text-slate-800 group-hover:text-orange-950">${opt}</span>
                    </button>
                `;
            });

            let explanationHtml = '';
            if (q.showExplanation) {
                const isCorrect = q.selectedAns === q.ans;
                explanationHtml = `
                    <div class="mt-8 p-5 md:p-8 rounded-2xl border ${isCorrect ? 'bg-emerald-50/50 border-emerald-200' : 'bg-rose-50/50 border-rose-200'} animate-fade-in w-full">
                        <div class="flex items-center mb-5 border-b ${isCorrect ? 'border-emerald-200/50' : 'border-rose-200/50'} pb-4">
                            <div class="w-12 h-12 rounded-full ${isCorrect ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'} flex items-center justify-center mr-4 shrink-0 text-3xl">
                                ${isCorrect ? '🎉' : '😲'}
                            </div>
                            <span class="font-extrabold text-2xl md:text-3xl ${isCorrect ? 'text-emerald-800' : 'text-rose-800'}">${isCorrect ? '太棒了，答對了！' : '哎呀，答錯了！'}</span>
                        </div>
                        <div class="w-full">
                            <p class="font-bold mb-3 text-lg md:text-xl text-slate-700 flex items-center"><span class="mr-2">🔍</span>完整題目解析</p>
                            <p class="mt-2 text-lg md:text-xl break-words text-slate-700 bg-white p-4 rounded-xl border border-orange-100 shadow-sm">正確答案為 <strong class="${isCorrect ? 'text-emerald-600' : 'text-rose-600'} text-xl md:text-2xl ml-2">(${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</strong></p>
                            <div class="mt-4 p-5 md:p-6 bg-orange-50/50 border border-orange-200/60 rounded-xl text-orange-950 w-full relative overflow-hidden">
                                <div class="absolute left-0 top-0 bottom-0 w-1 bg-orange-400"></div>
                                <p class="font-bold text-lg md:text-xl mb-2 flex items-center"><span class="mr-2 text-xl">💡</span>深度解析</p>
                                <p class="text-lg md:text-xl leading-loose break-words whitespace-pre-wrap pl-1">${q.exp}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="px-5 md:px-8 py-4 border-b border-orange-100 flex justify-between items-center transition-colors ${q.showExplanation ? (q.selectedAns === q.ans ? 'bg-gradient-to-r from-emerald-50 to-white' : 'bg-gradient-to-r from-rose-50 to-white') : 'bg-orange-50/30'}">
                    <span class="font-extrabold text-orange-400 text-lg md:text-xl bg-white px-3 py-1 rounded-lg border border-orange-100 shadow-sm">🤔 Q ${qIdx + 1}</span>
                    ${q.showExplanation 
                        ? (q.selectedAns === q.ans 
                            ? '<span class="text-emerald-600 font-bold text-lg md:text-xl flex items-center bg-emerald-100 px-3 py-1 rounded-full"><span class="mr-1.5">✅</span>答對</span>' 
                            : '<span class="text-rose-600 font-bold text-lg md:text-xl flex items-center bg-rose-100 px-3 py-1 rounded-full"><span class="mr-1.5">❌</span>答錯</span>') 
                        : '<span class="text-orange-400 font-bold text-sm md:text-base flex items-center bg-orange-100/50 px-3 py-1 rounded-full"><span class="mr-1.5">✍️</span>作答區</span>'}
                </div>
                <div class="p-5 md:p-8 w-full overflow-hidden">
                    <h3 class="text-xl md:text-2xl font-extrabold text-slate-800 mb-8 leading-loose break-words">${q.q}</h3>
                    <div class="space-y-4 w-full">
                        ${optionsHtml}
                    </div>
                    ${explanationHtml}
                </div>
            `;
        };

        window.answerWaterfallQuestion = (qIdx, optIdx) => {
            const q = quizState.questions[qIdx];
            if(q.showExplanation) return; 

            const isCorrect = optIdx === q.ans;
            
            q.selectedAns = optIdx;
            q.showExplanation = true;
            q.isCorrect = isCorrect;
            
            if (isCorrect) {
                playCorrectSound();
                confetti({ particleCount: 60, spread: 70, origin: { y: 0.7 }, zIndex: 10000, colors: ['#f59e0b', '#fbbf24', '#fcd34d', '#ef4444', '#f97316'] });
            } else {
                playWrongSound();
                const mistakeId = q.q; 
                const exists = userData.mistakes.find(m => m.id === mistakeId);
                if(!exists) {
                    userData.mistakes.push({
                        id: mistakeId, q: q.q, opts: q.opts, ans: q.ans, time: new Date().toISOString()
                    });
                    saveUserData();
                }
            }
            saveQuizState();
            const block = document.getElementById(`q-block-${qIdx}`);
            if (block) {
                block.innerHTML = generateSingleQuestionHtml(qIdx);
            }
            updateQuizStats();
        };

        window.finishQuizWaterfall = async () => {
            let correctCount = 0;
            let answeredCount = 0;
            quizState.questions.forEach(q => {
                if (q.showExplanation) {
                    answeredCount++;
                    if (q.isCorrect) correctCount++;
                }
            });

            if (answeredCount < quizState.questions.length) {
                if(!confirm(`您還有 ${quizState.questions.length - answeredCount} 題尚未作答，確定要直接交卷結算嗎？`)) {
                    return;
                }
            }

            quizState.active = false;
            saveQuizState();
            
            const total = quizState.questions.length;
            const scorePercent = Math.round((correctCount / total) * 100);
            
            const navStats = el('nav-quiz-stats');
            if (navStats) {
                navStats.classList.add('hidden');
                navStats.classList.remove('flex');
            }

            if(isFirebaseInitialized && currentUser) {
                const docRef = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, COLLECTION_NAME + '_quizzes'));
                try {
                    await setDoc(docRef, { score: scorePercent, date: new Date(), total, correct: correctCount });
                } catch(e) { console.error("Save Quiz Error", e); }
            }

            const container = el('main-content');
            container.innerHTML = `
                <div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 overflow-y-auto pb-24 relative z-10">
                    <div class="glass-card p-8 md:p-12 rounded-3xl shadow-2xl text-center max-w-3xl w-full border border-white/60 relative overflow-hidden">
                        <div class="absolute -top-20 -left-20 w-48 h-48 bg-amber-100 rounded-full mix-blend-multiply filter blur-2xl opacity-70 -z-10"></div>
                        
                        <div class="w-28 h-28 bg-gradient-to-br from-amber-300 to-orange-500 rounded-full mx-auto mb-6 flex items-center justify-center shadow-xl border-4 border-white text-6xl">
                            🏆
                        </div>
                        
                        <h2 class="text-3xl md:text-4xl font-extrabold mb-4 text-orange-950">🎉 測驗完成！ 🎊</h2>
                        <div class="my-8 relative inline-block">
                            <span class="text-8xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-600 drop-shadow-sm">${scorePercent}</span>
                            <span class="text-2xl md:text-3xl text-orange-600 font-bold absolute bottom-2 -right-10">分</span>
                        </div>
                        <div class="bg-orange-50/80 rounded-2xl p-6 mb-8 border border-orange-100 shadow-inner inline-block">
                            <p class="text-orange-900 text-xl md:text-2xl font-medium">答對 🎯 <span class="text-rose-600 font-black text-2xl mx-1">${correctCount}</span> 題 / 共作答 📝 ${answeredCount} 題</p>
                            <p class="text-sm md:text-base mt-2 text-orange-700/60 font-bold tracking-widest">(總題數 ${total} 題)</p>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-4 w-full">
                            <button onclick="switchTab('mistakes')" class="flex-1 bg-white border-2 border-orange-200 hover:border-orange-300 hover:bg-orange-50 text-orange-700 font-extrabold py-4 px-6 text-xl rounded-2xl shadow-sm hover:shadow-md transition-all">
                                🩹 查看錯題
                            </button>
                            <button onclick="startQuiz()" class="flex-1 bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 text-white font-extrabold py-4 px-6 text-xl rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 border-b-4 border-red-800">
                                🔄 重新挑戰
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            confetti({ particleCount: 300, spread: 100, origin: { y: 0.3 }, zIndex: 10000, colors: ['#f59e0b', '#fbbf24', '#fcd34d', '#ef4444', '#f97316'] });
        };

        window.clearQuizHistory = () => {
            if(confirm('警告：確定要清除目前的作答紀錄嗎？\n(此動作將會遺失目前所有測驗進度)')) {
                if(confirm('【第二次確認】真的要清除作答紀錄並放棄目前測驗嗎？\n按下「確定」將會清空並返回測驗首頁。')) {
                    quizState = { active: false, currentQ: 0, score: 0, answers: [], questions: [], showExplanation: false, selectedAns: null };
                    saveQuizState();
                    const navStats = el('nav-quiz-stats');
                    if (navStats) {
                        navStats.classList.add('hidden');
                        navStats.classList.remove('flex');
                    }
                    renderQuizView(el('main-content'));
                }
            }
        };

        window.renderMistakes = (container) => {
            if(!container) container = el('main-content');
            if(userData.mistakes.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 text-orange-400 flex-col text-center relative z-10 animate-fade-in">
                        <div class="w-32 h-32 bg-emerald-50 rounded-full flex items-center justify-center mb-6 shadow-inner border-2 border-emerald-200 text-6xl">🥳</div>
                        <h2 class="text-3xl md:text-4xl font-extrabold text-orange-950 mb-2">太棒了！✨</h2>
                        <p class="text-xl md:text-2xl font-medium text-orange-800/60">目前沒有任何錯題紀錄 🎉</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-10 overflow-y-auto overflow-x-hidden pb-24 relative z-10">
                    <div class="max-w-5xl mx-auto w-full">
                        <div class="flex justify-between items-end border-b-4 border-rose-200 pb-4 mb-10">
                            <div>
                                <h2 class="text-3xl md:text-4xl font-extrabold text-rose-800 flex items-center"><span class="bg-rose-100 text-rose-600 w-12 h-12 flex items-center justify-center rounded-xl mr-4">🩹</span>錯題本 📚</h2>
                                <p class="text-rose-900/50 mt-2 ml-16 font-medium">收錄您在測驗中答錯的題目，溫故知新 🔄💡</p>
                            </div>
                            <button onclick="clearMistakes()" class="text-sm md:text-base text-rose-500 hover:text-rose-700 bg-white hover:bg-rose-50 px-4 py-2 rounded-lg border border-rose-200 shadow-sm font-bold transition-all flex items-center shrink-0 mb-2"><span class="mr-2">🗑️</span>清空</button>
                        </div>
                        <div class="space-y-8 md:space-y-10 w-full">
                            ${userData.mistakes.map((m, i) => `
                                <div class="bg-white p-6 md:p-10 rounded-3xl shadow-lg border border-orange-100 w-full overflow-hidden relative group">
                                    <div class="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-rose-400 to-orange-400"></div>
                                    <h3 class="font-extrabold text-orange-950 mb-8 text-xl md:text-2xl break-words leading-loose flex items-start">
                                        <span class="text-rose-500 mr-3 text-2xl font-black bg-rose-50 px-2 rounded-lg">🤔 Q</span>${m.q}
                                    </h3>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-5 text-lg md:text-xl w-full">
                                        ${m.opts.map((opt, idx) => `
                                            <div class="p-4 md:p-5 rounded-2xl break-words transition-all ${idx === m.ans ? 'bg-emerald-50 text-emerald-900 font-bold border-2 border-emerald-400 shadow-md ring-2 ring-emerald-400/20' : 'bg-orange-50 text-slate-600 border border-orange-100'}">
                                                <span class="inline-block w-8 font-bold ${idx === m.ans ? 'text-emerald-600' : 'text-orange-400'}">${String.fromCharCode(65+idx)}.</span> ${opt}
                                                ${idx === m.ans ? '<span class="float-right text-emerald-500">✅</span>' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        window.clearMistakes = () => {
            if(confirm('警告：確定要清空所有錯題紀錄嗎？\n(此動作無法復原)')) {
                if(confirm('【第二次確認】真的要徹底清空錯題本嗎？\n按下「確定」將會刪除所有錯題資料。')) {
                    userData.mistakes = [];
                    saveUserData();
                    renderMistakes();
                }
            }
        };

        window.renderFavorites = (container) => {
            if(!container) container = el('main-content');
            if(userData.favorites.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex-1 flex items-center justify-center p-4 md:p-6 text-orange-400 flex-col text-center relative z-10 animate-fade-in">
                        <div class="w-32 h-32 bg-rose-50 rounded-full flex items-center justify-center mb-6 shadow-inner border-2 border-rose-100 text-6xl">💔</div>
                        <h2 class="text-3xl md:text-4xl font-extrabold text-orange-950 mb-2">暫無收藏</h2>
                        <p class="text-xl md:text-2xl font-medium text-orange-800/60 mb-8">到「學習區」點擊愛心圖示即可收藏！ 📌✨</p>
                        <button onclick="switchTab('learn')" class="bg-white border-2 border-rose-200 text-rose-600 hover:bg-rose-50 font-bold px-8 py-3 rounded-full shadow-sm transition-colors">🏃‍♂️💨 前往學習區</button>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-10 overflow-y-auto overflow-x-hidden pb-24 relative z-10">
                    <div class="max-w-6xl mx-auto w-full">
                        <div class="flex items-end border-b-4 border-rose-200 pb-4 mb-10">
                            <h2 class="text-3xl md:text-4xl font-extrabold text-rose-800 flex items-center"><span class="bg-rose-100 text-rose-600 w-12 h-12 flex items-center justify-center rounded-xl mr-4 shadow-sm">💖</span>我的最愛 🌟</h2>
                            <p class="text-rose-900/50 mt-2 ml-6 font-medium hidden sm:block mb-1">您專屬的重點筆記收藏夾 🎒✨</p>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 md:gap-8 w-full">
                            ${userData.favorites.map(favId => `
                                <div class="bg-white p-6 md:p-8 rounded-3xl shadow-md border border-rose-100 flex flex-col justify-between group relative overflow-hidden transition-all duration-300 hover:shadow-xl hover:-translate-y-2 w-full h-full min-h-[160px]">
                                    <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-gradient-to-tl from-rose-100 to-orange-50 rounded-full opacity-50 group-hover:scale-150 transition-transform duration-500 ease-out"></div>
                                    <span class="font-bold text-orange-950 z-10 text-xl md:text-2xl break-words flex-1 leading-relaxed mb-4">${favId}</span>
                                    <div class="flex justify-end mt-auto z-10">
                                        <button onclick="toggleFavorite('${favId}')" class="bg-rose-50 hover:bg-rose-500 text-rose-500 hover:text-white w-12 h-12 rounded-full flex items-center justify-center text-xl transition-colors shadow-sm">❤️</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        };

        initApp();

    </script>
</body>
</html>
