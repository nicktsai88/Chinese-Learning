            addQ("昨日住家遭竊賊闖入，許多珍貴的物品____。", ["不脛而走", "不翼而飛", "不以為意", "不言可喻"], 1, ["消息傳播快。","正確。沒有翅膀卻飛走了，比喻物品無故遺失。","不在乎。","不需言語就明白。"]);
            addQ("這位作家的作品一經報紙刊載，文名立刻____。", ["不翼而飛", "不脛而走", "不以為然", "所向披靡"], 1, ["物品遺失。","正確。不用推廣，名聲迅速傳播。","不同意。","軍隊潰退敵人。"]);
            addQ("下列情境，何者最適合使用「不翼而飛」？", ["好消息傳遍大街小巷", "放在桌上的錢包突然不見了", "他的書法技巧很高超", "形容這件事情不用解釋大家就懂"], 1, ["不脛而走。","正確。物品無故遺失。","巧奪天工或鬼斧神工（視情況）。","不言可喻。"]);

            // 7. 孺慕之情 / 舐犢情深
            addQ("「父親守護著重病的女兒，____的模樣令人感動。」", ["孺慕之情", "舐犢情深", "手足情深", "情同手足"], 1, ["小孩愛慕父母。","正確。老牛舔小牛，比喻父母疼愛子女之深情。","兄弟姊妹。","朋友像兄弟。"]);
            addQ("「孺慕之情」是用來形容：", ["父母對子女的愛", "子女對父母的愛慕", "兄弟姊妹之間的感情", "朋友之間的深厚情誼"], 1, ["舐犢情深。","正確。小兒愛慕父母之情。","手足情深。","情同手足。"]);
            addQ("小妹妹依偎在母親的懷裡撒嬌，____表露無遺。", ["舐犢情深", "手足情深", "孺慕之情", "冰雪聰明"], 2, ["父母愛子女。","親兄弟間。","正確。小孩愛慕父母。","聰明。"]);
            addQ("下列哪一個成語與「父母疼愛子女」相關？", ["孺慕之情", "舐犢情深", "望風披靡", "重作馮婦"], 1, ["小孩愛父母。","正確。老牛舔小牛。","軍隊潰敗。","重操舊業。"]);
            addQ("在運用成語時，若要表達「由下對上」的親情，應選擇：", ["舐犢情深", "手足情深", "孺慕之情", "情同手足"], 2, ["上對下。","平輩。","正確。子女對父母。","平輩朋友。"]);

            // 8. 望塵莫及 / 望其項背
            addQ("「望其項背」通常用來表示：", ["趕不上", "趕得上", "極為遙遠", "完全看不見"], 1, ["望塵莫及。","正確。能夠看到對方的頸項和背脊，表示趕得上。（常搭配否定詞「無人能...」使用）。","遙不可及。","盲人瞎馬。"]);
            addQ("朱銘先生在雕刻上的成就輝煌，令人____。", ["望其項背", "望塵莫及", "望風披靡", "所向披靡"], 1, ["趕得上。","正確。只看得到前面車馬揚起的塵土，表示遠遠落後，趕不上。","未戰先敗。","所到之處敵人潰退。"]);
            addQ("他的大提琴造詣精深，無人能____。", ["望塵莫及", "望風披靡", "望其項背", "盲人瞎馬"], 2, ["趕不上（若說無人能望塵莫及，語意矛盾，因為望塵莫及已經是趕不上了）。","未戰先敗。","正確。無人能「趕得上」。","危險。"]);
            addQ("下列關於「望塵莫及」與「望其項背」的用法，何者**錯誤**？", ["前者指趕不上，後者指趕得上。", "兩者皆與距離或程度的落差有關。", "「無人能望其項背」代表對方的成就極高，大家都趕不上。", "「他的能力令人望其項背」是一句稱讚他的話，表示他無人能敵。"], 3, ["正確解析。","正確解析。","正確解析。","錯誤。若說「令人望其項背」，意思是別人「趕得上他」，這並非稱讚他天下無敵。稱讚應說「無人能望其項背」或「令人望塵莫及」。"]);

            // 9. 行不由徑 / 另闢蹊徑
            addQ("「另闢蹊徑」的意思是：", ["行事光明正大", "尋求其他的方法或途徑", "迷失在小路中", "不走正道，專做壞事"], 1, ["行不由徑。","正確。另外開闢一條小路，比喻尋求其他方法。","盲人瞎馬。","非此成語之意。"]);
            addQ("他做事____、腳踏實地，深得師長的信任。", ["另闢蹊徑", "行不由徑", "急功近利", "盲人瞎馬"], 1, ["找其他方法。","正確。走路不抄小徑，比喻行事光明正大。","貪求利益。","危險。"]);
            addQ("這件事十分棘手，我們試著____尋求解決之道。", ["行不由徑", "另闢蹊徑", "重作馮婦", "琵琶別抱"], 1, ["光明正大。","正確。尋求其他的方法或途徑。","重操舊業。","女子改嫁。"]);
            addQ("下列何者用來形容「行事光明正大，不投機取巧」？", ["行不由徑", "另闢蹊徑", "冰清玉潔", "守身如玉"], 0, ["正確。","尋求新方法。","品行高潔。","潔身自愛。"]);

            // 10. 一擲千金 / 一字千金
            addQ("蘇東坡的赤壁賦傳誦至今，真是____的名作。", ["一擲千金", "一字千金", "不可言喻", "冰清玉潔"], 1, ["不惜金錢。","正確。比喻文辭精當，價值極高。","無法形容。","品行高潔。"]);
            addQ("他出手闊綽，____，最後敗光家產。", ["一字千金", "一擲千金", "急功近利", "一發不可收拾"], 1, ["文辭精美。","正確。形容不惜金錢的豪舉。","貪圖近利。","無法收拾。"]);
            addQ("「一字千金」的典故與下列哪一方面最相關？", ["賭博揮霍", "商業投資", "文學創作與修辭", "軍事戰爭"], 2, ["這是一擲千金。","與商業無關。","正確。形容文辭極具價值。","與軍事無關。"]);
            addQ("「一擲千金」通常帶有何種色彩？", ["稱讚對方慷慨解囊，熱心公益", "形容文學作品的極高價值", "批評或形容人不惜金錢的揮霍豪舉", "形容做事情非常果斷"], 2, ["急公好義。","一字千金。","正確。多用於揮霍。","非果斷。"]);
            addQ("下列成語中，何者帶有貶義或負面色彩？", ["一字千金", "一擲千金", "行不由徑", "冰雪聰明"], 1, ["正面，文辭精美。","正確。揮霍金錢，帶有貶義。","正面，光明正大。","正面，聰明。"]);

            // 11. 目不見睫 / 目不交睫
            addQ("他為公司周轉不靈的事憂愁得輾轉反側，整夜____。", ["目不見睫", "目不交睫", "目不暇給", "目瞪口呆"], 1, ["無自知之明。","正確。眼睛沒有閉上（上下睫毛未交合），比喻心情不安不能入眠或工作勞碌。","事物太多看不完。","受驚嚇。"]);
            addQ("「自大的人____，從來就看不到自己的缺點。」", ["目不交睫", "目不見睫", "目中無人", "盲人瞎馬"], 1, ["不能入眠。","正確。眼睛看不見自己的睫毛，比喻人無自知之明，不能看見自己的過失。","雖然義近，但講義主要對比的易混淆成語為目不見睫。","極為危險。"]);
            addQ("「目不交睫」的意思為何？", ["形容沒有自知之明", "形容視力不好", "比喻心情不安不能入眠或工作緊張勞碌", "形容人極度傲慢"], 2, ["目不見睫。","非視力問題。","正確。","目中無人。"]);
            addQ("「目不見睫」是用來比喻：", ["沒有自知之明", "看不見眼前危險", "極度勞累", "目光短淺"], 0, ["正確。看不到自己的過失。","盲人瞎馬。","目不交睫。","鼠目寸光。"]);

            addQ("「她是個____的姑娘，絕不會做這種苟且之事。」", ["冰雪聰明", "冰清玉潔", "小姑獨處", "小家碧玉"], 1, ["非常聰明。","正確。比喻品行高潔。","未出嫁。","平常人家的女兒。"]);
            addQ("她看起來____的樣子，學習新事物總是一點就通。", ["冰清玉潔", "冰雪聰明", "小家碧玉", "差強人意"], 1, ["品行高潔。","正確。形容非常聰明。","平常人家的女兒。","勉強滿意。"]);
            addQ("下列何者用來「比喻品行高潔」？", ["冰雪聰明", "守口如瓶", "冰清玉潔", "行不由徑"], 2, ["非常聰明。","嚴守秘密。","正確。","光明正大。"]);
            addQ("「冰雪聰明」與「冰清玉潔」的共同點在於？", ["皆用來形容男子的英俊", "皆含有「冰」字，用來比喻極其寒冷的環境", "皆為讚美女性的正面成語", "皆指涉女子的感情狀態"], 2, ["多用於女性。","皆為比喻，非指天氣。","正確。前者讚美才智，後者讚美品德。","與感情狀態無關。"]);

            // 13. 小姑獨處 / 小家碧玉
            addQ("阿姨喜歡單身的生活，年近五十猶是____。", ["小姑獨處", "小家碧玉", "琵琶別抱", "重作馮婦"], 0, ["正確。指女子未出嫁。","平常人家女兒。","女子改嫁。","重操舊業。"]);
            addQ("她雖是____，但卻有大家閨秀的優雅。", ["冰清玉潔", "小姑獨處", "小家碧玉", "琵琶別抱"], 2, ["品行高潔。","未出嫁。","正確。指平常人家的女兒。常與「大家閨秀」對比。","女子改嫁。"]);
            addQ("「小家碧玉」通常用來指稱：", ["年長未婚的女性", "平常人家的女兒", "改嫁的婦女", "品行高潔的女性"], 1, ["小姑獨處。","正確。","琵琶別抱。","冰清玉潔。"]);
            addQ("「小姑獨處」的「獨處」在此意謂：", ["喜歡一個人旅行", "沒有兄弟姊妹", "未婚、單身", "住在深山裡"], 2, ["非指旅行。","非指手足。","正確。指女子尚未出嫁。","非指居住地。"]);

            // 14. 急公好義 / 急功近利
            addQ("林先生____、樂於助人的精神值得我們學習。", ["急公好義", "急功近利", "摩頂放踵", "巧奪天工"], 0, ["正確。熱心公益，喜愛助人。","貪求利益。","捨身救世（雖然也是助人，但急公好義更常搭配樂於助人）。","技藝精巧。"]);
            addQ("他____、貪求速成，不願腳踏實地的做事。", ["急公好義", "急功近利", "行不由徑", "另闢蹊徑"], 1, ["熱心公益。","正確。指急於求得，貪求利益。","腳踏實地。","尋找新方法。"]);
            addQ("下列哪一個成語帶有「貶義（負面評價）」？", ["急公好義", "冰雪聰明", "急功近利", "另闢蹊徑"], 2, ["正面。","正面。","正確。貪圖眼前的短利。","中性或正面。"]);
            addQ("「急功近利」的「近利」是指：", ["接近利益的來源", "眼前的、短期的利益", "利潤非常微薄", "不法之財"], 1, ["非指距離來源。","正確。貪圖眼前的利益。","非指微薄。","非特指不法。"]);
            addQ("在成語中，發音相近但意義完全相反的是哪一組？", ["不翼而飛 / 不脛而走", "急公好義 / 急功近利", "目不見睫 / 目不交睫", "曇花一現 / 滄海一粟"], 1, ["意思不同，但非相反。","正確。前者熱心公益（正），後者貪圖私利（反）。","意思不同，非相反。","皆指短暫或渺小，非相反。"]);

            // 15. 不以為然 / 不以為意
            addQ("他的言詞十分偏激，有失中肯，令人____。", ["不以為意", "不以為然", "不置可否", "無庸置疑"], 1, ["不在乎。","正確。表示不同意（不認為是對的）。","不表示意見。","不必懷疑。"]);
            addQ("他生性樂觀，對於生活中的不順遂總是____。", ["不以為然", "不以為意", "不可言喻", "望塵莫及"], 1, ["不同意。","正確。不注意、不在乎、不放在心上。","無法形容。","趕不上。"]);
            addQ("「不以為然」的意思是：", ["不放在心上", "不表示任何意見", "表示不同意", "非常贊同"], 2, ["不以為意。","不置可否。","正確。「然」是對的，不以為然即不認為是對的。","與贊同相反。"]);
            addQ("面對別人的批評，他總是____，繼續做自己認為對的事。", ["不以為然", "不以為意", "目不交睫", "一擲千金"], 1, ["不同意批評，但「不放在心上」更符合繼續做自己的語境。不以為意指不在乎。","正確。","不能入睡。","揮霍。"]);
            addQ("「不以為意」的「意」在這裡可以解釋為：", ["意思", "意見", "心意、在乎", "意外"], 2, ["非指意思。","非指意見（然）。","正確。不把它放在心意上，即不在乎。","非指意外。"]);

            addQ("只知片面知識卻高談闊論，如____，惹人笑話。", ["盲人摸象", "盲人瞎馬", "目不見睫", "急功近利"], 0, ["正確。以偏概全，未洞明真相。","極度危險。","沒有自知之明。","貪求近利。"]);
            addQ("「盲人瞎馬」主要是用來形容什麼樣的處境？", ["缺乏知識", "極度危險", "沒有目標", "非常貧窮"], 1, ["盲人摸象偏向缺乏全面知識。","正確。瞎子騎瞎馬走到懸崖邊，極度危險。","非無目標。","非貧窮。"]);
            addQ("下列何者用來比喻「以偏概全，未洞明真相」？", ["盲人摸象", "目不見睫", "盲人瞎馬", "巧奪天工"], 0, ["正確。","看不見自己缺點。","危險。","技藝精巧。"]);

            addQ("本校啦啦隊在這次全國競賽中____，勇奪冠軍。", ["望風披靡", "所向披靡", "望塵莫及", "望其項背"], 1, ["被敵人氣勢震懾而潰退（通常指失敗的一方）。","正確。比喻力量所到之處，敵人紛紛潰退（指勝利的一方）。","趕不上。","趕得上。"]);
            addQ("李廣將軍英勇善戰，所到之處敵軍無不____。", ["所向披靡", "望風披靡", "不翼而飛", "不脛而走"], 1, ["指李廣軍隊所向披靡。但此處主詞是「敵軍」，敵軍應是望風披靡。","正確。敵軍被氣勢震懾，未作戰就潰敗了。","遺失。","傳播迅速。"]);
            addQ("「所向披靡」通常用來形容：", ["失敗者的怯懦", "勝利者的氣勢與強大", "時間的短暫", "空間的渺小"], 1, ["這是望風披靡。","正確。力量所到之處，敵人潰敗。","曇花一現。","滄海一粟。"]);
            addQ("下列關於「披靡」的成語，用法何者正確？", ["我們隊伍實力太弱，在比賽中簡直是所向披靡。", "對手實力堅強，讓我們望風披靡，毫無招架之力。", "這陣颱風望風披靡，帶來了豐沛的雨量。", "他靠著作弊才拿下第一名，真是所向披靡。"], 1, ["弱隊不會所向披靡。","正確。被強敵震懾而潰退。","不用於颱風。","通常形容正當的強大力量，不用於作弊。"]);
            addQ("「望風披靡」中的「望風」意指：", ["看著風景", "看到對方的氣勢或聽到對方的威名", "被風吹倒", "等待風向改變"], 1, ["非風景。","正確。遠遠望見敵人的氣勢就潰敗了。","非實體風。","非等待。"]);

            // 18. 重作馮婦 / 琵琶別抱
            addQ("她退休之後仍然難以忘情教學，因而再應校長邀請，____，擔任本次活動的指導老師。", ["琵琶別抱", "重作馮婦", "小姑獨處", "小家碧玉"], 1, ["婦女改嫁。","正確。比喻重操舊業。","未出嫁。","平常人家女兒。"]);

            addQ("「重作馮婦」的意思是：", ["婦女改嫁", "生了重病", "比喻重操舊業", "形容女子非常美麗"], 2, ["琵琶別抱。","非生病。","正確。（馮婦是古代善於打虎的男子，後指重操舊業）。","無關美麗。"]);

                        <h2 class="text-4xl md:text-5xl font-extrabold text-rose-950 mb-4">暫無紀錄</h2>
                        <p class="text-2xl md:text-3xl font-medium text-rose-800/60 mb-10">您還沒有完成任何測驗或留下足跡喔！</p>
                        <button onclick="switchTab('quiz')" class="bg-white border-4 border-rose-200 text-rose-600 hover:bg-rose-50 font-bold px-10 py-4 text-xl rounded-full shadow-md transition-colors">🚀 前往測驗</button>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="w-full flex-1 p-3 md:p-6 lg:p-10 overflow-y-auto overflow-x-hidden pb-24 relative z-10">
                    <div class="w-full max-w-[96%] xl:max-w-[98%] mx-auto">
                        <div class="flex justify-between items-end border-b-4 border-amber-300 pb-5 mb-12">
                            <div>
                                <h2 class="text-4xl md:text-5xl font-extrabold text-amber-800 flex items-center"><span class="bg-amber-100 text-amber-600 w-14 h-14 flex items-center justify-center rounded-2xl mr-5 shadow-sm">📜</span>作答與登入紀錄</h2>
                                <p class="text-amber-900/60 mt-3 ml-20 font-bold text-lg md:text-xl">追蹤您的學習軌跡，跨裝置同步更新 ☁️</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                            <!-- 作答紀錄 -->
                            <div class="bg-white rounded-3xl shadow-xl border border-amber-100 overflow-hidden">
                                <div class="bg-amber-50 p-6 border-b border-amber-200">
                                    <h3 class="text-3xl font-bold text-amber-900 flex items-center"><span class="mr-3 text-3xl">🎯</span>最近作答成績</h3>
                                </div>
                                <div class="p-6 md:p-8 space-y-5 max-h-[60vh] overflow-y-auto">
                                    ${(userData.quizHistory || []).slice().reverse().map((h, i) => `
                                        <div class="flex justify-between items-center p-5 rounded-2xl border-2 border-slate-100 ${h.score >= 80 ? 'bg-emerald-50/50 border-emerald-100' : (h.score < 60 ? 'bg-rose-50/50 border-rose-100' : 'bg-slate-50')} transition-all hover:shadow-md">
                                            <div>
                                                <div class="font-bold text-slate-800 text-xl md:text-2xl">${h.date}</div>
                                                <div class="text-lg text-slate-500 mt-2 font-medium">共 ${h.total} 題，答對 <span class="font-bold text-slate-700">${h.correct}</span> 題</div>
                                            </div>
                                            <div class="text-5xl font-black ${h.score >= 80 ? 'text-emerald-600' : (h.score < 60 ? 'text-rose-500' : 'text-amber-500')}">${h.score}<span class="text-2xl ml-1 font-bold">分</span></div>
                                        </div>
                                    `).join('') || '<p class="text-xl text-slate-400 text-center py-10 font-bold">目前還沒有測驗紀錄喔</p>'}
                                </div>
                            </div>

                            <!-- 登入紀錄 -->
                            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden h-fit">
                                <div class="bg-slate-50 p-6 border-b border-slate-200">
                                    <h3 class="text-3xl font-bold text-slate-800 flex items-center"><span class="mr-3 text-3xl">👣</span>最近登入足跡</h3>
                                </div>
                                <div class="p-6 md:p-8 space-y-4 max-h-[40vh] overflow-y-auto">
                                    ${(userData.loginHistory || []).slice().reverse().map((time, i) => `
                                        <div class="flex items-center p-4 rounded-xl border border-slate-100 bg-slate-50/50 hover:bg-slate-100 transition-colors">
                                            <span class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 mr-4 text-lg font-bold shadow-inner">${i+1}</span>
                                            <span class="font-bold text-slate-700 text-xl">${new Date(time).toLocaleString()}</span>
                                        </div>
                                    `).join('') || '<p class="text-xl text-slate-400 text-center py-10 font-bold">無登入紀錄</p>'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        initApp();

    </script>
</body>
</html>
